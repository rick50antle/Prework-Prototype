                    <div className="bg-white rounded-lg p-4" style={{ backgroundColor: colors.paper, border: `1px solid ${colors.earthLight}` }}>
                        <p className="text-xs uppercase tracking-wider font-semibold" style={{ color: colors.earth }}>{label}</p>
                        <h3 className="text-base font-bold" style={{ color: colors.primary }}>Balance Sheet</h3>
                        <p className="text-xs italic" style={{ color: colors.earth }}>December 31, {year === 'y2025' ? '2025' : '2024'} · in $ millions</p>
                        <div className="mt-3 text-sm">
                            {cvsBS.map((r, i) => {
                                if (r.type === 'section') {
                                    return (
                                        <div key={i} className="font-bold mt-3" style={{ color: colors.primary }}>{r.label}</div>
                                    );
                                }
                                const hidden = !showAll && !isTotal(r);
                                const wrapStyle = {
                                    opacity: hidden ? 0 : 1,
                                    maxHeight: hidden ? 0 : '2.5rem',
                                    overflow: 'hidden',
                                    transition: 'opacity 500ms ease-out, max-height 500ms ease-out, margin 500ms ease-out, padding 500ms ease-out',
                                    marginTop: hidden ? 0 : (isTotal(r) ? '0.25rem' : 0),
                                    paddingTop: hidden ? 0 : (isTotal(r) ? '0.25rem' : 0),
                                    borderTop: isTotal(r) && !hidden ? `1px solid ${colors.earthDark}` : 'none',
                                };
                                const textStyle = isTotal(r)
                                    ? { fontWeight: 700, color: colors.primary }
                                    : r.type === 'subtotal'
                                        ? { fontWeight: 600, color: colors.earthDark }
                                        : { color: colors.earthDark };
                                return (
                                    <div key={i} style={wrapStyle}>
                                        <div style={{ ...rowGrid, ...textStyle }}>
                                            <div>{r.label}</div>
                                            <div className="text-right">{renderValue(r, year)}</div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            const _unused_BSSplit = () => null;

            // ============================================================
            // NARRATIVE + NAV
            // ============================================================
            const Narrative = () => (
                <div className="bg-white rounded-lg p-5 mb-4" style={{ border: `1px solid ${colors.earthLight}` }}>
                    <p className="text-xs uppercase tracking-wider font-bold mb-2" style={{ color: colors.accent }}>
                        Phase {phase}: {PHASES[phase-1].label}
                    </p>
                    <p className="text-sm leading-relaxed" style={{ color: colors.earthDark }}>
                        {PHASES[phase-1].narrative}
                    </p>
                </div>
            );

            const Nav = () => (
                <div className="flex justify-between mb-4">
                    <button onClick={back} disabled={phase === 1}
                            className="px-4 py-2 rounded-lg border bg-white text-sm cursor-pointer disabled:cursor-not-allowed"
                            style={{ borderColor: colors.earthLight, color: phase === 1 ? colors.earth : colors.primary, opacity: phase === 1 ? 0.5 : 1 }}>
                        ← Back
                    </button>
                    <button onClick={advance} disabled={phase === 28}
                            className="px-4 py-2 rounded-lg font-bold text-white text-sm border-0 cursor-pointer disabled:cursor-not-allowed"
                            style={{ backgroundColor: colors.primary, opacity: phase === 28 ? 0.5 : 1 }}>
                        {phase < 28 ? 'Next →' : 'End of mockup'}
                    </button>
                </div>
            );

            return (
                <div className="max-w-6xl mx-auto p-4">
                    <Header />

                    <div className="mb-4 p-3 rounded-lg" style={{ backgroundColor: '#fef9e7', border: `2px solid ${colors.accent}` }}>
                        <p className="text-sm" style={{ color: colors.earthDark }}>
                            <strong>Mockup:</strong> Visual choreography for Tutorial 4.1 — walking CVS Health's
                            Balance Sheets, Cash Flow Statement, Statement of Shareholders' Equity, and Income
                            Statement (FY2025 10-K) through the Module 3 architecture. Phases 1–5: BS choreography
                            and compaction. Phases 6–13: CFS deep dive (restricted-cash mismatch, solution, sections).
                            Phases 14–20: equity bucketing on the BS, then SoCE choreography (column bucketing,
                            animated running totals, expandable buckets). Phases 21–27: IS choreography (3-year
                            document, dim irrelevant years, collapse to NI/NCI split, add OCI, connect to SoCE
                            buckets, architecture restored). Phase 28: synthesis — all three explanatory statements
                            stacked in the middle column between the two BSes.
                        </p>
                    </div>

                    <Narrative />
                    <Nav />

                    {phase <= 2 && <BSDocumentForm phase={phase} />}
                    {(phase === 3 || phase === 4) && <BSSplit phase={phase} />}
                    {phase === 5 && (
                        <CompactSplit
                            phase={phase}
                            sectionsVisible={sectionsVisible}
                            expanded={expanded}
                            toggleSection={toggleSection}
                        />
                    )}
                    {phase === 6 && (
                        <>
                            <BSReferenceStrip />
                            <CFSDocumentForm dimmedColumns={[]} collapse="none" />
                        </>
                    )}
                    {phase === 7 && (
                        <>
                            <BSReferenceStrip />
                            <CFSDocumentForm dimmedColumns={['y2024','y2023']} collapse="none" />
                        </>
                    )}
                    {phase === 8 && (
                        <>
                            <BSReferenceStrip />
                            <CFSDocumentForm dimmedColumns={['y2024','y2023']} collapse="subtotals" />
                        </>
                    )}
                    {phase === 9 && (
                        <>
                            <BSReferenceStrip />
                            <CFSDocumentForm dimmedColumns={['y2024','y2023']} collapse="netchange" />
                        </>
                    )}
                    {phase === 10 && (
                        <>
                            <BSReferenceStrip />
                            <CFSStrip withSolution={false} />
                        </>
                    )}
                    {phase === 11 && (
                        <>
                            <BSReferenceStrip />
                            <CFSStrip withSolution={true} />
                            <SolutionBridge />
                        </>
                    )}
                    {phase >= 12 && phase <= 14 && (
                        <CompactSplit
                            phase={phase}
                            sectionsVisible={sectionsVisible}
                            expanded={expanded}
                            toggleSection={toggleSection}
                            middle="cfs"
                        />
                    )}
                    {phase === 15 && (
                        <>
                            <SoCEReferenceStrip />
                            <SoCEDocumentForm hideIrrelevant={false} bucketed={false} />
                        </>
                    )}
                    {phase === 16 && (
                        <>
                            <SoCEReferenceStrip />
                            <SoCEDocumentForm hideIrrelevant={true} bucketed={false} />
                        </>
                    )}
                    {phase === 17 && (
                        <>
                            <SoCEReferenceStrip />
                            <SoCEDocumentForm hideIrrelevant={true} bucketed={true} />
                        </>
                    )}
                    {phase === 18 && (
                        <>
                            <SoCEReferenceStrip />
                            <SoCEDocumentForm hideIrrelevant={true} bucketed={true} movementsVisible={soceMovementsVisible} />
                        </>
                    )}
                    {phase >= 19 && phase <= 20 && (
                        <CompactSplit
                            phase={phase}
                            sectionsVisible={sectionsVisible}
                            expanded={expanded}
                            toggleSection={toggleSection}
                            middle="soce"
                            soceMovementsVisible={soceMovementsVisible}
                            soceExpanded={soceExpanded}
                            toggleSoceBucket={toggleSoceBucket}
                        />
                    )}
                    {phase === 21 && (
                        <>
                            <ISReferenceStrip />
                            <ISDocumentForm dimmedYears={[]} collapseLevel="none" showCI={false} />
                        </>
                    )}
                    {phase === 22 && (
                        <>
                            <ISReferenceStrip />
                            <ISDocumentForm dimmedYears={['y2024','y2023']} collapseLevel="none" showCI={false} />
                        </>
                    )}
                    {phase === 23 && (
                        <>
                            <ISReferenceStrip />
                            <ISDocumentForm dimmedYears={['y2024','y2023']} collapseLevel="subtotals" showCI={false} />
                        </>
                    )}
                    {phase === 24 && (
                        <>
                            <ISReferenceStrip />
                            <ISDocumentForm dimmedYears={['y2024','y2023']} collapseLevel="bottomline" showCI={false} />
                        </>
                    )}
                    {phase === 25 && (
                        <>
                            <ISReferenceStrip />
                            <ISDocumentForm dimmedYears={['y2024','y2023']} collapseLevel="bottomline" showCI={true} />
                        </>
                    )}
                    {phase === 26 && (
                        <>
                            <ISReferenceStrip />
                            <ISToBucketsStrip />
                        </>
                    )}
                    {phase === 27 && (
                        <CompactSplit
                            phase={phase}
                            middle="is"
                        />
                    )}
                    {phase === 28 && (
                        <CompactSplit
                            phase={phase}
                            middle="synthesis"
                        />
                    )}

                    <div className="mt-6 p-4 rounded-lg bg-white" style={{ border: `1px solid ${colors.earthLight}` }}>
                        <div className="flex justify-between items-start mb-2">
                            <p className="text-sm font-bold" style={{ color: colors.primary }}>For refinement</p>
                            <button onClick={reset} className="text-xs underline border-0 bg-transparent cursor-pointer" style={{ color: colors.earth }}>Reset</button>
                        </div>
                        <ul className="text-sm space-y-1 list-disc list-inside" style={{ color: colors.earthDark }}>
                            <li><strong>Phases 1 → 4 (BS choreography)</strong>: document form → strip to totals (identity check appears) → split into snapshots via View Transitions FLIP (2024 left, 2025 right, gap middle) → re-expand to full line-item detail on both sides.</li>
                            <li><strong>Phase 5 (compact to ask about cash)</strong>: BSes morph to a compact form with Cash highlighted, the two restricted-cash-bearing line items kept visible by name (<em>Other current assets</em> and <em>Other assets</em>), and everything else rolled into "All other noncash assets." A − L = E still holds. Middle card teases the question: cash went down $133 million — why?</li>
                            <li><strong>Phase 6 (meet the CFS)</strong>: BSes step aside (reduced to a small horizontal reference strip recapping the cash question). The full 3-column CFS document form takes center stage — three years (2025, 2024, 2023) × all line items, exactly as it appears on page 96 of the 10-K. The student sees the statement as its own document.</li>
                            <li><strong>Phase 7 (dim 2024 and 2023)</strong>: period-vs-date lesson. The 2025 column covers Jan 1 → Dec 31, 2025 — exactly the period between our two BS dates. The other two columns cover earlier periods that don't connect anything we're holding. They dim to ~15% opacity (700ms ease-out).</li>
                            <li><strong>Phase 8 (collapse to section totals)</strong>: inside the 2025 column, the line items + section headers collapse via CSS max-height + opacity transitions (500ms ease-out). Only Operating, Investing, Financing subtotals + the full reconciliation footer remain visible.</li>
                            <li><strong>Phase 9 (collapse to just the change in cash)</strong>: section subtotals and the beginning/ending cash rows of the reconciliation footer also collapse away. What's left of the entire CFS document is the single line "Net increase (decrease) in cash..." with $(172) for 2025.</li>
                            <li><strong>Phase 10 (two strips, one mismatch)</strong>: the CFS document form is replaced by a horizontal CFS strip placed directly under the BS reference strip. BS says cash decreased $133; CFS says $172. Two strips, same format, different numbers. The labels differ — "Cash and cash equivalents" vs. "Cash, cash equivalents and restricted cash" — but the student is invited to notice the mismatch first.</li>
                            <li><strong>Phase 11 (present the solution)</strong>: a green SolutionBridge panel appears below the two strips with the 10-K Note 1 reconciliation: BS-face Cash + restricted cash in Other current assets + restricted cash in Other assets = Cash per CFS, at both dates. The CFS strip also picks up small green annotations showing the decomposition. Lesson: each explanatory statement explains a specific change defined by its own scope. Read the labels.</li>
                            <li><strong>Phase 12 (architecture restored — three sections)</strong>: the strip layout is replaced by the 3-up grid: compact BSes flanking (with the green restricted-cash row highlights now visible on both — the spatial link to the reconciliation), 2025 CFS column in the middle. Operating, Investing, Financing subtotals appear in staggered sequence (400ms / 1200ms / 2000ms) and sum to the net change of $(172).</li>
                            <li><strong>Phase 13 (expandable details)</strong>: each CFS section becomes a click-to-expand accordion. Operating shows CVS's direct-method line items (cash receipts from customers, cash paid for inventory, etc.) — CVS was deliberately chosen because it's one of the few US public companies that uses the direct method.</li>
                            <li><strong>Data fidelity</strong>: BS from 10-K p. 95 (PDF 97); CFS from p. 96 (PDF 98) — full 3-year data for the document form; restricted cash recon from Note 1 (p. 100 / PDF 102). All in $ millions.</li>
                            <li><strong>Open / to do later</strong>: find-then-display gates ("What page is the CFS on?") deferred for now; "see original PDF page" overlay; smoother phase 4 → 5 transition; smoother phase 9 → 10 transition (the $(172) figure could literally lift out of the document form into the CFS strip via View Transitions API); smoother phase 11 → 12 transition (strips dissolving into the 3-up grid); IS and SoCE choreography (later beats of 4.1); integration into the actual tutorial.</li>
                        </ul>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
