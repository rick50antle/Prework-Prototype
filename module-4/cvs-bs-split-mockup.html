<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVS Balance Sheet — Split Mockup</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .bs-row {
            height: 1.5rem;
            opacity: 1;
            overflow: hidden;
            transition: height 500ms ease-out, opacity 500ms ease-out, margin-top 500ms ease-out, padding-top 500ms ease-out, border-top-color 500ms ease-out;
        }
        .bs-row.bs-row-total { height: 1.75rem; }
        .bs-row-doc.collapsed .bs-row:not(.bs-row-total),
        .bs-snapshot.collapsed .bs-row:not(.bs-row-total) {
            height: 0;
            opacity: 0;
            margin-top: 0;
            padding-top: 0;
            border-top-color: transparent;
        }
        .id-check-box {
            height: 0;
            opacity: 0;
            overflow: hidden;
            transition: height 500ms ease-out 200ms, opacity 500ms ease-out 200ms, margin-top 500ms ease-out;
        }
        .bs-row-doc.collapsed .id-check-box {
            height: 5.5rem;
            opacity: 1;
        }

        /* View Transitions API — animates year-labeled elements between
           the document layout (phase 1-2) and the snapshot layout (phase 3-4).
           Elements that share a view-transition-name in old and new DOM
           snapshots get a FLIP animation. They appear to physically move. */
        ::view-transition-old(year-2025),
        ::view-transition-new(year-2025),
        ::view-transition-old(year-2024),
        ::view-transition-new(year-2024) {
            animation-duration: 3000ms;
            animation-timing-function: ease-in-out;
        }
        ::view-transition-old(bs-frame),
        ::view-transition-new(bs-frame) {
            animation-duration: 3000ms;
        }
        .year-tag-2025 { view-transition-name: year-2025; }
        .year-tag-2024 { view-transition-name: year-2024; }
        .bs-frame { view-transition-name: bs-frame; }

        /* Compact BS — Cash highlighted */
        .cash-row {
            background-color: #dbeafe;
            border-radius: 0.25rem;
            padding: 0.4rem 0.5rem;
            margin: 0 -0.5rem;
            transition: background-color 400ms ease-out;
        }
        /* Restricted-cash-bearing rows — highlighted starting in phase 7 */
        .restricted-row {
            border-radius: 0.25rem;
            padding: 0.4rem 0.5rem;
            margin: 0 -0.5rem;
            background-color: transparent;
            transition: background-color 500ms ease-out, box-shadow 500ms ease-out;
        }
        .restricted-row.lit {
            background-color: #f0fdf4;
            box-shadow: inset 3px 0 0 0 #22c55e;
        }
        .restricted-annotation {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 400ms ease-out, opacity 400ms ease-out, margin 400ms ease-out;
            margin: 0 -0.5rem;
        }
        .restricted-annotation.shown {
            max-height: 2rem;
            opacity: 1;
        }

        /* CFS section rows (Operating / Investing / Financing) — sequential reveal */
        .cfs-section-row {
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 500ms ease-out, transform 500ms ease-out;
        }
        .cfs-section-row.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Expandable section details (phase 9) */
        .cfs-detail-panel {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 350ms ease-out, opacity 350ms ease-out, padding 350ms ease-out;
        }
        .cfs-detail-panel.open {
            max-height: 600px;
            opacity: 1;
        }
        .cfs-section-toggle {
            cursor: pointer;
            user-select: none;
        }
        .cfs-section-toggle:hover { background-color: #f5f1e8; }

        /* CFS document-form column dimming (phase 6 → 7) */
        .cfs-col {
            opacity: 1;
            transition: opacity 700ms ease-out;
        }
        .cfs-col.dim {
            opacity: 0.15;
        }
        /* CFS document-form row collapse (phases 8 and 9 — progressive narrowing
           from line items → section subtotals → just net change). */
        .cfs-doc-row {
            max-height: 5rem;
            opacity: 1;
            overflow: hidden;
            transition:
                max-height 500ms ease-out,
                opacity 500ms ease-out,
                margin-top 500ms ease-out,
                padding-top 500ms ease-out,
                border-top-color 500ms ease-out;
        }
        .cfs-doc-row.hidden {
            max-height: 0;
            opacity: 0;
            margin-top: 0 !important;
            padding-top: 0 !important;
            border-top-color: transparent !important;
        }

        /* Reveal box for the "lesson" callout */
        .reveal-box {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 500ms ease-out, opacity 500ms ease-out, margin 500ms ease-out;
            margin-top: 0;
        }
        .reveal-box.shown {
            max-height: 600px;
            opacity: 1;
            margin-top: 0.75rem;
        }
    </style>
</head>

        const fmt = (v) => {

        const isTotal = (r) => r.type === 'total';

        const PHASES = [
            { n: 1, label: 'Document form', narrative: "Here is the Consolidated Balance Sheets table as it appears in CVS's 10-K (page 95). One table, two date columns. Item-level detail across roughly thirty rows." },

            { n: 27, label: 'Architecture restored — IS in the middle', narrative: "Strips give way to the architecture. The 2025 Income Statement column slots into the middle between the two Balance Sheets. Each BS shows its bucketed equity rows; the IS shows the path from Revenue ($402B) down to Net income attributable to CVS Health ($1,768) plus the OCI piece ($526). The CFS and SoCE we explored earlier still belong in this middle column — but the IS is the focus now." },

        // ============================================================

        // ============================================================
        // COMPACT BS — four lines: Cash, Noncash Assets, Total Assets,

                                <div style={{ ...rowGrid, marginTop: '0.2rem', color: colors.earthDark, fontSize: '0.9em' }}>
                                    <div>+ Noncontrolling interests</div>
                                    <div className="text-right mono">{fmt(d.nci)}</div>
                                </div>
                                <div style={{ ...rowGrid, marginTop: '0.25rem', paddingTop: '0.25rem', borderTop: `1px solid ${colors.earthDark}`, fontWeight: 700, color: colors.primary }}>
                                    <div>= Total equities</div>
                                    <div className="text-right mono">{fmt(d.totalEq)}</div>
                                </div>
                            </>
                        ) : (
                            <div style={{ ...rowGrid, marginTop: '0.4rem', paddingTop: '0.3rem', borderTop: `1px solid ${colors.earthDark}`, fontWeight: 700, color: colors.primary }}>
                                <div>= Total equities</div>
                                <div className="text-right mono">{fmt(d.totalEq)}</div>
                            </div>
                        )}

                        {/* Identity check */}
                        <p className="text-xs italic mt-3 mono" style={{ color: colors.earth, textAlign: 'right' }}>
                            {fmt(d.totalAssets)} − {fmt(d.totalLiab)} = {fmt(d.totalEq)} ✓
                        </p>
                    </div>
                </div>
            );
        };

        // ============================================================
        // SectionLine — one of the three CFS section subtotal rows.
        // In phase 8: shows label + value. In phase 9: also expandable.
        // ============================================================
        const SectionLine = ({ section, data, visible, expandable, expanded, onToggle }) => {
            const isNeg = data.subtotal < 0;
            return (
                <div className={`cfs-section-row ${visible ? 'visible' : ''}`}>
                    <div
                        className={expandable ? 'cfs-section-toggle' : ''}
                        onClick={expandable ? onToggle : undefined}
                        style={{
                            display: 'grid',
                            gridTemplateColumns: '1.25rem 1fr 6rem',
                            alignItems: 'center',
                            padding: '0.5rem 0.25rem',
                            borderBottom: `1px solid ${colors.earthLight}`,
                            borderRadius: '0.25rem',
                        }}
                    >
                        <div style={{ color: colors.earth, fontSize: '0.75rem' }}>
                            {expandable ? (expanded ? '▼' : '▶') : ''}
                        </div>
                        <div className="text-sm" style={{ color: colors.earthDark, fontWeight: 600 }}>
                            {data.label}
                        </div>
                        <div className="text-right mono text-sm" style={{ color: isNeg ? colors.error : colors.primary, fontWeight: 600 }}>
                            {fmt(data.subtotal)}
                        </div>
                    </div>
                    <div className={`cfs-detail-panel ${expanded ? 'open' : ''}`}
                         style={{ backgroundColor: '#fafaf7', padding: expanded ? '0.5rem 0.5rem 0.5rem 1.25rem' : '0 0.5rem 0 1.25rem', borderRadius: '0 0 0.25rem 0.25rem' }}>
                        {data.items.map((item, i) => (
                            <div key={i} className="grid" style={{ gridTemplateColumns: '1fr 5rem', padding: '0.2rem 0', columnGap: '0.5rem' }}>
                                <div style={{ color: colors.earthDark, fontSize: '0.78rem', lineHeight: '1.3' }}>{item.label}</div>
                                <div className="text-right mono" style={{ fontSize: '0.78rem', color: item.dash ? colors.earth : (item.value < 0 ? colors.error : colors.earthDark) }}>
                                    {item.dash ? '—' : fmt(item.value)}
                                </div>
                            </div>
                        ))}
                        <div className="grid mt-1 pt-1" style={{ gridTemplateColumns: '1fr 5rem', borderTop: `1px solid ${colors.earthDark}`, columnGap: '0.5rem' }}>
                            <div style={{ fontSize: '0.78rem', color: colors.primary, fontWeight: 700 }}>{data.label}</div>
                            <div className="text-right mono" style={{ fontSize: '0.78rem', color: isNeg ? colors.error : colors.primary, fontWeight: 700 }}>{fmt(data.subtotal)}</div>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================
        // CFSCenter — the middle-column content for phases 5-9.
        //   Phase 5: question card setting up "what happened to cash?"
        //   Phase 6: CFS reconciliation footer arrives; numbers don't match BS Cash. Notice prompt.
        //   Phase 7: restricted cash reconciliation revealed; lesson explicit.
        //   Phase 8: 3 section subtotals appear sequentially, sum to net change.
        //   Phase 9: sections become expandable; student opens to see direct-method detail.
        // ============================================================
        const CFSCenter = ({ phase, sectionsVisible, expanded, toggleSection }) => {
            // Phase 5 — set up the question
            if (phase === 5) {
                return (
                    <div className="rounded-lg p-5 flex flex-col"
                         style={{ backgroundColor: '#fef9e7', border: `2px dashed ${colors.accent}`, minHeight: '200px' }}>
                        <p className="text-xs uppercase tracking-wider font-bold" style={{ color: colors.accent }}>The question</p>
                        <h3 className="text-base font-bold mt-1" style={{ color: colors.primary }}>What happened to cash?</h3>
                        <div className="mt-4 text-sm space-y-3" style={{ color: colors.earthDark, lineHeight: '1.5' }}>
                            <p>Cash and cash equivalents decreased by</p>
                            <p className="text-2xl font-bold mono text-center" style={{ color: colors.error }}>$133 million</p>
                            <p className="text-center mono text-sm" style={{ color: colors.earth }}>$8,586 → $8,453</p>
                            <p className="pt-2 italic">CVS earned roughly $400 billion in revenue this year. Cash on the Balance Sheet barely moved. Where did money come from, and where did it go?</p>
                        </div>
                        <p className="mt-auto pt-4 text-xs italic" style={{ color: colors.earth }}>
                            The Cash Flow Statement is the explanatory statement that traces what happened to cash.
                        </p>
                    </div>
                );
            }

            // Phase 12+ — CFS card in the 3-up grid. The reconciliation footer
            // shows from the start; section subtotals appear sequentially via
            // sectionsVisible; sections become expandable at phase 13.
            const showBody = phase >= 12;

            return (
                <div className="rounded-lg p-4 bg-white" style={{ border: `1px solid ${colors.earthLight}` }}>
                    <p className="text-xs uppercase tracking-wider font-semibold" style={{ color: colors.earth }}>From the 10-K · page 96</p>
                    <h3 className="text-base font-bold" style={{ color: colors.primary }}>Cash Flow Statement</h3>
                    <p className="text-xs italic" style={{ color: colors.earth }}>Year ended December 31, 2025 · in $ millions</p>

                    {/* CFS reconciliation footer — visible from phase 6 on */}
                    <div className="mt-4 p-3 rounded text-sm" style={{ backgroundColor: '#fff8e1', border: `1px solid ${colors.accent}` }}>
                        <p className="text-xs uppercase font-bold mb-2" style={{ color: colors.accent }}>What the CFS reconciles</p>
                        <p className="text-xs italic mb-2" style={{ color: colors.earth }}>
                            "Cash, cash equivalents and restricted cash"
                        </p>
                        <div className="mono" style={{ fontSize: '0.85rem', color: colors.earthDark }}>
                            <div className="grid" style={{ gridTemplateColumns: '1fr 5rem' }}>
                                <div>Beginning of period</div>
                                <div className="text-right">{fmt(cvsCFS.beginning)}</div>
                            </div>
                            <div className="grid" style={{ gridTemplateColumns: '1fr 5rem' }}>
                                <div>+ Net change</div>
                                <div className="text-right" style={{ color: colors.error }}>{fmt(cvsCFS.netChange)}</div>
                            </div>
                            <div className="grid mt-1 pt-1 font-bold" style={{ gridTemplateColumns: '1fr 5rem', borderTop: `1px solid ${colors.earthDark}`, color: colors.primary }}>
                                <div>End of period</div>
                                <div className="text-right">{fmt(cvsCFS.ending)}</div>
                            </div>
                        </div>
                    </div>

                    {/* Phase 12+ — three section subtotals + sum */}
                    {showBody && (
                        <div className="mt-5">
                            <p className="text-xs uppercase font-bold mb-2" style={{ color: colors.primary }}>The three sections</p>
                            <SectionLine
                                section="operating"
                                data={cvsCFS.operating}
                                visible={sectionsVisible >= 1}
                                expandable={phase >= 13}
                                expanded={expanded.operating}
                                onToggle={() => toggleSection('operating')}
                            />
                            <SectionLine
                                section="investing"
                                data={cvsCFS.investing}
                                visible={sectionsVisible >= 2}
                                expandable={phase >= 13}
                                expanded={expanded.investing}
                                onToggle={() => toggleSection('investing')}
                            />
                            <SectionLine
                                section="financing"
                                data={cvsCFS.financing}
                                visible={sectionsVisible >= 3}
                                expandable={phase >= 13}
                                expanded={expanded.financing}
                                onToggle={() => toggleSection('financing')}
                            />
                            <div className={`cfs-section-row ${sectionsVisible >= 3 ? 'visible' : ''}`}>
                                <div className="grid mt-2 pt-2 mono font-bold"
                                     style={{ gridTemplateColumns: '1.25rem 1fr 6rem', borderTop: `2px solid ${colors.primary}`, color: colors.primary, padding: '0.5rem 0.25rem' }}>
                                    <div></div>
                                    <div className="text-sm">Net change in cash, cash equivalents &amp; restricted cash</div>
                                    <div className="text-right text-sm" style={{ color: colors.error }}>{fmt(cvsCFS.netChange)}</div>
                                </div>
                            </div>
                            {phase >= 13 && sectionsVisible >= 3 && (
                                <p className="text-xs italic mt-3" style={{ color: colors.earth }}>
                                    Click any section above to expand its line items.
                                </p>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // ============================================================
        // CompactSplit — 3-column layout for phases 5-9. Compact BSes
        // flanking, CFSCenter in the middle.
        // ============================================================
        const CompactSplit = ({ phase, sectionsVisible, expanded, toggleSection, middle, soceMovementsVisible, soceExpanded, toggleSoceBucket }) => {
            const highlightRestricted = phase >= 12;
            const showEquityBuckets = phase >= 14;
            const renderMiddle = () => {
                if (middle === 'synthesis') {
                    return <SynthesisCenter phase={phase} />;
                }
                if (middle === 'is') {
                    return <ISCenter phase={phase} />;
                }
                if (middle === 'soce') {
                    return (
                        <SoCECenter
                            phase={phase}
                            movementsVisible={soceMovementsVisible}
                            expanded={soceExpanded}
                            toggleBucket={toggleSoceBucket}
                        />
                    );
                }
                return (
                    <CFSCenter
                        phase={phase}
                        sectionsVisible={sectionsVisible}
                        expanded={expanded}
                        toggleSection={toggleSection}
                    />
                );
            };
            return (
                <div className="grid gap-3" style={{ gridTemplateColumns: '1fr 1.2fr 1fr', alignItems: 'start' }}>
                    <CompactSnapshot year="y2024" label="Beginning" highlightRestricted={highlightRestricted} showEquityBuckets={showEquityBuckets} />
                    {renderMiddle()}
                    <CompactSnapshot year="y2025" label="Ending" highlightRestricted={highlightRestricted} showEquityBuckets={showEquityBuckets} />
                </div>
            );
        };

        // ============================================================
        // BSReferenceStrip — compact horizontal recap of the cash
        // question shown above the CFS document form in phase 6, while
        // the full BSes are temporarily stepped aside.
        // ============================================================
        const BSReferenceStrip = () => {
            const beg = compactBS.y2024;
            const end = compactBS.y2025;
            const delta = end.cash - beg.cash;
            return (
                <div className="bg-white rounded-lg p-3 mb-4 grid gap-2"
                     style={{ border: `1px solid ${colors.earthLight}`, gridTemplateColumns: '1fr 1fr 1fr', alignItems: 'center' }}>
                    <div className="text-center">
                        <p className="text-xs uppercase tracking-wider" style={{ color: colors.earth }}>Beginning BS</p>
                        <p className="text-xs" style={{ color: colors.earthDark }}>Dec 31, 2024</p>
                        <p className="text-sm font-bold mono mt-1" style={{ color: colors.primary }}>Cash {fmt(beg.cash)}</p>
                    </div>
                    <div className="text-center" style={{ borderLeft: `1px solid ${colors.earthLight}`, borderRight: `1px solid ${colors.earthLight}` }}>
                        <p className="text-xs uppercase tracking-wider" style={{ color: colors.error }}>Question</p>
                        <p className="text-lg font-bold mono" style={{ color: colors.error }}>{fmt(delta)}</p>
                        <p className="text-xs italic" style={{ color: colors.earth }}>What happened to cash?</p>
                    </div>
                    <div className="text-center">
                        <p className="text-xs uppercase tracking-wider" style={{ color: colors.earth }}>Ending BS</p>
                        <p className="text-xs" style={{ color: colors.earthDark }}>Dec 31, 2025</p>
                        <p className="text-sm font-bold mono mt-1" style={{ color: colors.primary }}>Cash {fmt(end.cash)}</p>
                    </div>
                </div>
            );
        };

        // ============================================================
        // CFSDocumentForm — the full 3-column document-form CFS as it
        // appears in CVS's 10-K. Phase 6: all three columns at full
        // opacity. Phase 7: 2024 and 2023 columns dim to ~15% then the
        // layout swaps out to CompactSplit (handled by the parent).
        // ============================================================
        const CFSDocumentForm = ({ dimmedColumns, collapse }) => {
            // collapse: 'none' | 'subtotals' | 'netchange'
            //   'none'      — everything visible (phases 6, 7)
            //   'subtotals' — line items + section headers hidden, subtotals + full reconciliation footer visible (phase 8)
            //   'netchange' — only the net change row of the reconciliation footer visible (phase 9)
            const years = ['y2025', 'y2024', 'y2023'];
            const yearLabels = { y2025: '2025', y2024: '2024', y2023: '2023' };
            const isDim = (y) => dimmedColumns && dimmedColumns.includes(y);
            const hideLineItems = collapse !== 'none';
            const hideSectionHeaders = collapse !== 'none';
            const hideSubtotals = collapse === 'netchange';
            const hideReconBegEnd = collapse === 'netchange';
            const renderCell = (item, y) => {
                if (item.dashFor && item.dashFor.includes(y)) {
                    return <span style={{ color: colors.earth }}>—</span>;
                }
                const v = item[y];
                return <span className="mono" style={{ color: v < 0 ? colors.error : 'inherit' }}>{fmt(v)}</span>;
            };
            const gridStyle = { display: 'grid', gridTemplateColumns: '1fr 4.5rem 4.5rem 4.5rem', columnGap: '0.75rem', alignItems: 'baseline' };

            return (
                <div className="bg-white rounded-lg p-6 mx-auto" style={{ maxWidth: '880px', backgroundColor: colors.paper, border: `1px solid ${colors.earthLight}` }}>
                    <p className="text-xs uppercase tracking-wider" style={{ color: colors.earth }}>Index to Consolidated Financial Statements</p>
                    <h2 className="text-lg font-bold mt-1" style={{ color: colors.primary }}>Consolidated Statements of Cash Flows</h2>
                    <p className="text-xs italic mt-1" style={{ color: colors.earth }}>For the Years Ended December 31,</p>
                    <p className="text-xs italic" style={{ color: colors.earth }}>In millions</p>

                    <div className="mt-4 text-sm">
                        {/* Year column headers — always visible */}
                        <div style={{ ...gridStyle, paddingBottom: '0.25rem', borderBottom: `1px solid ${colors.earthLight}` }}>
                            <div></div>
                            {years.map(y => (
                                <div key={y} className={`text-right font-semibold cfs-col ${isDim(y) ? 'dim' : ''}`} style={{ color: colors.primary }}>
                                    {yearLabels[y]}
                                </div>
                            ))}
                        </div>

                        {/* Sections */}
                        {cvsCFS3Year.sections.map((section, si) => (
                            <div key={si}>
                                {/* Section header */}
                                <div className={`cfs-doc-row ${hideSectionHeaders ? 'hidden' : ''}`} style={{ marginTop: '0.75rem' }}>
                                    <div className="font-bold" style={{ color: colors.primary }}>{section.header}</div>
                                </div>

                                {/* Line items */}
                                {section.items.map((item, ii) => (
                                    <div key={ii} className={`cfs-doc-row ${hideLineItems ? 'hidden' : ''}`} style={{ ...gridStyle, padding: '0.1rem 0' }}>
                                        <div style={{ color: colors.earthDark, fontSize: '0.82rem', lineHeight: '1.35' }}>{item.label}</div>
                                        {years.map(y => (
                                            <div key={y} className={`text-right cfs-col ${isDim(y) ? 'dim' : ''}`}>
                                                {renderCell(item, y)}
                                            </div>
                                        ))}
                                    </div>
                                ))}

                                {/* Section subtotal */}
                                <div className={`cfs-doc-row ${hideSubtotals ? 'hidden' : ''}`} style={{
                                    ...gridStyle,
                                    marginTop: '0.25rem',
                                    paddingTop: '0.25rem',
                                    borderTop: `1px solid ${colors.earthDark}`,
                                    fontWeight: 600,
                                    color: colors.earthDark,
                                }}>
                                    <div style={{ fontSize: '0.85rem' }}>{section.subtotal.label}</div>
                                    {years.map(y => (
                                        <div key={y} className={`text-right cfs-col ${isDim(y) ? 'dim' : ''}`}>
                                            {renderCell(section.subtotal, y)}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}

                        {/* Reconciliation footer */}
                        <div className="mt-4">
                            {/* Net change row — always visible */}
                            <div className="cfs-doc-row" style={{
                                ...gridStyle,
                                marginTop: '0.5rem',
                                paddingTop: '0.5rem',
                                borderTop: `2px solid ${colors.primary}`,
                                fontWeight: 500,
                                color: colors.earthDark,
                            }}>
                                <div style={{ fontSize: '0.82rem', lineHeight: '1.35' }}>{cvsCFS3Year.netChange.label}</div>
                                {years.map(y => (
                                    <div key={y} className={`text-right cfs-col ${isDim(y) ? 'dim' : ''}`}>
                                        {renderCell(cvsCFS3Year.netChange, y)}
                                    </div>
                                ))}
                            </div>
                            {/* Cash at beginning of period */}
                            <div className={`cfs-doc-row ${hideReconBegEnd ? 'hidden' : ''}`} style={{
                                ...gridStyle,
                                marginTop: '0.15rem',
                                fontWeight: 500,
                                color: colors.earthDark,
                            }}>
                                <div style={{ fontSize: '0.82rem', lineHeight: '1.35' }}>{cvsCFS3Year.beginning.label}</div>
                                {years.map(y => (
                                    <div key={y} className={`text-right cfs-col ${isDim(y) ? 'dim' : ''}`}>
                                        {renderCell(cvsCFS3Year.beginning, y)}
                                    </div>
                                ))}
                            </div>
                            {/* Cash at end of period */}
                            <div className={`cfs-doc-row ${hideReconBegEnd ? 'hidden' : ''}`} style={{
                                ...gridStyle,
                                marginTop: '0.15rem',
                                fontWeight: 700,
                                color: colors.primary,
                            }}>
                                <div style={{ fontSize: '0.82rem', lineHeight: '1.35' }}>{cvsCFS3Year.ending.label}</div>
                                {years.map(y => (
                                    <div key={y} className={`text-right cfs-col ${isDim(y) ? 'dim' : ''}`}>
                                        {renderCell(cvsCFS3Year.ending, y)}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================
        // CFSStrip — parallel to BSReferenceStrip but for the CFS's
        // bottom-line cash story. Shown in phases 10–11 directly under
        // the BS reference strip so the mismatch (and then its solution)
        // is unmistakable.
        // ============================================================
        const CFSStrip = ({ withSolution }) => {
            return (
                <div className="bg-white rounded-lg p-3 mb-4 grid gap-2"
                     style={{ border: `1px solid ${colors.earthLight}`, gridTemplateColumns: '1fr 1fr 1fr', alignItems: 'center' }}>
                    <div className="text-center">
                        <p className="text-xs uppercase tracking-wider" style={{ color: colors.earth }}>Beginning CFS</p>
                        <p className="text-xs" style={{ color: colors.earthDark }}>Jan 1, 2025</p>
                        <p className="text-sm font-bold mono mt-1" style={{ color: colors.primary }}>Cash {fmt(cvsCFS.beginning)}</p>
                        {withSolution && (
                            <p className="text-xs italic mt-1 mono" style={{ color: colors.success }}>
                                = {fmt(cashRecon.beg.ccEquiv)} + restricted {fmt(cashRecon.beg.restrCurr + cashRecon.beg.restrOther)}
                            </p>
                        )}
                    </div>
                    <div className="text-center" style={{ borderLeft: `1px solid ${colors.earthLight}`, borderRight: `1px solid ${colors.earthLight}` }}>
                        <p className="text-xs uppercase tracking-wider" style={{ color: colors.error }}>CFS net change</p>
                        <p className="text-lg font-bold mono" style={{ color: colors.error }}>{fmt(cvsCFS.netChange)}</p>
                        <p className="text-xs italic" style={{ color: colors.earth }}>"Cash, cash equivalents and restricted cash"</p>
                    </div>
                    <div className="text-center">
                        <p className="text-xs uppercase tracking-wider" style={{ color: colors.earth }}>Ending CFS</p>
                        <p className="text-xs" style={{ color: colors.earthDark }}>Dec 31, 2025</p>
                        <p className="text-sm font-bold mono mt-1" style={{ color: colors.primary }}>Cash {fmt(cvsCFS.ending)}</p>
                        {withSolution && (
                            <p className="text-xs italic mt-1 mono" style={{ color: colors.success }}>
                                = {fmt(cashRecon.end.ccEquiv)} + restricted {fmt(cashRecon.end.restrCurr + cashRecon.end.restrOther)}
                            </p>
                        )}
                    </div>
                </div>
            );
        };

        // ============================================================
        // SolutionBridge — phase 11 only. The "read the labels" lesson
        // sits below the two strips and explains the gap explicitly.
        // ============================================================
        const SolutionBridge = () => {
            return (
                <div className="bg-white rounded-lg p-4 mb-4" style={{ border: `2px solid ${colors.success}`, backgroundColor: '#f0fdf4' }}>
                    <p className="text-xs uppercase font-bold tracking-wider" style={{ color: colors.success }}>The solution — read the labels</p>
                    <div className="mt-3 text-sm" style={{ color: colors.earthDark, lineHeight: '1.55' }}>
                        <p>
                            The Balance Sheet line reports <strong>"Cash and cash equivalents."</strong> The Cash Flow Statement's bottom-line reports <strong>"Cash, cash equivalents and restricted cash"</strong> — a broader category that picks up restricted cash classified inside <em>Other current assets</em> and <em>Other assets</em> on the BS face.
                        </p>
                        <div className="mt-3 mono text-xs" style={{ color: colors.earthDark }}>
                            <div className="grid" style={{ gridTemplateColumns: '1fr 5rem 5rem', columnGap: '0.5rem' }}>
                                <div></div>
                                <div className="text-right" style={{ color: colors.earth }}>Beg '24</div>
                                <div className="text-right" style={{ color: colors.earth }}>End '25</div>
                            </div>
                            <div className="grid" style={{ gridTemplateColumns: '1fr 5rem 5rem', columnGap: '0.5rem' }}>
                                <div>Cash &amp; cash equivalents (BS face)</div>
                                <div className="text-right">{fmt(cashRecon.beg.ccEquiv)}</div>
                                <div className="text-right">{fmt(cashRecon.end.ccEquiv)}</div>
                            </div>
                            <div className="grid" style={{ gridTemplateColumns: '1fr 5rem 5rem', columnGap: '0.5rem' }}>
                                <div>+ Restricted cash in Other current assets</div>
                                <div className="text-right">{fmt(cashRecon.beg.restrCurr)}</div>
                                <div className="text-right">{fmt(cashRecon.end.restrCurr)}</div>
                            </div>
                            <div className="grid" style={{ gridTemplateColumns: '1fr 5rem 5rem', columnGap: '0.5rem' }}>
                                <div>+ Restricted cash in Other assets</div>
                                <div className="text-right">{fmt(cashRecon.beg.restrOther)}</div>
                                <div className="text-right">{fmt(cashRecon.end.restrOther)}</div>
                            </div>
                            <div className="grid mt-1 pt-1 font-bold" style={{ gridTemplateColumns: '1fr 5rem 5rem', columnGap: '0.5rem', borderTop: `1px solid ${colors.earthDark}`, color: colors.primary }}>
                                <div>= Cash, cash equiv. &amp; restricted cash (per CFS)</div>
                                <div className="text-right">{fmt(cashRecon.beg.total)}</div>
                                <div className="text-right">{fmt(cashRecon.end.total)}</div>
                            </div>
                        </div>
                        <p className="mt-3 italic">
                            Each explanatory statement explains a <strong>specific change</strong> defined by its own scope. The BS Cash line and the CFS bottom-line are <strong>not</strong> tracking the same thing — their labels are different, and that label difference contains real information. Read the labels.
                        </p>
                    </div>
                </div>
            );
        };

        // ============================================================
        // SoCEReferenceStrip — for phases 15–18 while the BSes step
        // aside. Compact recap of what the SoCE has to explain: the
        // bucketed equity changes between the two BS dates.
        // ============================================================
        const SoCEReferenceStrip = () => {
            const beg = compactBS.y2024;
            const end = compactBS.y2025;
            const dC = end.contributed - beg.contributed;
            const dE = end.earnedRetained - beg.earnedRetained;
            const dN = end.nci - beg.nci;
            const dT = end.totalEq - beg.totalEq;
            const bucketCell = (label, begV, endV, delta) => (
                <div className="text-xs" style={{ color: colors.earthDark }}>
                    <div className="font-bold" style={{ color: colors.primary }}>{label}</div>
                    <div className="mono">{fmt(begV)} → {fmt(endV)}</div>
                    <div className="mono font-bold" style={{ color: delta < 0 ? colors.error : (delta > 0 ? colors.success : colors.earth) }}>
                        Δ {fmt(delta)}
                    </div>
                </div>
            );
            return (
                <div className="bg-white rounded-lg p-3 mb-4 grid gap-3"
                     style={{ border: `1px solid ${colors.earthLight}`, gridTemplateColumns: '0.6fr 1fr 1fr 1fr 1fr', alignItems: 'center' }}>
                    <div className="text-xs">
                        <p className="uppercase tracking-wider font-semibold" style={{ color: colors.earth }}>What the SoCE explains</p>
                        <p className="italic" style={{ color: colors.earthDark }}>changes between Dec 31, 2024 and Dec 31, 2025</p>
                    </div>
                    {bucketCell('Contributed', beg.contributed, end.contributed, dC)}
                    {bucketCell('Earned & retained', beg.earnedRetained, end.earnedRetained, dE)}
                    {bucketCell('NCI', beg.nci, end.nci, dN)}
                    {bucketCell('Total equities', beg.totalEq, end.totalEq, dT)}
                </div>
            );
        };

        // ============================================================
        // SoCEDocumentForm — full multi-year SoCE as it appears in the
        // 10-K, with progressive transformations driven by props:
        //   dimmedYears: array of years to dim (phase 16)
        //   bucketed:    when true, collapse the 5 component columns +
        //                share counts into 3 bucket columns + Total (phase 17+)
        //   movementsVisible: 0–6, how many of the 2025 movement rows have
        //                "lit up" so far in the sequential reveal (phase 18)
        // ============================================================
        const SoCEDocumentForm = ({ hideIrrelevant, bucketed, movementsVisible }) => {
            // hideIrrelevant: true → collapse out every row that doesn't bear on
            // the 2025 period. The Dec 31, 2024 balance row stays visible (it's
            // the 2025 opening); everything else with year ≤ 2024 collapses.
            const shouldHide = (row) => {
                if (!hideIrrelevant) return false;
                if (row.type === 'balance' && row.year === 2024) return false; // 2025 opening
                if (row.year < 2025) return true;
                return false;
            };
            const isNetIncome2025 = (row) =>
                row.type === 'movement' && row.year === 2025 && row.label === 'Net income';

            // Columns in the original 10-K view
            const docColumns = cvsSoCE3Year.columns;
            // Columns in the bucketed view (Contributed / E&R / NCI / Total)
            const bucketColumns = [
                { key: 'contributed', label: 'Contributed', isBucket: true },
                { key: 'earnedRetained', label: 'Earned & retained', isBucket: true },
                { key: 'nci', label: 'NCI', isBucket: true },
                { key: 'total', label: 'Total', isTotal: true },
            ];
            const columnsToShow = bucketed ? bucketColumns : docColumns;

            // For the running total animation in phase 18, only the 2025
            // year-band is "active". Movement rows in 2025 that are within
            // movementsVisible are highlighted and contribute to the running
            // totals; rows beyond movementsVisible are not yet visible.
            // When bucketed, swap in the 4 aggregated rows in place of the 6 raw rows.
            const movement2025Rows = bucketed
                ? cvsSoCE2025Aggregated
                : cvsSoCE3Year.rows.filter(r => r.type === 'movement' && r.year === 2025);
            // Row list to actually render: in bucketed mode, splice aggregated rows
            // into the slot where the raw 2025 movements would have been.
            const rowsToRender = (() => {
                if (!bucketed) return cvsSoCE3Year.rows;
                const out = [];
                let inserted = false;
                cvsSoCE3Year.rows.forEach(row => {
                    if (row.type === 'movement' && row.year === 2025) {
                        if (!inserted) {
                            inserted = true;
                            cvsSoCE2025Aggregated.forEach(a => out.push(a));
                        }
                        return; // skip raw 2025 movements
                    }
                    out.push(row);
                });
                return out;
            })();

            // Numeric value to show for a cell — bucketed or raw.
            const cellValue = (row, col) => {
                if (col.isBucket) {
                    return soceBucketValue(row, col.key);
                }
                if (col.isTotal) {
                    return row.total;
                }
                return row[col.key];
            };
            const cellIsShares = (col) => col.isShares;

            const numCols = columnsToShow.length;
            const labelColumnWidth = '17rem';
            const dataColumnWidth = bucketed ? '6rem' : '4.5rem';
            const gridTemplate = `${labelColumnWidth} repeat(${numCols}, ${dataColumnWidth})`;
            const gridStyle = { display: 'grid', gridTemplateColumns: gridTemplate, columnGap: '0.5rem', alignItems: 'baseline' };

            const renderRow = (row, ri) => {
                const isBalance = row.type === 'balance';
                const rowHidden = shouldHide(row);
                const isActiveMovementYear = row.year === 2025 && row.type === 'movement';
                // In phase 18 animation: hide unlit 2025 movement rows
                let movementHidden = false;
                if (typeof movementsVisible === 'number' && isActiveMovementYear) {
                    const idx = movement2025Rows.indexOf(row);
                    if (idx >= movementsVisible) movementHidden = true;
                }
                const baseColor = isBalance ? colors.primary : colors.earthDark;
                const fontWeight = isBalance ? 700 : 500;
                return (
                    <div
                        key={ri}
                        className={`cfs-doc-row ${(rowHidden || movementHidden) ? 'hidden' : ''}`}
                        style={{
                            ...gridStyle,
                            paddingTop: isBalance ? '0.35rem' : '0.15rem',
                            marginTop: isBalance ? '0.35rem' : 0,
                            borderTop: isBalance ? `1px solid ${colors.earthDark}` : 'none',
                            fontWeight,
                            color: baseColor,
                        }}
                    >
                        <div style={{ fontSize: '0.78rem', lineHeight: '1.3' }}>{row.label}</div>
                        {columnsToShow.map(col => {
                            const v = cellValue(row, col);
                            if (typeof v !== 'number' || v === 0 || v === undefined) {
                                return <div key={col.key} className="text-right" style={{ color: colors.earth }}>—</div>;
                            }
                            const isCurrency = !cellIsShares(col);
                            const colorOverride = isCurrency && v < 0 ? colors.error : (col.isTotal || col.isBucket ? colors.primary : 'inherit');
                            return (
                                <div key={col.key} className="text-right mono" style={{ fontSize: '0.78rem', color: colorOverride }}>
                                    {fmt(v)}
                                </div>
                            );
                        })}
                    </div>
                );
            };

            // Running totals row (phase 18 only): shows the cumulative sum of
            // the visible 2025 movement rows applied to the 2024 opening balance.
            const runningRow = (() => {
                if (typeof movementsVisible !== 'number' || !bucketed) return null;
                const opening2024 = cvsSoCE3Year.rows.find(r => r.type === 'balance' && r.year === 2024);
                if (!opening2024) return null;
                const acc = { contributed: soceBucketValue(opening2024, 'contributed'),
                              earnedRetained: soceBucketValue(opening2024, 'earnedRetained'),
                              nci: soceBucketValue(opening2024, 'nci'),
                              total: opening2024.total };
                for (let i = 0; i < movementsVisible; i++) {
                    const m = movement2025Rows[i];
                    if (!m) break;
                    acc.contributed += soceBucketValue(m, 'contributed');
                    acc.earnedRetained += soceBucketValue(m, 'earnedRetained');
                    acc.nci += soceBucketValue(m, 'nci');
                    acc.total += (m.total || 0);
                }
                return (
                    <div style={{
                        ...gridStyle,
                        marginTop: '0.5rem',
                        paddingTop: '0.4rem',
                        borderTop: `2px dashed ${colors.accent}`,
                        fontWeight: 700,
                        color: colors.accent,
                    }}>
                        <div style={{ fontSize: '0.78rem', fontStyle: 'italic' }}>
                            Running total ({movementsVisible} of {movement2025Rows.length})
                        </div>
                        {bucketColumns.map(col => (
                            <div key={col.key} className="text-right mono" style={{ fontSize: '0.78rem' }}>
                                {fmt(acc[col.key])}
                            </div>
                        ))}
                    </div>
                );
            })();

            return (
                <div className="bg-white rounded-lg p-6 mx-auto" style={{ maxWidth: bucketed ? '780px' : '1040px', backgroundColor: colors.paper, border: `1px solid ${colors.earthLight}` }}>
                    <p className="text-xs uppercase tracking-wider" style={{ color: colors.earth }}>Index to Consolidated Financial Statements</p>
                    <h2 className="text-lg font-bold mt-1" style={{ color: colors.primary }}>Consolidated Statements of Shareholders’ Equity</h2>
                    <p className="text-xs italic mt-1" style={{ color: colors.earth }}>{bucketed ? 'Bucketed view · in $ millions' : 'In millions'}</p>

                    <div className="mt-4">
                        {/* Column headers */}
                        <div style={{ ...gridStyle, paddingBottom: '0.25rem', borderBottom: `1px solid ${colors.earthLight}` }}>
                            <div></div>
                            {columnsToShow.map(col => (
                                <div key={col.key} className="text-right" style={{ color: colors.primary, fontWeight: 600, fontSize: '0.7rem', lineHeight: '1.15' }}>
                                    {col.label}
                                </div>
                            ))}
                        </div>

                        {/* Rows */}
                        {rowsToRender.map((row, ri) => renderRow(row, ri))}

                        {/* Running total (phase 18 only) */}
                        {runningRow}
                    </div>
                </div>
            );
        };

        // ============================================================
        // SoCECenter — the bucketed SoCE in the 3-up architecture grid
        // (phase 19+). Three bucket columns + Total. Movement rows for
        // 2025 explain each bucket's change. Buckets become expandable
        // at phase 20 to show the underlying 10-K columns.
        // ============================================================
        const SoCECenter = ({ phase, movementsVisible, expanded, toggleBucket }) => {
            const opening = cvsSoCE3Year.rows.find(r => r.type === 'balance' && r.year === 2024);
            const closing = cvsSoCE3Year.rows.find(r => r.type === 'balance' && r.year === 2025);
            // Bucketed views always use the 4 aggregated rows for 2025.
            const movements = cvsSoCE2025Aggregated;
            const bucketColumns = [
                { key: 'contributed', label: 'Contributed', subKeys: ['commonStock', 'treasuryStock'] },
                { key: 'earnedRetained', label: 'Earned & retained', subKeys: ['retainedEarnings', 'aoci'] },
                { key: 'nci', label: 'NCI', subKeys: ['nci'] },
            ];
            const labelMap = { commonStock: 'Common Stock & Cap Surplus', treasuryStock: 'Treasury Stock', retainedEarnings: 'Retained Earnings', aoci: 'AOCI', nci: 'NCI (raw)' };
            const numCols = bucketColumns.length + 1; // + Total
            const gridStyle = { display: 'grid', gridTemplateColumns: `1fr repeat(${numCols}, 4rem)`, columnGap: '0.35rem', alignItems: 'baseline' };

            return (
                <div className="rounded-lg p-4 bg-white" style={{ border: `1px solid ${colors.earthLight}` }}>
                    <p className="text-xs uppercase tracking-wider font-semibold" style={{ color: colors.earth }}>From the 10-K · page 98</p>
                    <h3 className="text-base font-bold" style={{ color: colors.primary }}>Statement of Shareholders’ Equity</h3>
                    <p className="text-xs italic" style={{ color: colors.earth }}>Year ended December 31, 2025 · bucketed · in $ millions</p>

                    <div className="mt-3">
                        {/* Column headers */}
                        <div style={{ ...gridStyle, paddingBottom: '0.25rem', borderBottom: `1px solid ${colors.earthLight}` }}>
                            <div></div>
                            {bucketColumns.map(col => (
                                <div key={col.key} className="text-right" style={{ color: colors.primary, fontWeight: 600, fontSize: '0.72rem' }}>
                                    {col.label}
                                </div>
                            ))}
                            <div className="text-right" style={{ color: colors.primary, fontWeight: 600, fontSize: '0.72rem' }}>Total</div>
                        </div>

                        {/* Opening balance */}
                        <div style={{ ...gridStyle, paddingTop: '0.4rem', fontWeight: 700, color: colors.primary }}>
                            <div style={{ fontSize: '0.78rem' }}>Balance at Dec 31, 2024</div>
                            {bucketColumns.map(col => (
                                <div key={col.key} className="text-right mono" style={{ fontSize: '0.78rem' }}>
                                    {fmt(soceBucketValue(opening, col.key))}
                                </div>
                            ))}
                            <div className="text-right mono" style={{ fontSize: '0.78rem' }}>{fmt(opening.total)}</div>
                        </div>

                        {/* Movement rows */}
                        {movements.map((m, mi) => (
                            <div
                                key={mi}
                                className={`cfs-section-row ${mi < movementsVisible ? 'visible' : ''}`}
                                style={{ ...gridStyle, paddingTop: '0.2rem', color: colors.earthDark }}
                            >
                                <div style={{ fontSize: '0.72rem', lineHeight: '1.3' }}>{m.label}</div>
                                {bucketColumns.map(col => {
                                    const v = soceBucketValue(m, col.key);
                                    if (v === 0) return <div key={col.key} className="text-right" style={{ color: colors.earth, fontSize: '0.75rem' }}>—</div>;
                                    return (
                                        <div key={col.key} className="text-right mono" style={{ fontSize: '0.75rem', color: v < 0 ? colors.error : colors.earthDark }}>
                                            {fmt(v)}
                                        </div>
                                    );
                                })}
                                <div className="text-right mono" style={{ fontSize: '0.75rem', color: m.total < 0 ? colors.error : colors.earthDark }}>
                                    {fmt(m.total)}
                                </div>
                            </div>
                        ))}

                        {/* Closing balance */}
                        <div style={{ ...gridStyle, marginTop: '0.4rem', paddingTop: '0.3rem', borderTop: `2px solid ${colors.primary}`, fontWeight: 700, color: colors.primary }}>
                            <div style={{ fontSize: '0.78rem' }}>Balance at Dec 31, 2025</div>
                            {bucketColumns.map(col => (
                                <div key={col.key} className="text-right mono" style={{ fontSize: '0.78rem' }}>
                                    {fmt(soceBucketValue(closing, col.key))}
                                </div>
                            ))}
                            <div className="text-right mono" style={{ fontSize: '0.78rem' }}>{fmt(closing.total)}</div>
                        </div>

                        {/* Expandable per-bucket detail (phase 20) */}
                        {phase >= 20 && (
                            <div className="mt-4">
                                <p className="text-xs uppercase font-bold tracking-wider mb-2" style={{ color: colors.primary }}>Underlying 10-K columns</p>
                                {bucketColumns.map(col => (
                                    <div key={col.key} className="mt-1">
                                        <div
                                            className="cfs-section-toggle"
                                            onClick={() => toggleBucket(col.key)}
                                            style={{
                                                display: 'grid',
                                                gridTemplateColumns: '1.25rem 1fr',
                                                alignItems: 'center',
                                                padding: '0.3rem 0.25rem',
                                                borderBottom: `1px solid ${colors.earthLight}`,
                                                cursor: 'pointer',
                                            }}
                                        >
                                            <div style={{ color: colors.earth, fontSize: '0.75rem' }}>
                                                {expanded[col.key] ? '▼' : '▶'}
                                            </div>
                                            <div className="text-sm" style={{ color: colors.earthDark, fontWeight: 600 }}>
                                                {col.label}
                                            </div>
                                        </div>
                                        <div className={`cfs-detail-panel ${expanded[col.key] ? 'open' : ''}`}
                                             style={{ backgroundColor: '#fafaf7', padding: expanded[col.key] ? '0.5rem 0.5rem 0.5rem 1.25rem' : '0 0.5rem 0 1.25rem' }}>
                                            {col.subKeys.map(sk => {
                                                const begV = opening[sk] || 0;
                                                const endV = closing[sk] || 0;
                                                return (
                                                    <div key={sk} className="grid" style={{ gridTemplateColumns: '1fr 4rem 4rem', padding: '0.2rem 0', columnGap: '0.5rem' }}>
                                                        <div style={{ color: colors.earthDark, fontSize: '0.75rem' }}>{labelMap[sk]}</div>
                                                        <div className="text-right mono" style={{ fontSize: '0.75rem', color: begV < 0 ? colors.error : colors.earthDark }}>{fmt(begV)}</div>
                                                        <div className="text-right mono" style={{ fontSize: '0.75rem', color: endV < 0 ? colors.error : colors.earthDark }}>{fmt(endV)}</div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ============================================================
        // ISDocumentForm — full multi-year Income Statement as in the
        // 10-K, with progressive collapse driven by props:
        //   dimmedYears: years to dim (phase 22)
        //   collapseLevel: 'none' | 'subtotals' | 'bottomline' (phases 23, 24)
        //   showCI: when true, append the Comprehensive Income statement
        //           below (phase 25)
        // ============================================================
        const ISDocumentForm = ({ dimmedYears, collapseLevel, showCI }) => {
            const isDim = (y) => dimmedYears && dimmedYears.includes(y);
            const hideLineItems = collapseLevel === 'subtotals' || collapseLevel === 'bottomline';
            const hideSectionHeaders = collapseLevel === 'subtotals' || collapseLevel === 'bottomline';
            const hideSectionSubtotals = collapseLevel === 'bottomline';
            const hideOperatingIncome = collapseLevel === 'bottomline';
            const hideNonOperating = collapseLevel === 'bottomline';
            const hideIncomeBeforeTax = collapseLevel === 'bottomline';
            const hideIncomeTax = collapseLevel === 'bottomline';

            const years = ['y2025', 'y2024', 'y2023'];
            const yearLabels = { y2025: '2025', y2024: '2024', y2023: '2023' };
            const renderCell = (item, y) => {
                if (item.dashFor && item.dashFor.includes(y)) {
                    return <span style={{ color: colors.earth }}>—</span>;
                }
                const v = item[y];
                if (typeof v !== 'number') return <span style={{ color: colors.earth }}>—</span>;
                return <span className="mono" style={{ color: v < 0 ? colors.error : 'inherit' }}>{fmt(v)}</span>;
            };
            const gridStyle = { display: 'grid', gridTemplateColumns: '1fr 5rem 5rem 5rem', columnGap: '0.5rem', alignItems: 'baseline' };

            const dataRow = (row, hidden, key, extraStyle = {}) => (
                <div key={key} className={`cfs-doc-row ${hidden ? 'hidden' : ''}`} style={{ ...gridStyle, paddingTop: '0.15rem', color: colors.earthDark, ...extraStyle }}>
                    <div style={{ fontSize: '0.82rem', lineHeight: '1.35' }}>{row.label}</div>
                    {years.map(y => (
                        <div key={y} className={`text-right cfs-col ${isDim(y) ? 'dim' : ''}`}>{renderCell(row, y)}</div>
                    ))}
                </div>
            );
            const subtotalRow = (row, hidden, key) => (
                <div key={key} className={`cfs-doc-row ${hidden ? 'hidden' : ''}`} style={{
                    ...gridStyle, marginTop: '0.3rem', paddingTop: '0.3rem',
                    borderTop: `1px solid ${colors.earthDark}`, fontWeight: 600, color: colors.primary,
                }}>
                    <div style={{ fontSize: '0.85rem' }}>{row.label}</div>
                    {years.map(y => (
                        <div key={y} className={`text-right cfs-col ${isDim(y) ? 'dim' : ''}`}>{renderCell(row, y)}</div>
                    ))}
                </div>
            );
            const finalRow = (row, key) => (
                <div key={key} className="cfs-doc-row" style={{
                    ...gridStyle, marginTop: '0.3rem', paddingTop: '0.3rem',
                    borderTop: `2px solid ${colors.primary}`, fontWeight: 700, color: colors.primary,
                }}>
                    <div style={{ fontSize: '0.85rem' }}>{row.label}</div>
                    {years.map(y => (
                        <div key={y} className={`text-right cfs-col ${isDim(y) ? 'dim' : ''}`}>{renderCell(row, y)}</div>
                    ))}
                </div>
            );

            return (
                <div className="bg-white rounded-lg p-6 mx-auto" style={{ maxWidth: '880px', backgroundColor: colors.paper, border: `1px solid ${colors.earthLight}` }}>
                    <p className="text-xs uppercase tracking-wider" style={{ color: colors.earth }}>Index to Consolidated Financial Statements</p>
                    <h2 className="text-lg font-bold mt-1" style={{ color: colors.primary }}>Consolidated Statements of Operations</h2>
                    <p className="text-xs italic mt-1" style={{ color: colors.earth }}>For the Years Ended December 31,</p>
                    <p className="text-xs italic" style={{ color: colors.earth }}>In millions, except per share amounts</p>

                    <div className="mt-4 text-sm">
                        <div style={{ ...gridStyle, paddingBottom: '0.25rem', borderBottom: `1px solid ${colors.earthLight}` }}>
                            <div></div>
                            {years.map(y => (
                                <div key={y} className={`text-right font-semibold cfs-col ${isDim(y) ? 'dim' : ''}`} style={{ color: colors.primary }}>{yearLabels[y]}</div>
                            ))}
                        </div>

                        {cvsIS3Year.sections.map((section, si) => (
                            <div key={si}>
                                <div className={`cfs-doc-row ${hideSectionHeaders ? 'hidden' : ''}`} style={{ marginTop: '0.75rem' }}>
                                    <div className="font-bold" style={{ color: colors.primary }}>{section.header}</div>
                                </div>
                                {section.items.map((item, ii) => dataRow(item, hideLineItems, `s${si}-i${ii}`))}
                                {subtotalRow(section.subtotal, hideSectionSubtotals, `s${si}-sub`)}
                            </div>
                        ))}

                        {subtotalRow(cvsIS3Year.operatingIncome, hideOperatingIncome, 'op-inc')}
                        {cvsIS3Year.nonOperating.map((item, ii) => dataRow(item, hideNonOperating, `nop-${ii}`, { marginTop: ii === 0 ? '0.4rem' : 0 }))}
                        {subtotalRow(cvsIS3Year.incomeBeforeTax, hideIncomeBeforeTax, 'ibt')}
                        {dataRow(cvsIS3Year.incomeTax, hideIncomeTax, 'tax')}
                        {subtotalRow(cvsIS3Year.netIncome, false, 'ni')}
                        {dataRow(cvsIS3Year.nciLine, false, 'nci')}
                        {finalRow(cvsIS3Year.netIncomeCVS, 'ni-cvs')}
                    </div>

                    {showCI && (
                        <div className="mt-8 pt-5" style={{ borderTop: `2px dashed ${colors.accent}` }}>
                            <p className="text-xs uppercase tracking-wider" style={{ color: colors.earth }}>Index to Consolidated Financial Statements</p>
                            <h2 className="text-lg font-bold mt-1" style={{ color: colors.primary }}>Consolidated Statements of Comprehensive Income</h2>
                            <p className="text-xs italic mt-1" style={{ color: colors.earth }}>For the Years Ended December 31, · in millions</p>

                            <div className="mt-3 text-sm">
                                {dataRow(cvsCI3Year.netIncome, false, 'ci-ni')}
                                <div style={{ marginTop: '0.5rem' }}>
                                    <div className="font-bold" style={{ color: colors.primary, fontSize: '0.85rem' }}>Other comprehensive income (loss), net of tax:</div>
                                </div>
                                {cvsCI3Year.ociItems.map((item, ii) => dataRow(item, false, `oci-${ii}`))}
                                {subtotalRow(cvsCI3Year.oci, false, 'oci-total')}
                                {subtotalRow(cvsCI3Year.comprehensiveIncome, false, 'ci')}
                                {dataRow(cvsCI3Year.nciLine, false, 'ci-nci')}
                                {finalRow(cvsCI3Year.ciCVS, 'ci-cvs')}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ============================================================
        // ISReferenceStrip — for phases 21–25 while the BSes step aside
        // (parallel to BSReferenceStrip and SoCEReferenceStrip). The
        // "question" the IS will answer is what Net Income looks like
        // and how it splits between CVS shareholders and NCI — tied to
        // the SoCE's Earned & Retained drop of $(1,115) and the NCI
        // bucket's loss of $(40).
        // ============================================================
        const ISReferenceStrip = () => {
            const cell = (label, value, sub) => (
                <div className="text-xs text-center" style={{ color: colors.earthDark }}>
                    <div className="font-bold" style={{ color: colors.primary }}>{label}</div>
                    <div className="mono" style={{ fontSize: '0.78rem' }}>{value}</div>
                    {sub && <div className="italic" style={{ color: colors.earth, fontSize: '0.7rem' }}>{sub}</div>}
                </div>
            );
            return (
                <div className="bg-white rounded-lg p-3 mb-4 grid gap-3"
                     style={{ border: `1px solid ${colors.earthLight}`, gridTemplateColumns: '0.7fr 1fr 1fr 1fr 1fr', alignItems: 'center' }}>
                    <div className="text-xs">
