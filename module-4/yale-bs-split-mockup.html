                            className="px-4 py-2 rounded-lg border bg-white text-sm cursor-pointer disabled:cursor-not-allowed"
                            style={{ borderColor: colors.earthLight, color: phase === 1 ? colors.earth : colors.primary, opacity: phase === 1 ? 0.5 : 1 }}>
                        ← Back
                    </button>
                    <button onClick={advance} disabled={phase === 24}
                            className="px-4 py-2 rounded-lg font-bold text-white text-sm border-0 cursor-pointer disabled:cursor-not-allowed"
                            style={{ backgroundColor: colors.primary, opacity: phase === 24 ? 0.5 : 1 }}>
                        {phase < 24 ? 'Next →' : 'End of mockup'}
                    </button>
                </div>
            );

            return (
                <div className="max-w-6xl mx-auto p-4">
                    <Header />

                    <div className="mb-4 p-3 rounded-lg" style={{ backgroundColor: '#fef9e7', border: `2px solid ${colors.accent}` }}>
                        <p className="text-sm" style={{ color: colors.earthDark }}>
                            <strong>Mockup:</strong> Visual choreography for Tutorial 4.2 (Yale University). Built in parallel
                            with 4.1 (CVS Health). All values in $ millions (Yale's report uses thousands; we round). Same
                            architecture from Module 3, with NFP-specific labels and bucketing. 24 phases: Part I — SFP
                            (1–6, mirroring CVS's BS choreography: document form → what's NOT on the SFP → strip to totals →
                            split with year-swap → re-expand → compact + bucket + ask about cash); Part II — CFS (7–14, with
                            a cash-in-investments mismatch + Note c reconciliation parallel to CVS's restricted cash);
                            Part III — Statement of Activities (15–23, doing IS + SoCE work combined, with "Net assets
                            released from restrictions" as a unique NFP beat); Part IV — Synthesis (24).
                            <br/><br/>
                            <strong>Current state:</strong> Part I (phases 1–6) is implemented. Phases 7–24 are stubbed.
                        </p>
                    </div>

                    <Narrative />
                    <Nav />

                    {phase === 1 && <SFPDocumentForm phase={phase} />}
                    {phase === 2 && <WhatsNotOnSFP />}
                    {phase === 3 && <SFPDocumentForm phase={phase} />}
                    {(phase === 4 || phase === 5) && <SFPSplit phase={phase} />}
                    {phase === 6 && <CompactSplit phase={phase} middle="question-cash" />}
                    {phase === 7 && (
                        <>
                            <BSReferenceStrip />
                            <SoCFDocumentForm dimmedColumns={[]} collapse="none" />
                        </>
                    )}
                    {phase === 8 && (
                        <>
                            <BSReferenceStrip />
                            <SoCFDocumentForm dimmedColumns={['y2024']} collapse="none" />
                        </>
                    )}
                    {phase === 9 && (
                        <>
                            <BSReferenceStrip />
                            <SoCFDocumentForm dimmedColumns={['y2024']} collapse="subtotals" />
                        </>
                    )}
                    {phase === 10 && (
                        <>
                            <BSReferenceStrip />
                            <SoCFDocumentForm dimmedColumns={['y2024']} collapse="netchange" />
                        </>
                    )}
                    {phase === 11 && (
                        <>
                            <BSReferenceStrip />
                            <CFSStrip withSolution={false} />
                            <MismatchNotice />
                        </>
                    )}
                    {phase === 12 && (
                        <>
                            <BSReferenceStrip />
                            <CFSStrip withSolution={true} />
                            <SolutionBridge />
                        </>
                    )}
                    {(phase === 13 || phase === 14) && (
                        <CompactSplit
                            phase={phase}
                            middle="cfs"
                            sectionsVisible={sectionsVisible}
                            expanded={expanded}
                            toggleSection={toggleSection}
                        />
                    )}
                    {phase >= 15 && <PhaseStub phase={phase} label={PHASES[phase-1].label} />}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
