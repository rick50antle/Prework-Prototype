<!-- React via CDN -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ===== PROMPT DATA BY AUDIENCE =====
const PROMPTS = {
  executive: [
    'Have you ever had a bonus, raise, or performance review tied to numbers drawn from an accounting system \u2014 net income, return on assets, a budget target?',
    'Have you ever seen a debt covenant, regulatory threshold, or contractual trigger where crossing a number had immediate consequences?',
    'Have you ever consulted financial reports when deciding whether to fund a project, enter a market, or extend credit?',
    'Have you ever watched people change their behavior because they knew how they were being counted?'
  ],
  'pre-experience': [
    'Has a club, team, or organization you were part of ever had a budget? Did the budget change how people spent?',
    'Have you ever looked at a company\u2019s financial reports \u2014 even briefly \u2014 when making a decision? Choosing between job offers, evaluating an investment, researching a company?',
    'Have you ever been in a situation where the way something was counted changed how people acted? (Think about grades, rankings, quotas \u2014 any system where the numbers shaped behavior.)',
    'Can you think of a situation where two people disagreed about the financial health of the same organization? What would it take for them to resolve that disagreement?'
  ],
  mixed: [
    'Think about an organization you know \u2014 a company, a nonprofit, a government agency. How many different people rely on its financial information? What different questions might they bring?',
    'Have you ever been in a situation where the way something was counted changed how people acted?',
    'Have you ever consulted financial reports when making a decision \u2014 about a job, an investment, a project, a purchase?',
    'Can you think of an example where accounting numbers had direct consequences \u2014 not just informing a choice, but triggering one automatically?'
  ]
};

const STORAGE_KEY = 'prework_reflect2';

// ===== INDIVIDUAL PROMPT CARD =====
function PromptCard({ index, text, savedResponse, onSave }) {
  const [value, setValue] = useState(savedResponse || '');
  const [saveNotice, setSaveNotice] = useState(false);
  const timerRef = useRef(null);

  const handleChange = useCallback((e) => {
    const newVal = e.target.value;
    setValue(newVal);

    // Auto-save after 800ms of inactivity
    if (timerRef.current) clearTimeout(timerRef.current);
    timerRef.current = setTimeout(() => {
      onSave(index, newVal);
      if (newVal.trim().length > 0) {
        setSaveNotice(true);
        setTimeout(() => setSaveNotice(false), 1500);
      }
    }, 800);
  }, [index, onSave]);

  // Save on blur immediately
  const handleBlur = useCallback(() => {
    if (timerRef.current) clearTimeout(timerRef.current);
    onSave(index, value);
  }, [index, value, onSave]);

  const hasResponse = value.trim().length > 0;

  return (
    <div className={`prompt-card ${hasResponse ? 'has-response' : ''}`}>
      <div className="prompt-number">
        Prompt {index + 1} of {PROMPTS.mixed.length}
        <span className={`save-notice ${saveNotice ? 'visible' : ''}`}>Saved</span>
      </div>
      <div className="prompt-text">{text}</div>
      <textarea
        value={value}
        onChange={handleChange}
        onBlur={handleBlur}
        placeholder="Write your response here..."
      />
      <div className="char-hint">
        {value.length > 0 ? `${value.length} characters` : ''}
      </div>
    </div>
  );
}

// ===== MAIN REFLECTION APP =====
function ReflectionApp() {
  const audience = (typeof SITE_CONFIG !== 'undefined' && SITE_CONFIG.audience) || 'mixed';
  const prompts = PROMPTS[audience] || PROMPTS.mixed;

  // Load saved responses from localStorage
  const [responses, setResponses] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      return saved;
    } catch (e) {
      return {};
    }
  });

  const handleSave = useCallback((index, value) => {
    setResponses(prev => {
      const updated = { ...prev, [index]: value };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));
      return updated;
    });
  }, []);

  const answeredCount = Object.values(responses).filter(v => v && v.trim().length > 0).length;

  return (
    <div>
      <p className="reflect-intro">
        Before moving on, take a moment to connect what you just read to your own experience.
      </p>
      <p className="reflect-note">
        These are not test questions and there are no right answers. Your responses are saved locally on your device and are not submitted anywhere.
      </p>

      <div className="progress-summary">
        <span className="check-count">{answeredCount} of {prompts.length}</span> prompts answered
      </div>

      {prompts.map((prompt, i) => (
        <PromptCard
          key={i}
          index={i}
          text={prompt}
          savedResponse={responses[i] || ''}
          onSave={handleSave}
        />
      ))}
    </div>
  );
}

// ===== MOUNT =====
const root = ReactDOM.createRoot(document.getElementById('react-root'));
root.render(<ReflectionApp />);
</script>
