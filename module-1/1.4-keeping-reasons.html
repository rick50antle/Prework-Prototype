<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial 1.4: Keeping the Reasons</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        @keyframes systemPulse {
            0%, 100% { opacity: 0.85; transform: scale(1); }
            50%      { opacity: 1;    transform: scale(1.02); }
        }
        .system-sorting { animation: systemPulse 1.2s ease-in-out infinite; }
        @keyframes rowFade {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .row-fade { animation: rowFade 0.5s ease-out; }
    </style>
</head>
<body class="min-h-screen" style="background-color: #f5f1e8;">
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        const { useState, useEffect } = React;

        /**
         * Tutorial 1.4: Keeping the Reasons
         * CMU METALS / Yale SOM Accounting Prework — Module 1
         *
         * @version 4.0
         * @date 2026-05-29
         * @description You're sitting at the spreadsheet, going through the details.
         *   The Noncash Assets, Liabilities, and Cash tabs are as you left them at
         *   the end of 1.3 — but the numbers now match the YALEiE workbook (lease,
         *   parts consumed, May rent expensed). A new Reasons tab gets filled in
         *   as Anna walks you through the why behind each line. The lesson lands
         *   when you see the Reasons tab in full: almost every entry has TWO
         *   reasons, one on each side. Double-entry, before the name.
         */

        // ============================================================
        // Color palette
        // ============================================================
        const colors = {
            primary: '#00356b',
            sand: '#f5f1e8',
            earth: '#8b7355',
            earthLight: '#d4c4a8',
            earthDark: '#5c4d3d',
            accent: '#c9a227',
            clay: '#c4a574',
            clayLight: '#e8dcc8',
            clayDark: '#a08050',
            success: '#22c55e',
            successBg: '#f0fdf4',
            warning: '#f59e0b',
            warningBg: '#fffbeb',
            error: '#dc2626',
            errorBg: '#fef2f2',
        };

        const dollarFmt = (n) => '$' + Number(n).toLocaleString('en-US');

        // ============================================================
        // Glossary
        // ============================================================
        const glossaryTerms = [
            { term: 'Asset',         definition: 'Something the entity has a present right to — a future economic benefit. Cash, equipment, supplies, prepaid rent.' },
            { term: 'Noncash Asset', definition: 'An asset that isn\'t cash — equipment, parts on the shelf, fixtures, a future right like prepaid rent.' },
            { term: 'Liability',     definition: 'An obligation — money you owe, or work you owe.' },
            { term: 'Cash',          definition: 'Money in the bank account. (For now, also the asset value of the bike-repair share of your personal account.)' },
            { term: 'Reason',        definition: 'The why behind a change in a Noncash Asset, Liability, or Cash. Lives on its own tab, one row per side of the change.' },
            { term: 'Prepaid Rent',  definition: 'Rent you\'ve already paid for a future month. A present right — an asset — until the month is used.' },
            { term: 'Contributed',   definition: 'Resources that came into the entity from outside the entity\'s repair work — personal cash put in, personal items brought from home.' },
            { term: 'Sales',         definition: 'Money earned from doing customer work. A reason that makes Cash go up.' },
            { term: 'Cost of repairs done', definition: 'The value of parts (and other resources) consumed in finished customer jobs. A reason that makes parts on the shelf go down.' },
        ];

        // ============================================================
        // Sound functions
        // ============================================================
        const createAudioContext = () => new (window.AudioContext || window.webkitAudioContext)();

        const playSuccessTone = () => {
            try {
                const ctx = createAudioContext();
                [523.25, 659.25, 783.99].forEach((freq, i) => {
                    const osc = ctx.createOscillator(); const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.frequency.value = freq; osc.type = 'sine';
                    const t = ctx.currentTime + i * 0.1;
                    gain.gain.setValueAtTime(0, t);
                    gain.gain.linearRampToValueAtTime(0.3, t + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
                    osc.start(t); osc.stop(t + 0.25);
                });
                setTimeout(() => ctx.close(), 600);
            } catch(e) {}
        };

        const playContinueClick = () => {
            try {
                const ctx = createAudioContext();
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.value = 880; osc.type = 'sine';
                gain.gain.setValueAtTime(0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
                setTimeout(() => ctx.close(), 200);
            } catch(e) {}
        };

        // ============================================================
        // DATA — Noncash Assets, Liabilities, Cash, Reasons
        // ============================================================

        // Noncash Assets (workbook numbers, post-month-end adjustments):
        // - Tools & Repair Equipment $1,350 (laptop 610 + hand tools 240 + stand 200 + tools 300)
        // - Supplies (Parts) $200 (after $300 of $500 consumed)
        // - Fixtures $750
        // - Prepaid Rent $650 (after May $650 expensed)
        const NONCASH_ASSETS = [
            {
                cat: 'TOOLS & REPAIR EQUIPMENT',
                items: [
                    { name: 'Laptop',                                    amount: 610 },
                    { name: 'Hand tools',                                amount: 240 },
                    { name: 'Park Tool repair stand',                    amount: 200 },
                    { name: 'Cone wrench set + other tools',             amount: 300 },
                ],
            },
            {
                cat: 'SUPPLIES (PARTS)',
                items: [
                    { name: 'Parts on the shelf (after $300 consumed)',  amount: 200 },
                ],
            },
            {
                cat: 'FIXTURES',
                items: [
                    { name: 'Workbench, shelving, display, pegboard',    amount: 750 },
                ],
            },
            {
                cat: 'PREPAID RENT',
                items: [
                    { name: "Next month's rent (held by landlord)",      amount: 650 },
                ],
            },
        ].map(c => ({ ...c, subtotal: c.items.reduce((s, i) => s + i.amount, 0) }));
        const NONCASH_ASSETS_TOTAL = NONCASH_ASSETS.reduce((s, c) => s + c.subtotal, 0); // 2950

        const LIABILITIES_SNAPSHOT = [
            { text: 'Smith — frame deposit (obligation to deliver).',        amount: 220 },
            { text: 'Bike-repair credit card balance (after $800 paydowns).', amount: 750 },
        ];
        const LIABILITIES_TOTAL = LIABILITIES_SNAPSHOT.reduce((s, l) => s + l.amount, 0); // 970

        // Cash flows mirror 1.3
        const CASH_FLOWS = [
            { date: 'May 1',  desc: 'Rent check — Westville Properties',    amount: -1300 },
            { date: 'May 3',  desc: 'Park Tool stand — Cyclesport Supply',  amount:  -200 },
            { date: 'May 7',  desc: 'Customer payment — Venmo',             amount:   340 },
            { date: 'May 10', desc: 'Customer payment — Venmo',             amount:   180 },
            { date: 'May 12', desc: 'Customer payment — Venmo',             amount:    80 },
            { date: 'May 14', desc: 'Customer payment — Venmo',             amount:   140 },
            { date: 'May 16', desc: 'Card paydown — Harborline Visa',       amount:  -400 },
            { date: 'May 19', desc: 'Customer payment — Venmo',             amount:   130 },
            { date: 'May 22', desc: 'Smith deposit — frame build',          amount:   220 },
            { date: 'May 23', desc: 'Customer payment — Venmo',             amount:   100 },
            { date: 'May 27', desc: 'Customer payment — Venmo',             amount:   150 },
            { date: 'May 28', desc: 'Card paydown — Harborline Visa',       amount:  -400 },
        ];

        // Reasons — one row per change on the spreadsheet. When an event changes
        // two spreadsheet accounts (a paired transaction), the SAME reason text
        // appears twice — once for each side. When an event changes only one
        // spreadsheet account (a contribution, a sales/earnings event, or an
        // expense like parts used or rent used), only ONE row appears: the other
        // side of that event lives somewhere not on this spreadsheet yet.
        const REASONS = [
            // Contributions (the other side is Equity, not on this spreadsheet) — solo
            { id: 'r1',  account: 'Tools & Repair Equipment', delta:  610, reason: 'You brought the laptop from home.' },
            { id: 'r2',  account: 'Tools & Repair Equipment', delta:  240, reason: 'You brought your hand tools from home.' },

            // Park Tool stand — cash purchase (paired, same reason both sides)
            { id: 'r3',  account: 'Tools & Repair Equipment', delta:  200, reason: 'You bought the Park Tool stand for $200.' },
            { id: 'r4',  account: 'Cash',                     delta: -200, reason: 'You bought the Park Tool stand for $200.' },

            // Wrench set + other tools on card (paired)
            { id: 'r5',  account: 'Tools & Repair Equipment', delta:  300, reason: 'You bought $300 of tools on the credit card.' },
            { id: 'r6',  account: 'Credit Card',              delta:  300, reason: 'You bought $300 of tools on the credit card.' },

            // Fixtures on card (paired)
            { id: 'r7',  account: 'Fixtures',                 delta:  750, reason: 'You bought $750 of fixtures on the credit card.' },
            { id: 'r8',  account: 'Credit Card',              delta:  750, reason: 'You bought $750 of fixtures on the credit card.' },

            // Parts on card (paired)
            { id: 'r9',  account: 'Supplies (Parts)',         delta:  500, reason: 'You bought $500 of parts on the credit card.' },
            { id: 'r10', account: 'Credit Card',              delta:  500, reason: 'You bought $500 of parts on the credit card.' },

            // Parts used (the other side is Cost of Repairs, not on this spreadsheet) — solo
            { id: 'r11', account: 'Supplies (Parts)',         delta: -300, reason: 'You used $300 of parts in customer jobs.' },

            // Lease — cash purchase (paired)
            { id: 'r12', account: 'Prepaid Rent',             delta: 1300, reason: 'You paid $1,300 of rent in advance for two months.' },
            { id: 'r13', account: 'Cash',                     delta:-1300, reason: 'You paid $1,300 of rent in advance for two months.' },

            // May rent expense (the other side is Rent Expense, not on this spreadsheet) — solo
            { id: 'r14', account: 'Prepaid Rent',             delta: -650, reason: 'You used the space for May.' },

            // Customer earnings (the other side is Sales, not on this spreadsheet) — solo
            { id: 'r15', account: 'Cash', delta:  340, reason: 'You did $340 of repair work (May 7).' },
            { id: 'r16', account: 'Cash', delta:  180, reason: 'You did $180 of repair work (May 10).' },
            { id: 'r17', account: 'Cash', delta:   80, reason: 'You did $80 of repair work (May 12).' },
            { id: 'r18', account: 'Cash', delta:  140, reason: 'You did $140 of repair work (May 14).' },
            { id: 'r19', account: 'Cash', delta:  130, reason: 'You did $130 of repair work (May 19).' },
            { id: 'r20', account: 'Cash', delta:  100, reason: 'You did $100 of repair work (May 23).' },
            { id: 'r21', account: 'Cash', delta:  150, reason: 'You did $150 of repair work (May 27).' },

            // Smith deposit (paired)
            { id: 'r22', account: 'Cash',          delta:  220, reason: "Smith paid $220 for a frame he hasn't gotten yet." },
            { id: 'r23', account: 'Owe Smith',     delta:  220, reason: "Smith paid $220 for a frame he hasn't gotten yet." },

            // Paydowns (paired)
            { id: 'r24', account: 'Credit Card',   delta: -400, reason: 'You paid $400 down on the credit card (May 16).' },
            { id: 'r25', account: 'Cash',          delta: -400, reason: 'You paid $400 down on the credit card (May 16).' },
            { id: 'r26', account: 'Credit Card',   delta: -400, reason: 'You paid $400 down on the credit card (May 28).' },
            { id: 'r27', account: 'Cash',          delta: -400, reason: 'You paid $400 down on the credit card (May 28).' },
        ];

        // Narration steps — Anna walks the student through the spreadsheet.
        // Each step reveals a set of REASONS into the Reasons tab.
        const NARRATION_STEPS = [
            {
                anna: "First, before May 1 even started, you remember bringing your laptop and your hand tools from home. They're bike-repair equipment now. One row each — the other side of that change isn't on this spreadsheet yet.",
                reveal: ['r1', 'r2'],
            },
            {
                anna: "The Park Tool stand — you bought it for $200. Tools went up; cash went down. Same reason on both rows.",
                reveal: ['r3', 'r4'],
            },
            {
                anna: "The rest of the equipment — the wrench set, the other small tools — those went on the credit card. Tools up, card up.",
                reveal: ['r5', 'r6'],
            },
            {
                anna: "Fixtures too — workbench, shelving, display rack, pegboard. All on the card.",
                reveal: ['r7', 'r8'],
            },
            {
                anna: "Supplies — you bought $500 of parts from QBP on the card. Then about $300 of those parts went into customer jobs already this month. The buy is paired; the using-up is one-sided.",
                reveal: ['r9', 'r10', 'r11'],
            },
            {
                anna: "The lease — $1,300 from cash, two months of rent paid in advance. Then May happened; you used the space, so one month's worth of prepaid rent is gone.",
                reveal: ['r12', 'r13', 'r14'],
            },
            {
                anna: "Now the cash tab. Every customer Venmo was money you earned. Click the Cash tab and watch the rest go in.",
                reveal: ['r15', 'r16', 'r17', 'r18', 'r19', 'r20', 'r21', 'r22', 'r23', 'r24', 'r25', 'r26', 'r27'],
                goto: 'cash',
            },
            {
                anna: "Click the Reasons tab. Look at the whole list.",
                reveal: [],
                goto: 'reasons',
            },
            {
                anna: "Notice anything? Look closely: most reasons appear in two rows. Same event, two changes. Bringing the laptop from home, the customer payments, the parts you used, the May rent expensed — those stand alone. We'll come back to them.",
                reveal: [],
                finish: true,
            },
        ];

        // ============================================================
        // App
        // ============================================================
        const App = () => {
            const [phase, setPhase] = useState('welcome');
            const [step, setStep] = useState(0); // narration step in the workbook phase
            const [activeTab, setActiveTab] = useState('noncash');
            const [expandedCats, setExpandedCats] = useState({
                'TOOLS & REPAIR EQUIPMENT': false,
                'SUPPLIES (PARTS)': false,
                'FIXTURES': false,
                'PREPAID RENT': false,
            });
            const [revealedReasonIds, setRevealedReasonIds] = useState(new Set());
            // Eliminate phase: cancel out matched pairs (same reason on two rows)
            const [eliminatedIds, setEliminatedIds] = useState(new Set());
            const [selectedReasonId, setSelectedReasonId] = useState(null);
            const [eliminateAutoActive, setEliminateAutoActive] = useState(false);
            const [eliminateAutoDone, setEliminateAutoDone] = useState(false);
            const [eliminateNudge, setEliminateNudge] = useState(null); // {reason: 'no-match'} | null
            // Sort-remaining phase: assign each solo row to Contributed or Earned
            const [categoryAssignments, setCategoryAssignments] = useState({}); // { rowId: 'contributed' | 'earned' }
            const [sortAutoActive, setSortAutoActive] = useState(false);
            const [sortAutoDone, setSortAutoDone] = useState(false);
            const [sortNudge, setSortNudge] = useState(null); // { rowId, attempted: 'contributed' | 'earned' } | null
            const [expandedSortCats, setExpandedSortCats] = useState({ contributed: true, earned: true });
            const [showGlossary, setShowGlossary] = useState(false);
            const [devMode, setDevMode] = useState(false);
            const [headerClickCount, setHeaderClickCount] = useState(0);

            // Truth table — which category each solo row belongs to.
            // Contributed: items brought in from outside the repair work (laptop, hand tools).
            // Earned: changes from doing the repair work — customer payments (sales) AND
            // the parts/rent used up to do those repairs.
            const CORRECT_CATEGORY = {
                r1:  'contributed', r2:  'contributed',
                r11: 'earned', r14: 'earned',
                r15: 'earned', r16: 'earned', r17: 'earned', r18: 'earned',
                r19: 'earned', r20: 'earned', r21: 'earned',
            };
            const soloReasonIds = Object.keys(CORRECT_CATEGORY);

            // ----- Derived -----
            const phaseOrder = ['welcome', 'workbook', 'eliminate', 'sort-remaining', 'complete'];
            const progress = Math.round((phaseOrder.indexOf(phase) / (phaseOrder.length - 1)) * 100);
            const currentStep = NARRATION_STEPS[step];
            const allStepsDone = step >= NARRATION_STEPS.length - 1 && currentStep && currentStep.finish;

            // Eliminate-phase derived
            const eliminatedPairsCount = eliminatedIds.size / 2;
            const visibleReasonRows = REASONS.filter(r => revealedReasonIds.has(r.id) && !eliminatedIds.has(r.id));
            const remainingPairsCount = (() => {
                const counts = {};
                visibleReasonRows.forEach(r => { counts[r.reason] = (counts[r.reason] || 0) + 1; });
                return Object.values(counts).filter(c => c === 2).length;
            })();
            const eliminateTriggerMet =
                eliminatedPairsCount >= 2 &&
                remainingPairsCount > 0 &&
                !eliminateAutoActive && !eliminateAutoDone;

            // Sort-remaining derived
            const correctlyAssignedCount = Object.entries(categoryAssignments)
                .filter(([id, cat]) => CORRECT_CATEGORY[id] === cat).length;
            const allSorted = correctlyAssignedCount === soloReasonIds.length;
            const sortTriggerMet =
                correctlyAssignedCount >= 2 && !allSorted &&
                !sortAutoActive && !sortAutoDone;

            // ----- Handlers -----
            const handleHeaderClick = () => {
                const n = headerClickCount + 1;
                setHeaderClickCount(n);
                if (n >= 3) { setDevMode(!devMode); setHeaderClickCount(0); }
            };

            const handleRestart = () => {
                playContinueClick();
                setPhase('welcome'); setStep(0);
                setActiveTab('noncash');
                setExpandedCats({
                    'TOOLS & REPAIR EQUIPMENT': false,
                    'SUPPLIES (PARTS)': false,
                    'FIXTURES': false,
                    'PREPAID RENT': false,
                });
                setRevealedReasonIds(new Set());
                setEliminatedIds(new Set()); setSelectedReasonId(null);
                setEliminateAutoActive(false); setEliminateAutoDone(false); setEliminateNudge(null);
                setCategoryAssignments({}); setSortAutoActive(false); setSortAutoDone(false); setSortNudge(null);
                setExpandedSortCats({ contributed: true, earned: true });
            };

            const handleCategoryAssign = (rowId, category) => {
                if (phase !== 'sort-remaining' || sortAutoActive || sortAutoDone) return;
                if (categoryAssignments[rowId]) return;
                if (CORRECT_CATEGORY[rowId] === category) {
                    playSuccessTone();
                    setCategoryAssignments(prev => ({ ...prev, [rowId]: category }));
                    setSortNudge(null);
                } else {
                    setSortNudge({ rowId, attempted: category });
                }
            };

            const handleSortAutocomplete = () => {
                if (sortAutoActive || sortAutoDone) return;
                playContinueClick();
                setSortAutoActive(true);
                setSortNudge(null);
                const unassigned = soloReasonIds.filter(id => !categoryAssignments[id]);
                unassigned.forEach((id, i) => {
                    setTimeout(() => {
                        setCategoryAssignments(prev => ({ ...prev, [id]: CORRECT_CATEGORY[id] }));
                        if (i === unassigned.length - 1) {
                            setTimeout(() => {
                                setSortAutoActive(false);
                                setSortAutoDone(true);
                                playSuccessTone();
                            }, 300);
                        }
                    }, i * 180);
                });
            };

            const toggleSortCat = (cat) =>
                setExpandedSortCats(prev => ({ ...prev, [cat]: !prev[cat] }));

            const handleReasonClick = (id) => {
                if (phase !== 'eliminate' || eliminatedIds.has(id)) return;
                if (eliminateAutoActive || eliminateAutoDone) return;
                if (selectedReasonId === id) { setSelectedReasonId(null); return; }
                if (selectedReasonId === null) {
                    playContinueClick();
                    setSelectedReasonId(id);
                    setEliminateNudge(null);
                    return;
                }
                const a = REASONS.find(r => r.id === selectedReasonId);
                const b = REASONS.find(r => r.id === id);
                if (a && b && a.reason === b.reason) {
                    playSuccessTone();
                    setEliminatedIds(prev => new Set([...prev, a.id, b.id]));
                    setSelectedReasonId(null);
                    setEliminateNudge(null);
                } else {
                    setEliminateNudge({ reason: 'no-match' });
                    setSelectedReasonId(null);
                }
            };

            const handleEliminateAutocomplete = () => {
                if (eliminateAutoActive || eliminateAutoDone) return;
                playContinueClick();
                setEliminateAutoActive(true);
                setSelectedReasonId(null);
                const visible = REASONS.filter(r => revealedReasonIds.has(r.id) && !eliminatedIds.has(r.id));
                const byReason = {};
                visible.forEach(r => {
                    if (!byReason[r.reason]) byReason[r.reason] = [];
                    byReason[r.reason].push(r.id);
                });
                const pairsToRemove = Object.values(byReason).filter(arr => arr.length === 2);
                pairsToRemove.forEach((pair, i) => {
                    setTimeout(() => {
                        setEliminatedIds(prev => new Set([...prev, ...pair]));
                        if (i === pairsToRemove.length - 1) {
                            setTimeout(() => {
                                setEliminateAutoActive(false);
                                setEliminateAutoDone(true);
                                playSuccessTone();
                            }, 300);
                        }
                    }, i * 220);
                });
            };

            const advanceNarration = () => {
                if (step >= NARRATION_STEPS.length - 1) return;
                playContinueClick();
                const s = NARRATION_STEPS[step];
                if (s.reveal && s.reveal.length > 0) {
                    setRevealedReasonIds(prev => new Set([...prev, ...s.reveal]));
                }
                if (s.goto) setActiveTab(s.goto);
                setStep(step + 1);
            };

            const toggleCat = (catName) =>
                setExpandedCats(prev => ({ ...prev, [catName]: !prev[catName] }));

            // ============================================================
            // Shared components
            // ============================================================
            const Header = () => (
                <div className="rounded-lg p-4 mb-4" style={{ backgroundColor: colors.primary }}>
                    <div className="flex justify-between items-start">
                        <div onClick={handleHeaderClick} style={{ cursor: 'pointer' }}>
                            <h1 className="text-lg font-bold text-white">Tutorial 1.4: Keeping the Reasons</h1>
                            <p className="text-sm mt-1" style={{ color: colors.earthLight }}>
                                Bicycle repair shop &middot; ~10 min
                            </p>
                        </div>
                        <div className="flex items-center gap-2">
                            <a href="../index.html"
                               className="p-2 rounded-lg hover:bg-white/10 text-white text-xl border-0 bg-transparent cursor-pointer no-underline inline-flex items-center justify-center"
                               title="Return to Main" aria-label="Return to Main">🏠</a>
                            <button onClick={() => setShowGlossary(true)}
                                    className="p-2 rounded-lg hover:bg-white/10 text-white text-xl border-0 bg-transparent cursor-pointer"
                                    title="Glossary" aria-label="Open glossary">📖</button>
                            <button onClick={handleRestart}
                                    className="p-2 rounded-lg hover:bg-white/10 text-white text-xl border-0 bg-transparent cursor-pointer"
                                    title="Restart tutorial" aria-label="Restart tutorial">↺</button>
                        </div>
                    </div>
                    <div className="mt-4">
                        <div className="flex justify-between text-xs mb-1" style={{ color: 'rgba(255,255,255,0.7)' }}>
                            <span>Progress</span>
                            <span>{progress}%</span>
                        </div>
                        <div className="h-2 rounded-full" style={{ backgroundColor: 'rgba(255,255,255,0.2)' }}
                             role="progressbar" aria-valuenow={progress} aria-valuemin={0} aria-valuemax={100}>
                            <div className="h-full rounded-full transition-all duration-500"
                                 style={{ width: `${progress}%`, backgroundColor: colors.accent }} />
                        </div>
                    </div>
                    {devMode && (
                        <div className="mt-3 pt-3" style={{ borderTop: '1px solid rgba(255,255,255,0.2)' }}>
                            <p className="text-xs mb-2" style={{ color: 'rgba(255,255,255,0.7)' }}>Dev: skip to phase</p>
                            <div className="flex flex-wrap gap-1">
                                {phaseOrder.map(p => (

                                            : <>"That one didn't come from doing repair work &mdash; you brought it in from outside. Try the other bin."</>}
                                    </p>
                                </div>
                            )}

                            {/* Excel workbook with the sort view on the Reasons tab */}
                            <div className="rounded-lg overflow-hidden mb-4"
                                 style={{
                                     border: `2px solid ${colors.accent}`,
                                     backgroundColor: 'white',
                                     boxShadow: '0 6px 18px rgba(0,0,0,0.12)',
                                 }}>
                                <div className="px-4 py-2 flex items-center justify-between"
                                     style={{
                                         background: 'linear-gradient(180deg, #138a4b 0%, #107C41 100%)',
                                         borderBottom: `1px solid #0e6b3a`,
                                         color: 'white',
                                     }}>
                                    <span className="text-sm font-semibold tracking-tight flex items-center gap-2">
                                        <span style={{ fontSize: '15px' }}>▦</span>
                                        <span className="mono">repair-lists.xlsx</span>
                                        <span className="text-xs font-normal opacity-75">— Excel</span>
                                    </span>
                                    <span className="text-xs mono opacity-75">Reasons sheet</span>
                                </div>

                                <div style={{ minHeight: '360px', backgroundColor: 'white' }}>
                                    {/* Unsorted rows with category buttons */}
                                    {unassigned.length > 0 && (
                                        <>
                                            <div className="px-3 py-2" style={{ backgroundColor: '#fafaf7', borderBottom: `1px solid ${colors.earthLight}` }}>
                                                <p className="text-xs uppercase tracking-wide font-bold" style={{ color: colors.earth }}>
                                                    To sort ({unassigned.length} {unassigned.length === 1 ? 'row' : 'rows'})
                                                </p>
                                            </div>
                                            {unassigned.map(r => (
                                                <div key={r.id} className="row-fade px-3 py-2"
                                                     style={{ borderBottom: `1px solid ${colors.earthLight}` }}>
                                                    <div className="grid items-center text-xs mb-1"
                                                         style={{ gridTemplateColumns: '1.4fr 80px 2.2fr' }}>
                                                        <span style={{ color: colors.earthDark }}>{r.account}</span>
                                                        <span className="mono text-right" style={{ color: r.delta > 0 ? '#166534' : colors.error }}>
                                                            {r.delta > 0 ? '+' : '−'}{dollarFmt(Math.abs(r.delta))}
                                                        </span>
                                                        <span style={{ color: colors.earthDark }}>{r.reason}</span>
                                                    </div>
                                                    <div className="flex gap-2 mt-1 ml-1">
                                                        <button onClick={() => handleCategoryAssign(r.id, 'contributed')}
                                                                className="text-xs px-2 py-1 rounded border cursor-pointer"
                                                                style={{ backgroundColor: 'white', borderColor: colors.primary, color: colors.primary }}>
                                                            → Contributed
                                                        </button>
                                                        <button onClick={() => handleCategoryAssign(r.id, 'earned')}
                                                                className="text-xs px-2 py-1 rounded border cursor-pointer"
                                                                style={{ backgroundColor: 'white', borderColor: colors.accent, color: colors.earthDark }}>
                                                            → Earned
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </>
                                    )}

                                    {/* Contributed dropdown */}
                                    {renderSortedSection('CONTRIBUTED', contributed, contributedTotal, 'contributed', colors.primary)}

                                    {/* Earned dropdown */}
                                    {renderSortedSection('EARNED', earned, earnedTotal, 'earned', colors.accent)}

                                    {/* Grand total */}
                                    {(contributed.length + earned.length) > 0 && (
                                        <div className="flex justify-between items-center py-2 px-3"
                                             style={{ borderTop: `2px solid ${colors.earthDark}`, backgroundColor: colors.sand }}>
                                            <span className="font-bold text-sm" style={{ color: colors.primary }}>
                                                <span className="inline-block w-4 mr-2"></span>TOTAL
                                            </span>
                                            <span className="mono text-sm font-bold" style={{ color: colors.primary }}>
                                                {(contributedTotal + earnedTotal) >= 0 ? '+' : '−'}
                                                {dollarFmt(Math.abs(contributedTotal + earnedTotal))}
                                            </span>
                                        </div>
                                    )}
                                </div>

                                {/* Tab strip (visual only) */}
                                <div className="flex" style={{ backgroundColor: '#e8e8e8', borderTop: `1px solid #c8c8c8` }}>
                                    {tabConfig.map(t => {
                                        const isActive = t.id === 'reasons';
                                        return (
                                            <div key={t.id}
                                                 className="px-4 py-2 text-sm font-medium"
                                                 style={{
                                                     backgroundColor: isActive ? 'white' : 'transparent',
                                                     color: isActive ? t.color : colors.earth,
                                                     borderTop: isActive ? `2px solid ${t.color}` : '2px solid transparent',
                                                     borderRight: `1px solid #c8c8c8`,
                                                     borderBottom: isActive ? '1px solid white' : 'none',
                                                     marginBottom: isActive ? '-1px' : '0',
                                                     cursor: 'default',
                                                 }}>
                                                {t.label}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {sortTriggerMet && (
                                <div className="rounded-lg p-3 mb-3 border-2"
                                     style={{ backgroundColor: '#fef9e7', borderColor: colors.accent }}>
                                    <p className="text-sm mb-2" style={{ color: colors.earthDark }}>
                                        <strong>You've got the rule.</strong> Sort the rest?
                                    </p>
                                    <button onClick={handleSortAutocomplete}
                                            className="w-full py-3 rounded-lg font-bold text-white border-0 cursor-pointer"
                                            style={{ backgroundColor: colors.primary }}>
                                        Sort the rest →
                                    </button>
                                </div>
                            )}

                            {sortAutoActive && (
                                <div className="rounded-lg p-4 mb-3 system-sorting"
                                     style={{ backgroundColor: colors.primary, color: 'white', textAlign: 'center' }}>
                                    <p className="text-base font-bold">⚙ Sorting the rest&hellip;</p>
                                </div>
                            )}

                            {(sortAutoDone || allSorted) && (
                                <>
                                    <AnnaBox>
                                        "There it is. Two kinds of changes. Things you put in &mdash;
                                        <strong> contributed</strong> &mdash; and what the shop produced from doing
                                        the repair work &mdash; <strong>earned</strong>. The earned side is what's
                                        left after all the costs of doing the work are netted against the customer
                                        payments. {earnedTotal >= 0
                                            ? <>For May, the shop came out ahead by <strong>+{dollarFmt(earnedTotal)}</strong>.</>
                                            : <>For May, the shop came out behind by <strong>−{dollarFmt(Math.abs(earnedTotal))}</strong>.</>}"
                                    </AnnaBox>
                                    <InsightPanel>
                                        <p className="font-semibold mb-2">Contributed and Earned.</p>
                                        <p>
                                            <strong>Contributed: {dollarFmt(contributedTotal)}.</strong> Items you
                                            brought from home &mdash; came from outside the repair work itself.
                                        </p>
                                        <p className="mt-2">
                                            <strong>Earned: {earnedTotal >= 0 ? '+' : '−'}{dollarFmt(Math.abs(earnedTotal))}.</strong>
                                            {' '}Customer payments minus the parts and rent it took to do the work.
                                            What the shop produced, on its own, in May.
                                        </p>
                                        <p className="mt-2">In 1.5, you&rsquo;ll see where these two live on the books
                                           &mdash; and put a name on the residual they add up to.</p>
                                    </InsightPanel>
                                    <ContinueButton onClick={() => setPhase('complete')}>
                                        Finish up
                                    </ContinueButton>
                                </>
                            )}
                        </div>
                        <GlossaryModal />
                    </div>
                );
            };

            const renderComplete = () => (
                <div className="min-h-screen" style={{ backgroundColor: colors.sand }}>
                    <div className="p-4 max-w-3xl mx-auto">
                        <Header />
                        <div className="text-center mb-6">
                            <p className="text-5xl mb-2">🏆</p>
                            <p className="text-xl font-bold" style={{ color: colors.primary }}>Tutorial 1.4 complete</p>
                        </div>
                        <div className="rounded-lg p-4 mb-4" style={{ backgroundColor: 'white', border: `1px solid ${colors.earthLight}` }}>
                            <h3 className="font-bold mb-3" style={{ color: colors.primary }}>What You Discovered</h3>
                            <ul className="space-y-2 text-sm" style={{ color: colors.earthDark }}>
                                <li className="flex gap-2"><span style={{ color: colors.success }}>✓</span>You filled in a Reasons tab — one row for each change to a spreadsheet account.</li>
                                <li className="flex gap-2"><span style={{ color: colors.success }}>✓</span>Most reason texts appear in two rows. Same event, two changes — pairs that show up by themselves once you write the reasons down.</li>
                                <li className="flex gap-2"><span style={{ color: colors.success }}>✓</span>A few rows stand alone — items brought from home, customer payments, parts used, May rent expensed. Each one affected something not on this spreadsheet yet.</li>
                                <li className="flex gap-2"><span style={{ color: colors.success }}>✓</span><strong>Assets &minus; Liabilities = Reasons.</strong> The paired changes cancel; what's left is exactly the difference between what the shop has and what it owes.</li>
                            </ul>
                        </div>

                        {/* Identity panel — Assets − Liabilities = Reasons, with the numbers */}
                        <div className="rounded-lg p-4 mb-4" style={{ backgroundColor: '#fef9e7', border: `2px solid ${colors.accent}` }}>
                            <p className="text-center text-sm font-bold mb-3 tracking-wide" style={{ color: colors.primary }}>
                                ASSETS &minus; LIABILITIES = REASONS
                            </p>
                            <div className="grid grid-cols-3 gap-3 text-xs" style={{ color: colors.earthDark }}>
                                <div className="rounded p-2" style={{ backgroundColor: 'white', border: `1px solid ${colors.earthLight}` }}>
                                    <p className="font-bold mb-1 text-center" style={{ color: colors.primary }}>Assets</p>
                                    <div className="flex justify-between mono"><span>Noncash</span><span>+$2,950</span></div>
                                    <div className="flex justify-between mono"><span>Cash</span><span>−$960</span></div>
                                    <div className="flex justify-between font-bold mono mt-1 pt-1" style={{ borderTop: `1px solid ${colors.earthDark}`, color: colors.primary }}>
                                        <span>Total</span><span>$1,990</span>
                                    </div>
                                </div>
                                <div className="rounded p-2 flex flex-col justify-between" style={{ backgroundColor: 'white', border: `1px solid ${colors.earthLight}` }}>
                                    <p className="font-bold mb-1 text-center" style={{ color: colors.primary }}>Liabilities</p>
                                    <div className="flex justify-between font-bold mono" style={{ color: colors.primary }}>
                                        <span>Total</span><span>$970</span>
                                    </div>
                                </div>
                                <div className="rounded p-2" style={{ backgroundColor: 'white', border: `1px solid ${colors.accent}` }}>
                                    <p className="font-bold mb-1 text-center" style={{ color: colors.accent }}>Reasons</p>
                                    <div className="flex justify-between mono"><span>Contributed</span><span>+$850</span></div>
                                    <div className="flex justify-between mono"><span>Earned</span><span>+$170</span></div>
                                    <div className="flex justify-between font-bold mono mt-1 pt-1" style={{ borderTop: `1px solid ${colors.earthDark}`, color: colors.accent }}>
                                        <span>Total</span><span>$1,020</span>
                                    </div>
                                </div>
                            </div>
                            <p className="text-center text-sm font-bold mono mt-3" style={{ color: colors.primary }}>
                                $1,990 &minus; $970 = $1,020 &nbsp;✓
                            </p>
                        </div>
                        <div className="rounded-lg p-4 mb-4" style={{ backgroundColor: colors.clayLight }}>
                            <h3 className="font-bold mb-2" style={{ color: colors.primary }}>Coming Next</h3>
                            <p className="text-sm mb-2" style={{ color: colors.earthDark }}>
                                In 1.5, you'll name the unpaired reasons &mdash; the contributions and the earnings &mdash;
                                and see where they live on the books.
                            </p>
                            <p className="font-bold" style={{ color: colors.primary }}>
                                Next: Tutorial 1.5 &mdash; Naming What You Built
                            </p>
                        </div>
                        <a href="1.5-naming-what-you-built.html"
                           className="block w-full py-3 rounded-lg font-bold text-white text-center no-underline mb-3"
                           style={{ backgroundColor: colors.primary }}>
                            Continue to Tutorial 1.5 →
                        </a>
                        <button onClick={handleRestart}
                                className="block w-full py-3 rounded-lg font-bold border-2 cursor-pointer mb-3"
                                style={{ backgroundColor: 'white', borderColor: colors.primary, color: colors.primary }}>
                            ↺ Restart tutorial
                        </button>
                        <GlossaryModal />
                    </div>
                </div>
            );

            // ============================================================
            // Router
            // ============================================================
            if (phase === 'welcome')        return renderWelcome();
            if (phase === 'workbook')       return renderWorkbook();
            if (phase === 'eliminate')      return renderEliminate();
            if (phase === 'sort-remaining') return renderSortRemaining();
            if (phase === 'complete')       return renderComplete();
            return null;
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
