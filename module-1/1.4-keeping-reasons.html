<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial 1.4: Keeping the Reasons</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="min-h-screen" style="background-color: #f5f1e8;">
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        const { useState } = React;

        const colors = {
            primary: '#00356b', sand: '#f5f1e8', earth: '#8b7355', earthLight: '#d4c4a8',
            earthDark: '#5c4d3d', accent: '#c9a227', clayLight: '#e8dcc8', clayDark: '#a08050',
            success: '#22c55e', successBg: '#f0fdf4', warning: '#f59e0b', warningBg: '#fffbeb',
            error: '#dc2626', errorBg: '#fef2f2',
        };

        // Each row has a `step` indicating which step it appears in.
        // Visible when current step >= row.step.
        // `txn` is the transaction reference (#1, #2, #3) shared by every entry generated by the same event.
        // It's the bookkeeping handle that links the rows together across tabs.
        const thingsRows = [
            { date: 'May 26', what: 'Cash',  change: '+$40',  note: 'Derailleur adjustment for a customer', step: 1, pos: '+', txn: 1 },
            { date: 'May 27', what: 'Parts', change: '+$300', note: 'QBP shipment received',                step: 2, pos: '+', txn: 2 },
            { date: 'Jun 26', what: 'Cash',  change: '−$300', note: 'Paid QBP',                              step: 3, pos: '−', txn: 3 },
            { date: 'Jul 5',  what: 'Cash',  change: '+$200', note: "Smith's deposit on a frame build",      step: 4, pos: '+', txn: 4 },
            // Txn 5 — frame delivery: no Things change (labor only; no parts pulled in this simplified version).
        ];
        const promisesRows = [
            { date: 'May 27', what: 'Owe QBP',   change: '+$300', note: 'Parts received on credit (net 30)', step: 2, pos: '+', txn: 2 },
            { date: 'Jun 26', what: 'Owe QBP',   change: '−$300', note: 'Paid the bill in full',              step: 3, pos: '−', txn: 3 },
            { date: 'Jul 5',  what: 'Owe Smith', change: '+$200', note: 'Frame build, paid up front',         step: 4, pos: '+', txn: 4 },
            { date: 'Aug 10', what: 'Owe Smith', change: '−$200', note: 'Frame delivered',                    step: 5, pos: '−', txn: 5 },
        ];
        // Reasons: one entry per Things/Promises entry, explaining WHY that change happened.
        // `redundant: true` means the reason just points at the other side of the same transaction
        // (i.e., it can be reconstructed from the other tab and isn't worth keeping in the third bucket).
        // For KEPT reasons (r1, r8), the sign reflects equity effect, not the paired-side sign —
        // so the surviving Reasons sum equals the total change in Things − Promises.
        const reasonsRows = [
            // Txn 1 — cash sale: only Things changes, so only one Reason. Not redundant.
            { id: 'r1', date: 'May 26', what: 'Earned',              change: '+$40',  note: 'From the derailleur job',      step: 1, pos: '+', redundant: false, pairedWith: 'Cash +$40',         txn: 1 },
            // Txn 2 — parts on credit: Things AND Promises change → two Reasons, each restating the other side.
            { id: 'r2', date: 'May 27', what: 'Bought on credit',    change: '+$300', note: 'Reason Parts went up',         step: 2, pos: '+', redundant: true,  pairedWith: 'Parts +$300',       txn: 2 },
            { id: 'r3', date: 'May 27', what: 'Got the parts',       change: '+$300', note: 'Reason Owe QBP went up',       step: 2, pos: '+', redundant: true,  pairedWith: 'Owe QBP +$300',    txn: 2 },
            // Txn 3 — pay QBP: Things AND Promises change → two more Reasons, each restating the other side.
            { id: 'r4', date: 'Jun 26', what: 'Promise settled',     change: '−$300', note: 'Reason Cash went down',        step: 3, pos: '−', redundant: true,  pairedWith: 'Cash −$300',        txn: 3 },
            { id: 'r5', date: 'Jun 26', what: 'Paid cash',           change: '−$300', note: 'Reason Owe QBP went down',     step: 3, pos: '−', redundant: true,  pairedWith: 'Owe QBP −$300',    txn: 3 },
            // Txn 4 — Smith prepayment: Things AND Promises change → two more Reasons, both redundant.
            { id: 'r6', date: 'Jul 5',  what: 'Took cash up front',  change: '+$200', note: 'Reason Cash went up',          step: 4, pos: '+', redundant: true,  pairedWith: 'Cash +$200',        txn: 4 },
            { id: 'r7', date: 'Jul 5',  what: 'Owe a frame build',   change: '+$200', note: 'Reason Owe Smith went up',     step: 4, pos: '+', redundant: true,  pairedWith: 'Owe Smith +$200',  txn: 4 },
            // Txn 5 — deliver the frame: only Promises changes, so only one Reason. Not redundant.
            // Sign is +$200 (equity effect — we earned the value) even though the paired Promise went DOWN.
            { id: 'r8', date: 'Aug 10', what: 'Earned',              change: '+$200', note: 'Built the frame as promised',  step: 5, pos: '+', redundant: false, pairedWith: 'Owe Smith −$200',  txn: 5 },
        ];

        // Which tabs were touched in each step (for the "tabs updated" hint)
        const stepTouched = {
            1: ['things', 'reasons'],
            2: ['things', 'promises', 'reasons'],
            3: ['things', 'promises', 'reasons'],
            4: ['things', 'promises', 'reasons'],
            5: ['promises', 'reasons'],
        };

        // Narrative per step
        const narratives = {
            0: {
                annaIntro: "OK. We're going to set up a way to record reasons as they happen — so we never have to spend an afternoon piecing things together again. You've got three buckets: Things, Promises, Reasons. What if you made a tab for each?",
                youThink: "Three tabs. One per bucket.",
                annaClose: "Yeah. The rule is simple: you record the change in the Things or Promises tab and record the Reason at the same time. Let's try one.",
                continueLabel: 'Open Excel and make three empty tabs →',
            },
            1: {
                heading: "A Friday afternoon. A customer comes in with a slipping derailleur.",
                scene: "You spend twenty minutes adjusting it. The customer pays you $40 cash and rolls out.",
                annaWalk: [
                    { speaker: 'Anna', text: '"OK. What changed?"' },
                    { speaker: 'You',  text: '"Cash. Up forty bucks."' },
                    { speaker: 'Anna', text: '"Where does cash live?"' },
                    { speaker: 'You',  text: '"Things tab."' },
                    { speaker: 'Anna', text: '"Good. Now — cash didn\'t just appear. Why did it go up?"' },
                    { speaker: 'You',  text: '"I earned it. The work I did for the customer."' },
                    { speaker: 'Anna', text: '"That goes on Reasons."' },
                ],
                annaTakeaway: "One transaction, two entries. Things got $40 of cash. Reasons got $40 of earnings. Two tabs touched — and you can flip between them to see both sides of what just happened.",
                continueLabel: 'Next transaction →',
            },
            2: {
                heading: "Saturday morning. QBP delivers $300 of parts you'd ordered.",
                scene: "Brake pads, chains, derailleur cables, bottom brackets. They invoice you net 30 — you'll pay them in a month.",
                annaWalk: [
                    { speaker: 'Anna', text: '"What changed?"' },
                    { speaker: 'You',  text: '"Parts. I have $300 more on the shelves now."' },
                    { speaker: 'Anna', text: '"Where does that go?"' },
                    { speaker: 'You',  text: '"Things tab."' },
                    { speaker: 'Anna', text: '"Why did parts go up?"' },
                    { speaker: 'You',  text: '"I bought them on credit. Reasons tab."' },
                    { speaker: 'Anna', text: '"Good. And the other side?"' },
                    { speaker: 'You',  text: '"I owe QBP $300 now. Promises tab."' },
                    { speaker: 'Anna', text: '"Why did the promise go up?"' },
                    { speaker: 'You',  text: '"I got the parts. Reasons tab again."' },
                ],
                annaTakeaway: "Two changes — Parts up, Owe QBP up — and a reason for each one. That's four entries for one transaction. Keep going. We'll come back to whether all of them are pulling their weight.",
                continueLabel: 'Next transaction →',
            },
            3: {
                heading: "Thirty days later. You write QBP a check for $300.",
                scene: "Bill paid. Promise settled.",
                annaWalk: [
                    { speaker: 'Anna', text: '"What changed?"' },
                    { speaker: 'You',  text: '"Cash down $300. Things tab."' },
                    { speaker: 'Anna', text: '"Why did cash go down?"' },
                    { speaker: 'You',  text: '"The promise to QBP got settled. Reasons tab."' },
                    { speaker: 'Anna', text: '"And the other side?"' },
                    { speaker: 'You',  text: '"The promise to QBP is gone. Promises tab."' },
                    { speaker: 'Anna', text: '"Why is the promise gone?"' },
                    { speaker: 'You',  text: '"I paid cash. Reasons tab."' },
                ],
                annaTakeaway: "Same shape: two changes on Things/Promises, two reasons explaining them. Keep going — two more transactions.",
                continueLabel: 'Next transaction →',
            },
            4: {
                heading: "July. Smith comes in wanting a custom frame built.",
                scene: "He hands you $200 cash up front as a deposit. You promise to have the frame done within 4–6 weeks.",
                annaWalk: [
                    { speaker: 'Anna', text: '"What changed?"' },
                    { speaker: 'You',  text: '"Cash up $200. Things tab."' },
                    { speaker: 'Anna', text: '"Why did cash go up?"' },
                    { speaker: 'You',  text: '"Smith paid me up front. Reasons tab — I took cash for work I haven\'t done."' },
                    { speaker: 'Anna', text: '"And the other side?"' },
                    { speaker: 'You',  text: '"I owe him a frame build now. Promises tab."' },
                    { speaker: 'Anna', text: '"Why did the promise go up?"' },
                    { speaker: 'You',  text: '"Because I took his money. Reasons tab again."' },
                ],
                annaTakeaway: "Same shape as the QBP parts on credit — two Things/Promises changes and two reasons — but flipped: this time you took the cash in advance and you owe the work, rather than getting the parts and owing the cash.",
                continueLabel: 'Next transaction →',
            },
            5: {
                heading: "Five weeks later. The frame is done. You hand it to Smith.",
                scene: "He says thanks and rolls out. No cash changes hands — he paid you back in July. Your promise to him is discharged.",
                annaWalk: [
                    { speaker: 'Anna', text: '"What changed?"' },
                    { speaker: 'You',  text: '"Owe Smith just went down to zero. The frame is delivered. Promises tab."' },
                    { speaker: 'Anna', text: '"Why did the promise go down?"' },
                    { speaker: 'You',  text: '"Because I did the work. I earned the $200 he gave me in July. Reasons tab."' },
                    { speaker: 'Anna', text: '"Anything change on Things?"' },
                    { speaker: 'You',  text: '"No. No cash moved. I didn\'t pull parts for it."' },
                    { speaker: 'Anna', text: '"So this one only touches Promises and Reasons. Two sides, still — just a different pair from any of the others."' },
                ],
                annaTakeaway: "You're $200 richer than yesterday. You still have the cash Smith gave you in July, and you no longer owe him a frame. The reason for that — 'Earned' — is real, just like in the cash sale. Now... let's look at what's on the Reasons tab.",
                continueLabel: 'Look at the Reasons tab →',
            },
            6: {
                heading: "Open the Reasons tab.",
                scene: "Eight entries. Read them one by one. For each, ask: does this reason tell you something the other two tabs don't already show?",
                annaTakeaway: "If the reason is just the other side of the same transaction, you can read it off the other tab. Those reasons aren't doing any work — they're repeating themselves. Drop them. Keep only the reasons that aren't already written down somewhere else.",
                continueLabel: 'See what\'s left →',
            },
            7: {
                heading: "Look at what's left on Reasons.",
                scene: "Two entries. Earned $40 from the derailleur. Earned $200 from Smith's frame. Out of eight reasons, only two survived — the two that weren't already written down on Things or Promises.",
                annaTakeaway: "Now look at what makes those two reasons different from the six you dropped. Every redundant reason was a Things-and-Promises swap: cash for parts, cash to pay off debt, cash for a future obligation, future obligation discharged by paying off the parts bill. In every one of those, Things and Promises moved together — the spreadsheet got bigger, but you weren't any richer or poorer. The reasons that survive are the ones where Things minus Promises ACTUALLY changed. That's what 'Earned' tracks — and the sum of the surviving Reasons is exactly how much richer you got.",
                continueLabel: 'Continue →',
            },
        };

        // Tabs config
        const tabConfig = [
            { id: 'things',   label: 'Things',   color: colors.primary,  rows: thingsRows },
            { id: 'promises', label: 'Promises', color: colors.earthDark, rows: promisesRows },
            { id: 'reasons',  label: 'Reasons',  color: colors.accent,    rows: reasonsRows },
        ];

        const App = () => {
            const [step, setStep] = useState(0);
            const [activeTab, setActiveTab] = useState('things');
            const [devMode, setDevMode] = useState(false);
            const [headerClickCount, setHeaderClickCount] = useState(0);
            const [droppedReasons, setDroppedReasons] = useState([]);     // array of row ids
            const [pruneFeedback, setPruneFeedback] = useState(null);     // { type: 'wrong'|'right', text } | null

            const handleHeaderClick = () => {
                const n = headerClickCount + 1;
                setHeaderClickCount(n);
                if (n >= 3) { setDevMode(!devMode); setHeaderClickCount(0); }
            };

            const narrative = narratives[step];
            const TOTAL_STEPS = 7;
            const PRUNE_STEP = 6;
            const progress = Math.round((step / TOTAL_STEPS) * 100);
            const advance = () => {
                const next = step + 1;
                // When entering the prune step, auto-switch to Reasons so the action target is obvious.
                if (next === PRUNE_STEP) setActiveTab('reasons');
                setStep(next);
            };
            const reset = () => {
                setStep(0); setActiveTab('things');
                setDroppedReasons([]); setPruneFeedback(null);
            };

            const redundantReasonIds = reasonsRows.filter(r => r.redundant).map(r => r.id);
            const allRedundantDropped = redundantReasonIds.every(id => droppedReasons.includes(id));

            const handleDropReason = (row) => {
                if (droppedReasons.includes(row.id)) return;
                if (row.redundant) {
                    setDroppedReasons([...droppedReasons, row.id]);
                    // The reason restates info that's already encoded on the OPPOSITE side of the same txn.
                    // pairedWith = the entry this reason was written for (the SAME side).
                    // Need to find the OPPOSITE-side entry (other tab, same txn id).
                    const pairedToPromises = row.pairedWith.includes('Owe');
                    const otherTab = pairedToPromises ? 'Things' : 'Promises';
                    const oppositeRow = pairedToPromises
                        ? thingsRows.find(t => t.txn === row.txn)
                        : promisesRows.find(p => p.txn === row.txn);
                    const oppositeEntry = oppositeRow ? `${oppositeRow.what} ${oppositeRow.change}` : '';
                    setPruneFeedback({ type: 'right', text: `Dropped "${row.what}." Same txn #${row.txn} — that fact is already on the ${otherTab} tab as "${oppositeEntry}". Nothing's lost.` });
                } else {
                    setPruneFeedback({ type: 'wrong', text: `"${row.what}" earns its place. Look at Things and Promises — does anything there tell you you did work for the customer? No. Keep it.` });
                }
            };

            // Which tabs have any rows at current step?
            const tabHasRows = (tabId) => {
                const cfg = tabConfig.find(t => t.id === tabId);
                return cfg.rows.some(r => r.step <= step);
            };

            // Which tabs were touched at the current step?
            const justTouched = stepTouched[step] || [];

            // Active tab's visible rows
            const activeRows = (() => {
                const cfg = tabConfig.find(t => t.id === activeTab);
                return cfg.rows.filter(r => r.step <= step);
            })();
            const activeTabConfig = tabConfig.find(t => t.id === activeTab);

            return (
                <div className="max-w-3xl mx-auto p-4">

                    {/* Header (matching tutorial pattern) */}
                    <div className="rounded-lg p-4 mb-4" style={{ backgroundColor: colors.primary }}>
                        <div className="flex justify-between items-start">
                            <div onClick={handleHeaderClick} style={{ cursor: 'pointer' }}>
                                <h1 className="text-lg font-bold text-white">Tutorial 1.4: Keeping the Reasons</h1>
                                <p className="text-sm mt-1" style={{ color: colors.earthLight }}>
                                    Bicycle repair shop &middot; ~12 min
                                </p>
                            </div>
                            <div className="flex items-center gap-2">
                                <a href="../index.html"
                                   className="p-2 rounded-lg hover:bg-white/10 text-white text-xl border-0 bg-transparent cursor-pointer no-underline inline-flex items-center justify-center"
                                   title="Return to Main" aria-label="Return to Main">🏠</a>
                                <button onClick={reset}
                                        className="p-2 rounded-lg hover:bg-white/10 text-white text-xl border-0 bg-transparent cursor-pointer"
                                        title="Restart tutorial" aria-label="Restart tutorial">↺</button>
                            </div>
                        </div>
                        <div className="mt-4">
                            <div className="flex justify-between text-xs mb-1" style={{ color: 'rgba(255,255,255,0.7)' }}>
                                <span>Progress</span><span>{progress}%</span>
                            </div>
                            <div className="h-2 rounded-full" style={{ backgroundColor: 'rgba(255,255,255,0.2)' }}
                                 role="progressbar" aria-valuenow={progress} aria-valuemin={0} aria-valuemax={100}>
                                <div className="h-full rounded-full transition-all duration-500"
                                     style={{ width: `${progress}%`, backgroundColor: colors.accent }} />
                            </div>
                        </div>
                        {devMode && (
                            <div className="mt-3 pt-3" style={{ borderTop: '1px solid rgba(255,255,255,0.2)' }}>
                                <p className="text-xs mb-2" style={{ color: 'rgba(255,255,255,0.7)' }}>Dev: skip to step</p>
                                <div className="flex flex-wrap gap-1">
                                    {[0,1,2,3,4,5,6,7].map(s => (
                                        <button key={s} onClick={() => { if (s === PRUNE_STEP) setActiveTab('reasons'); setStep(s); }}
                                                className="px-2 py-1 rounded text-xs border-0 cursor-pointer"
                                                style={{
                                                    backgroundColor: step === s ? 'white' : 'rgba(255,255,255,0.2)',
                                                    color: step === s ? colors.primary : 'white'
                                                }}>{s === 0 ? 'welcome' : s === 6 ? 'prune' : s === 7 ? 'reflection' : 'txn ' + s}</button>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Mockup banner */}
                    <div className="mb-4 p-3 rounded-lg" style={{ backgroundColor: '#fef9e7', border: `2px solid ${colors.accent}` }}>
                        <p className="text-sm" style={{ color: colors.earthDark }}>
                            <strong>Mockup:</strong> Tutorial 1.4 ("Keeping the Reasons"). Three-tab spreadsheet. For every entry on
                            Things or Promises, the student writes a matching entry on Reasons (the WHY). Five transactions (cash
                            sale; parts on credit; pay QBP; customer prepays for work; do the work) produce eight Reasons entries
                            — the student prunes the six that just restate the other side, leaving two ("Earned $40," "Earned $200")
                            that carry real information. Sum of kept Reasons = $240 = total change in Things − Promises. The third
                            bucket falls out of the pruning, and what it tracks turns out to be equity-affecting events. "Double-entry"
                            and "equity" still not named.
                        </p>
                    </div>

                    {/* The spreadsheet */}
                    <div className="rounded-lg overflow-hidden mb-4" style={{ border: `1px solid ${colors.earthLight}`, backgroundColor: 'white' }}>

                        {/* Excel-style toolbar bar */}
                        <div className="px-3 py-2 text-xs uppercase tracking-wide flex items-center justify-between" style={{ backgroundColor: '#fafaf7', borderBottom: `1px solid ${colors.earthLight}`, color: colors.earth }}>
                            <span>📊 shop-records.xlsx</span>
                            <span className="mono normal-case" style={{ color: colors.earth }}>Read-only mockup</span>
                        </div>

                        {/* Active sheet area */}
                        <div className="p-4" style={{ minHeight: '180px' }}>
                            {step === 0 ? (
                                <div className="text-center py-8" style={{ color: colors.earth }}>
                                    <p className="text-sm italic">Empty workbook. Three tabs below — each one for a bucket.</p>
                                </div>
                            ) : (
                                <table className="w-full text-sm">
                                    <thead>
                                        <tr style={{ borderBottom: `1px solid ${colors.earthLight}` }}>
                                            <th className="text-left px-2 py-2 text-xs uppercase tracking-wide font-semibold" style={{ color: colors.earth, width: '50px' }}>Ref</th>
                                            <th className="text-left px-2 py-2 text-xs uppercase tracking-wide font-semibold" style={{ color: colors.earth, width: '80px' }}>Date</th>
                                            <th className="text-left px-2 py-2 text-xs uppercase tracking-wide font-semibold" style={{ color: colors.earth }}>What</th>
                                            <th className="text-right px-2 py-2 text-xs uppercase tracking-wide font-semibold" style={{ color: colors.earth, width: '100px' }}>Change</th>
                                            <th className="text-left px-2 py-2 text-xs uppercase tracking-wide font-semibold" style={{ color: colors.earth }}>Note</th>
                                            {step >= PRUNE_STEP && activeTab === 'reasons' && (
                                                <th className="text-right px-2 py-2 text-xs uppercase tracking-wide font-semibold" style={{ color: colors.earth, width: '90px' }}></th>
                                            )}
                                        </tr>
                                    </thead>
                                    <tbody className="mono">
                                        {activeRows.length === 0 ? (
                                            <tr><td colSpan={step >= PRUNE_STEP && activeTab === 'reasons' ? 6 : 5} className="text-center py-6 italic" style={{ color: colors.earth }}>
                                                (no entries on this tab yet)
                                            </td></tr>
                                        ) : activeRows.map((r, i) => {
                                            const isDropped = activeTab === 'reasons' && r.id && droppedReasons.includes(r.id);
                                            const showDropUI = step === PRUNE_STEP && activeTab === 'reasons' && r.id;
                                            return (
                                                <tr key={i} style={{
                                                    borderBottom: `1px solid ${colors.sand}`,
                                                    opacity: isDropped ? 0.4 : 1,
                                                    textDecoration: isDropped ? 'line-through' : 'none',
                                                }}>
                                                    <td className="px-2 py-2">
                                                        <span className="text-xs px-1.5 py-0.5 rounded font-bold"
                                                              style={{ backgroundColor: colors.clayLight, color: colors.primary, border: `1px solid ${colors.clayDark}` }}>
                                                            #{r.txn}
                                                        </span>
                                                    </td>
                                                    <td className="px-2 py-2" style={{ color: colors.earthDark }}>{r.date}</td>
                                                    <td className="px-2 py-2 font-medium" style={{ color: colors.earthDark }}>{r.what}</td>
                                                    <td className="px-2 py-2 text-right font-bold" style={{ color: r.pos === '+' ? colors.success : colors.error }}>
                                                        {r.change}
                                                    </td>
                                                    <td className="px-2 py-2 text-xs" style={{ color: colors.earth }}>{r.note}</td>
                                                    {step >= PRUNE_STEP && activeTab === 'reasons' && (
                                                        <td className="px-2 py-2 text-right">
                                                            {showDropUI && !isDropped && (
                                                                <button onClick={() => handleDropReason(r)}
                                                                        className="text-xs px-2 py-1 rounded border cursor-pointer"
                                                                        style={{ borderColor: colors.earthLight, backgroundColor: 'white', color: colors.earth }}
                                                                        title="Drop as redundant">Drop ✕</button>
                                                            )}
                                                            {isDropped && (
                                                                <span className="text-xs" style={{ color: colors.earth }}>dropped</span>
                                                            )}
                                                            {step > PRUNE_STEP && !isDropped && (
                                                                <span className="text-xs px-2 py-1 rounded" style={{ backgroundColor: colors.successBg, color: '#166534', border: `1px solid ${colors.success}` }}>keep</span>
                                                            )}
                                                        </td>
                                                    )}
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            )}
                        </div>

                        {/* Tab strip */}
                        <div className="flex" style={{ backgroundColor: '#f0ece0', borderTop: `1px solid ${colors.earthLight}` }}>
                            {tabConfig.map(t => {
                                const isActive = activeTab === t.id;
                                const rowsHere = t.rows.filter(r => r.step <= step).length;
                                const isJustTouched = justTouched.includes(t.id);
                                return (
                                    <button
                                        key={t.id}
                                        onClick={() => setActiveTab(t.id)}
                                        className="px-4 py-2 text-sm font-medium border-0 cursor-pointer flex items-center gap-2"
                                        style={{
                                            backgroundColor: isActive ? 'white' : 'transparent',
                                            color: isActive ? t.color : colors.earth,
                                            borderTop: isActive ? `2px solid ${t.color}` : '2px solid transparent',
                                            borderRight: `1px solid ${colors.earthLight}`,
                                            position: 'relative',
                                        }}
                                    >
                                        {t.label}
                                        {rowsHere > 0 && (
                                            <span className="text-xs px-1.5 py-0.5 rounded-full" style={{ backgroundColor: t.color, color: 'white', minWidth: '20px', textAlign: 'center' }}>
                                                {rowsHere}
                                            </span>
                                        )}
                                        {isJustTouched && (
                                            <span className="text-xs ml-1" title="Just updated" style={{ color: colors.warning }}>●</span>
                                        )}
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    {/* "Just touched" hint after each transaction */}
                    {justTouched.length > 0 && (
                        <div className="rounded-lg p-3 mb-4" style={{ backgroundColor: colors.warningBg, border: `1px solid ${colors.warning}` }}>
                            <p className="text-xs" style={{ color: '#92400e' }}>
                                <strong>Tabs updated in this transaction:</strong> {justTouched.map(tid => tabConfig.find(t => t.id === tid).label).join(' and ')}.
                                Click the tabs to see both sides.
                            </p>
                        </div>
                    )}

                    {/* Narrative panel */}
                    {step === 0 ? (
                        <>
                            <div className="rounded-lg p-4 mb-3 border-2" style={{ borderColor: colors.clayDark, backgroundColor: 'white' }}>
                                <p className="text-xs font-bold mb-2 tracking-wide" style={{ color: colors.primary }}>ANNA</p>
                                <p className="text-sm italic" style={{ color: colors.earthDark }}>"{narrative.annaIntro}"</p>
                            </div>
                            <div className="rounded-lg p-4 mb-3 border-2" style={{ borderColor: colors.earthLight, backgroundColor: '#fafaf7' }}>
                                <p className="text-xs font-bold mb-2 tracking-wide" style={{ color: colors.earth }}>YOU</p>
                                <p className="text-sm italic" style={{ color: colors.earthDark }}>"{narrative.youThink}"</p>
                            </div>
                            <div className="rounded-lg p-4 mb-3 border-2" style={{ borderColor: colors.clayDark, backgroundColor: 'white' }}>
                                <p className="text-xs font-bold mb-2 tracking-wide" style={{ color: colors.primary }}>ANNA</p>
                                <p className="text-sm italic" style={{ color: colors.earthDark }}>"{narrative.annaClose}"</p>
                            </div>
                        </>
                    ) : (
                        <>
                            <div
                                className="p-4 rounded-lg mb-3 italic"
                                style={{ backgroundColor: colors.sand, borderLeft: `4px solid ${colors.accent}`, color: '#374151' }}
                            >
                                <p className="font-medium not-italic mb-1" style={{ color: colors.earthDark }}>{narrative.heading}</p>
                                <p className="text-sm">{narrative.scene}</p>
                            </div>

                            {narrative.annaWalk && (
                                <div className="rounded-lg p-3 mb-3" style={{ backgroundColor: 'white', border: `1px solid ${colors.earthLight}` }}>
                                    {narrative.annaWalk.map((line, i) => (
                                        <div key={i} className="text-sm mb-1" style={{ color: line.speaker === 'Anna' ? colors.primary : colors.earthDark }}>
                                            <span className="font-bold text-xs tracking-wide mr-2">{line.speaker.toUpperCase()}:</span>
                                            <span className="italic">{line.text}</span>
                                        </div>
                                    ))}
                                </div>
                            )}

                            <div className="rounded-lg p-4 mb-3 border-2" style={{ borderColor: colors.clayDark, backgroundColor: 'white' }}>
                                <p className="text-xs font-bold mb-2 tracking-wide" style={{ color: colors.primary }}>ANNA</p>
                                <p className="text-sm italic" style={{ color: colors.earthDark }}>{narrative.annaTakeaway}</p>
                            </div>
                        </>
                    )}

                    {/* Prune feedback (prune step only) */}
                    {step === PRUNE_STEP && pruneFeedback && (
                        <div className="rounded-lg p-3 mb-3"
                             style={{
                                 backgroundColor: pruneFeedback.type === 'right' ? colors.successBg : colors.warningBg,
                                 border: `1px solid ${pruneFeedback.type === 'right' ? colors.success : colors.warning}`,
                             }}>
                            <p className="text-xs font-bold mb-1" style={{ color: colors.primary }}>ANNA</p>
                            <p className="text-sm italic" style={{ color: pruneFeedback.type === 'right' ? '#166534' : '#92400e' }}>
                                {pruneFeedback.text}
                            </p>
                        </div>
                    )}

                    {/* Continue */}
                    {step < TOTAL_STEPS && (
                        <button
                            onClick={advance}
                            disabled={step === PRUNE_STEP && !allRedundantDropped}
                            className="w-full py-3 rounded-lg font-bold text-white border-0 cursor-pointer disabled:cursor-not-allowed mb-4"
                            style={{
                                backgroundColor: (step === PRUNE_STEP && !allRedundantDropped) ? colors.earth : colors.primary,
                                opacity: (step === PRUNE_STEP && !allRedundantDropped) ? 0.5 : 1,
                            }}
                        >
                            {step === PRUNE_STEP && !allRedundantDropped
                                ? `Drop the redundant ones to continue (${droppedReasons.length}/${redundantReasonIds.length})`
                                : narrative.continueLabel}
                        </button>
                    )}

                    {step === TOTAL_STEPS && (
                        <>
                            <div className="p-4 rounded-lg border-2 mb-4" style={{ backgroundColor: '#fef9e7', borderColor: colors.accent }}>
                                <div className="flex items-start gap-3">
                                    <span className="text-lg flex-shrink-0 mt-0.5" style={{ color: colors.accent }}>💡</span>
                                    <div style={{ color: colors.earthDark }}>
                                        <p className="font-semibold mb-2">The third bucket holds the reasons the other tabs don't already show.</p>
                                        <p>
                                            Every transaction touches two sides. Sometimes both sides are movements
                                            between Things and Promises — those are paired, and each side's "reason"
                                            is just the other side restated. Drop them. What's left on Reasons is the
                                            real third-bucket information: changes that no movement between Things and
                                            Promises can explain.
                                        </p>
                                    </div>
                                </div>
                            </div>
                            <a href="../index.html" className="block w-full py-3 rounded-lg font-bold text-white text-center no-underline mb-4" style={{ backgroundColor: colors.primary }}>
                                Return to Main →
                            </a>
                        </>
                    )}

                    <div className="mt-6 p-4 rounded-lg bg-white" style={{ border: `1px solid ${colors.earthLight}` }}>
                        <div className="flex justify-between items-start mb-2">
                            <p className="text-sm font-bold" style={{ color: colors.primary }}>For refinement</p>
                            <button onClick={reset} className="text-xs underline border-0 bg-transparent cursor-pointer" style={{ color: colors.earth }}>Reset</button>
                        </div>
                        <ul className="text-sm space-y-1 list-disc list-inside" style={{ color: colors.earthDark }}>
                            <li>Three tabs (Things / Promises / Reasons), Excel-style tab strip at the bottom of the sheet area. Tabs show a count badge once entries appear.</li>
                            <li>Spreadsheet starts empty. Rows appear as the student advances through transactions — each entry tagged with the step in which it appears.</li>
                            <li><strong>Txn ref column (#1 ... #5):</strong> every row carries a transaction reference. Same-txn rows across tabs are visibly linked — students can scan a ref across Things, Promises, and Reasons to see all sides of the same event.</li>
                            <li><strong>Reasons rule:</strong> for every entry on Things or Promises, write a matching entry on Reasons (the WHY). Applied uniformly across all five transactions.</li>
                            <li><strong>Five transactions, eight Reasons entries:</strong> 1 from cash sale, 2 from parts on credit, 2 from pay QBP, 2 from Smith's prepayment, 1 from delivering Smith's frame.</li>
                            <li><strong>Step 6 (prune):</strong> auto-switches to the Reasons tab. Each row gets a "Drop ✕" button. Dropping a redundant cross-reference row strikes it through with a feedback line naming the opposite-tab entry (same-txn ref); trying to drop "Earned" gets a corrective Anna nudge. Continue gates on all 6 redundant rows dropped.</li>
                            <li><strong>Step 7 (reflection):</strong> only the two "Earned" entries remain ($40 + $200 = $240). Key pedagogical move: <em>sum of kept Reasons equals total change in Things − Promises</em>. The redundant ones were all Things-and-Promises swaps that didn't change net worth; the kept ones are exactly the events that did. The third bucket is what tracks equity-affecting changes — though "equity" isn't named.</li>
                            <li><strong>Sign convention:</strong> for redundant Reasons, sign matches the paired Things/Promises side (they get dropped anyway). For kept Reasons, sign reflects the equity effect — so Earned +$200 from txn 5 is positive even though it pairs with Owe Smith −$200 (the promise discharged means you got richer).</li>
                            <li>"Tabs updated in this transaction" hint appears after each transaction.</li>
                            <li>Dialogue is rendered as a back-and-forth between Anna and You (the student). First activity where the student speaks — fits Anna's collaborator role.</li>
                            <li>"Double-entry" and "equity" still deliberately not named. The pruning earns the third-bucket concept and the equity definition operationally; formal naming waits for the historical-context interlude (Pacioli, 1494).</li>
                        </ul>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
