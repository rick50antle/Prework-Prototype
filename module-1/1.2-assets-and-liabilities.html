    <script type="text/babel">
        const { useState, useEffect } = React;

        /**
         * Tutorial 1.2 (redesign): Insurance and Anna — Mockup
         * CMU METALS Accounting Prework — Module 1, Activity 2
         *
         * @version 2.0-mockup
         * @date 2026-05-25
         * @description Rebuilt to align with 1.1 v3's location-based redesign:
         *   - Pre-entity language throughout. "Repair work," not "shop work."
         *     Entity words ("shop", "the business") stay off the page until
         *     they appear deliberately as wrong-answer trap material later.
         *   - Welcome + Maria's arrival combined into one step.
         *   - Two-sheet form structure:
         *       Sheet 1 — categorize (Equipment / Supplies / Fixtures). No $.
         *       Sheet 2 — value (receipts + credit card statement). $.
         *   - Both sheets reuse v3's autocomplete pattern: student does a few,
         *     system handles the volume. Same move, applied to a categorization
         *     rule (sheet 1) and a documents-to-dollars rule (sheet 2).
         *   - Sidebar shows the first ~8 of ~31 items + "+23 more" indicator.
         *     The full list streams into the bins after autocomplete fires.
         *   - Not-on-form items (rented space, cash) surface during sheet 1
         *     through Maria's nudges. They stay on the broader list, picked
         *     up by Anna in step 4 (cash) or left as a learning moment (space).
         *   - Anna names Liabilities. The Things and Promises lists get
         *     renamed to Assets and Liabilities. "Equities" and "Entity"
         *     wait for 1.5.
         */

        // ============================================================
        // Color palette
        // ============================================================
        const colors = {
            primary: '#00356b',
            sand: '#f5f1e8',
            earth: '#8b7355',
            earthLight: '#d4c4a8',
            earthDark: '#5c4d3d',

            clay: '#c4a574',
            clayLight: '#e8dcc8',
            clayDark: '#a08050',
            success: '#22c55e',
            successBg: '#f0fdf4',
            warning: '#f59e0b',
            warningBg: '#fffbeb',
            error: '#dc2626',
            errorBg: '#fef2f2',
        };

        // ============================================================
        // Glossary
        // ============================================================
        const glossaryTerms = [
            { term: 'Asset', definition: 'Something you own that you can put a dollar amount on. Maria asks for a list of yours by category.' },
            { term: 'Liability', definition: 'A promise to pay or do something later. You would have to come up with money, or do work, to settle it.' },
            { term: 'Property policy', definition: 'Insurance that pays the owner if covered things are damaged or destroyed. Doesn’t cover cash, and doesn’t cover what you don’t own.' },
            { term: 'Replacement cost', definition: 'What it would cost today to buy a brand-new version of the thing.' },
            { term: 'Promise', definition: 'Something you have agreed to do or pay, where the doing or paying comes later.' },
            { term: 'Bill', definition: 'A statement of money you owe to someone.' },
            { term: 'Deposit', definition: 'Money paid in advance for something you will receive or have done.' },
            { term: 'Customer', definition: 'Someone who pays you for goods or services.' },
            { term: 'Supplier', definition: 'A business you buy from.' },
        ];

        // ============================================================
        // Sound functions (Web Audio API)
        // ============================================================
        const createAudioContext = () =>
            new (window.AudioContext || window.webkitAudioContext)();

        const playSuccessTone = () => {
            try {
                const ctx = createAudioContext();
                [523.25, 659.25, 783.99].forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.frequency.value = freq; osc.type = 'sine';
                    const t = ctx.currentTime + i * 0.1;
                    gain.gain.setValueAtTime(0, t);
                    gain.gain.linearRampToValueAtTime(0.3, t + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
                    osc.start(t); osc.stop(t + 0.25);
                });
                setTimeout(() => ctx.close(), 600);
            } catch(e) {}
        };

        const playSoftNope = () => {
            try {
                const ctx = createAudioContext();
                [400, 300].forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.frequency.value = freq; osc.type = 'sine';
                    const t = ctx.currentTime + i * 0.12;
                    gain.gain.setValueAtTime(0, t);
                    gain.gain.linearRampToValueAtTime(0.2, t + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.12);
                    osc.start(t); osc.stop(t + 0.17);
                });
                setTimeout(() => ctx.close(), 400);
            } catch(e) {}
        };

        const playBuzzer = () => {
            try {
                const ctx = createAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.value = 150; osc.type = 'sawtooth';
                const t = ctx.currentTime;
                gain.gain.setValueAtTime(0.25, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
                osc.start(t); osc.stop(t + 0.35);
                setTimeout(() => ctx.close(), 400);
            } catch(e) {}
        };

        const playContinueClick = () => {
            try {
                const ctx = createAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.value = 600; osc.type = 'sine';
                const t = ctx.currentTime;
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.15, t + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.08);
                osc.start(t); osc.stop(t + 0.1);
                setTimeout(() => ctx.close(), 150);
            } catch(e) {}
        };

        // ============================================================
        // Data
        // ============================================================
        // 31 items carried from 1.1 v3's repair-related Things list. Each is
        // mapped to one of Maria's three insurable categories (Equipment /
        // Supplies / Fixtures), to "not-on-form" with a rejectType, or
        // distinguished from the form entirely. Costs are tuned so the
        // category subtotals land on clean round numbers:
        //   Equipment $2,200  |  Supplies $1,200  |  Fixtures $750
        //   Total insurable     $4,150
        //   + Cash extra        $50
        //   Total assets        $4,200
        // (Supplies dropped from $1,400 → $1,200 because Parts asset value is
        // $300 on-shelf, not the $500 originally paid. The $200 difference
        // went into customer jobs — picked up by Anna's bridge line at the
        // end and analyzed in 1.3.)
        //
        // `sourced` controls how the value appears in sheet 2:
        //   'receipt'      — student types the amount, validating against a visible receipt
        //   'credit-card'  — student types the amount, validating against the CC statement
        //   'estimate'     — not entered by hand; rolled up under "+X more (estimate)"
        // Only items with `sourced` of 'receipt' or 'credit-card' appear by
        // name in sheet 2's form; everything else is aggregated.
        const items = [
            // EQUIPMENT — 15 items, subtotal $2,200
            { id: 'stand',     name: 'Park Tool repair stand',   category: 'equipment', cost: 200, sourced: 'receipt'      },
            { id: 'wrenches',  name: 'Cone wrench set',          category: 'equipment', cost: 65,  sourced: 'receipt'      },
            { id: 'truer',     name: 'Wheel truing stand',       category: 'equipment', cost: 130, sourced: 'estimate'     },
            { id: 'compressor',name: 'Air compressor',           category: 'equipment', cost: 320, sourced: 'estimate'     },
            { id: 'vacuum',    name: 'Shop vacuum',              category: 'equipment', cost: 80,  sourced: 'estimate'     },
            { id: 'washer',    name: 'Parts washer',             category: 'equipment', cost: 180, sourced: 'estimate'     },
            { id: 'headset',   name: 'Headset press',            category: 'equipment', cost: 90,  sourced: 'estimate'     },
            { id: 'grinder',   name: 'Bench grinder',            category: 'equipment', cost: 120, sourced: 'estimate'     },
            { id: 'torque',    name: 'Torque wrench',            category: 'equipment', cost: 80,  sourced: 'estimate'     },
            { id: 'hex',       name: 'Hex / Allen key set',      category: 'equipment', cost: 60,  sourced: 'estimate'     },
            { id: 'cutters',   name: 'Cable cutters',            category: 'equipment', cost: 40,  sourced: 'estimate'     },
            { id: 'breaker',   name: 'Chain breaker',            category: 'equipment', cost: 30,  sourced: 'estimate'     },
            { id: 'levers',    name: 'Tire levers',              category: 'equipment', cost: 10,  sourced: 'estimate'     },
            { id: 'pedalw',    name: 'Pedal wrench',             category: 'equipment', cost: 20,  sourced: 'estimate'     },
            { id: 'laptop',    name: 'Laptop',                   category: 'equipment', cost: 610, sourced: 'estimate'     },

            // SUPPLIES — consumables. Chains and Derailleur cables are documented
            // on the QBP receipt (purchase prices: $130 and $45). The asset value
            // on Maria's form is what's on the shelf NOW — chains $50, cables $25
            // — not what was originally paid. The gap is consumed in customer
            // jobs (setup for 1.3's cost-of-jobs-done vs. customer payments).
            // `paidAmount` is what the receipt shows; `cost` is what's left.
            { id: 'cables',    name: 'Box of derailleur cables', category: 'supplies',  cost: 25,  sourced: 'receipt', valueLabel: 'on shelf', paidAmount: 45  },
            { id: 'chains',    name: 'Box of chains',            category: 'supplies',  cost: 50,  sourced: 'receipt', valueLabel: 'on shelf', paidAmount: 130 },
            { id: 'tires',     name: 'Crate of tires',           category: 'supplies',  cost: 240, sourced: 'estimate'     },
            { id: 'pads',      name: 'Box of brake pads',        category: 'supplies',  cost: 140, sourced: 'estimate'     },
            { id: 'saddles',   name: 'Stack of saddles',         category: 'supplies',  cost: 120, sourced: 'estimate'     },
            { id: 'bbs',       name: 'Box of bottom brackets',   category: 'supplies',  cost: 90,  sourced: 'estimate'     },
            { id: 'firstaid',  name: 'First-aid kit',            category: 'supplies',  cost: 50,  sourced: 'estimate'     },

            // FIXTURES — 6 items, subtotal $750
            { id: 'pegboard',  name: 'Pegboard panel + hook set',category: 'fixtures',  cost: 120, sourced: 'receipt'      },
            { id: 'workbench', name: 'Workbench',                category: 'fixtures',  cost: 80,  sourced: 'estimate'     },
            { id: 'shelves',   name: 'Shelving units',           category: 'fixtures',  cost: 180, sourced: 'estimate'     },
            { id: 'display',   name: 'Display rack',             category: 'fixtures',  cost: 100, sourced: 'estimate'     },
            { id: 'sign',      name: 'Painted sign',             category: 'fixtures',  cost: 150, sourced: 'estimate'     },
            { id: 'desk',      name: 'Desk',                     category: 'fixtures',  cost: 200, sourced: 'estimate'     },

            // (The May-18 ATM $50 is now personal walking-around money — no longer a
            // shop item, so it doesn't appear in 1.2.)
        ];

        // Items the student sees in the sidebar during sheet 1 — all from the
        // 1.1 Things list. Cash is included (it's on that list) but doesn't fit
        // the insurance form; trying it is optional, not a required step.
        const visibleIds = ['stand', 'chains', 'pegboard', 'wrenches', 'tires', 'workbench'];

        // The 6 Things the welcome screen displays. A subset of the sheet 1
        // sidebar (without the not-on-form items, so the welcome doesn't
        // pre-spoil the discovery). The remaining 25 are alluded to with a
        // "+ 25 more…" indicator so the volume is visible.
        const welcomeVisibleIds = ['stand', 'wrenches', 'chains', 'pegboard', 'tires', 'workbench'];

        const categoryDefs = [
            { id: 'equipment', label: 'EQUIPMENT', sub: 'durable tools and gear',       targetSubtotal: 2200 },
            { id: 'supplies',  label: 'SUPPLIES',  sub: 'parts and consumables',         targetSubtotal: 1400 },
            { id: 'fixtures',  label: 'FIXTURES',  sub: 'drawers, storage, built-ins',   targetSubtotal: 750  },
        ];

        // Sheet 1 miscat nudges — per category-pair (item's correct → attempted)
        const miscatNudge = (item, attemptedCategory) => {
            if (item.id === 'stand' || item.id === 'wrenches' || item.id === 'truer' || item.id === 'compressor' ||
                item.id === 'washer' || item.id === 'grinder' || item.id === 'headset' || item.id === 'torque' ||
                item.id === 'hex' || item.id === 'cutters' || item.id === 'breaker' || item.id === 'levers' ||
                item.id === 'vacuum' || item.id === 'pedalw' || item.id === 'laptop') {
                return `${item.name} is Equipment — a durable tool, not parts you use up and not a storage piece.`;
            }
            if (item.id === 'chains' || item.id === 'tires' || item.id === 'pads' ||
                item.id === 'saddles' || item.id === 'bbs' || item.id === 'cables' || item.id === 'firstaid') {
                return `${item.name} is Supplies — something you go through on jobs, not a tool you keep.`;
            }
            return `${item.name} is Fixtures — storage or built-ins, not a tool and not parts.`;
        };

        // Sheet 1 rejection nudges
        const rejectNudge = {
            'not-owned':     "That one doesn’t belong on the form. The building isn’t yours — it’s your landlord’s. If something happens to the building, that’s his policy. Insurance is on what you could lose.",
            'not-insurable': "Cash doesn’t go on this form either. Property policies don’t cover cash — if it gets stolen, that’s crime coverage, a separate conversation. It’s still yours; just not my kind of asset.",
        };

        // Receipts — sourced from Source-Documents/source-documents.html (the canonical facsimiles).
        // Each receipt is multi-line; `forItem` is the tutorial-form item this receipt is the document for.
        const receipts = [
            {
                id: 'parktool',
                forItem: 'stand',
                vendor: 'Cyclesport Supply',
                vendorSub: 'professional bike tools & equipment',
                receiptNum: 'Sales Receipt  #SR-4471',
                date: 'May 3, 2026',
                paidWith: 'Personal debit card',
                paidLast4: '•••• 6620',
                paidNote: 'Not charged to the bike-repair credit card — paid from personal funds.',
                lineItems: [
                    { name: 'Park Tool PRS-25 Team Issue Repair Stand', amount: 200 },
                ],
                total: 200,
            },
            {
                id: 'tools',
                forItem: 'wrenches',
                vendor: 'Cyclesport Supply',
                vendorSub: 'professional bike tools & equipment',
                receiptNum: 'Sales Receipt  #SR-4488',
                date: 'May 5, 2026',
                paidWith: 'Bike-Repair Visa',
                paidLast4: '•••• 3902',
                lineItems: [
                    { name: 'Cone wrench set', amount: 65 },
                    { name: 'Torque wrench', amount: 95 },
                    { name: 'Hex / Allen key set', amount: 45 },
                    { name: 'Cable cutters', amount: 40 },
                    { name: 'Chain breaker', amount: 35 },
                    { name: 'Tire levers (set)', amount: 20 },
                ],
                total: 300,
            },
            {
                id: 'fixtures',
                forItem: 'pegboard',
                vendor: 'Workspace Outfitters',
                vendorSub: 'store fixtures & furnishings',
                receiptNum: 'Invoice  #WO-20518',
                date: 'May 5, 2026',
                paidWith: 'Bike-Repair Visa',
                paidLast4: '•••• 3902',
                lineItems: [
                    { name: 'Work desk', amount: 250 },
                    { name: 'Shelving units (×2)', amount: 200 },
                    { name: 'Display rack', amount: 180 },
                    { name: 'Pegboard panel + hook set', amount: 120 },
                ],
                total: 750,
            },
            {
                id: 'qbp',
                forItem: ['chains', 'cables'],
                vendor: 'QBP',
                vendorSub: 'Quality Bicycle Products — wholesale parts distributor',
                receiptNum: 'Invoice  #QBP-887341  ·  Ship: UPS Ground',
                date: 'May 15, 2026',
                paidWith: 'Bike-Repair Visa',
                paidLast4: '•••• 3902',
                lineItems: [
                    { name: 'Derailleur cables (box)', amount: 45 },
                    { name: 'Chains (box)', amount: 130 },
                    { name: 'Brake pads (box)', amount: 80 },
                    { name: 'Cassettes (×4)', amount: 100 },
                    { name: 'Bottom brackets (assorted)', amount: 70 },
                    { name: 'Spokes (bundle)', amount: 35 },
                    { name: 'Tubes (box)', amount: 40 },
                ],
                total: 500,
            },
        ];

        // Credit card statement — sourced from Source-Documents/source-documents.html (Doc 6).
        const creditCard = {
            issuer: 'Harborline Visa',
            sub: 'Bike-Repair Card · account dedicated to repair activity',
            last4: '•••• 3902',
            period: 'May 1 – May 31, 2026',
            opened: 'Opened May 1, 2026',
            previousBalance: 0,
            chargesTotal: 1550,
            paymentsTotal: 800,
            newBalance: 750,
            transactions: [
                { date: '05/05', desc: 'Workspace Outfitters — fixtures', charge: 750, payment: null },
                { date: '05/05', desc: 'Cyclesport Supply — tools', charge: 300, payment: null },
                { date: '05/15', desc: 'QBP — parts order', charge: 500, payment: null },
                { date: '05/16', desc: 'ACH payment received — thank you', charge: null, payment: 400 },
                { date: '05/28', desc: 'ACH payment received — thank you', charge: null, payment: 400 },
            ],
        };

        // Promises (the 2 repair-related ones from 1.1 v3's promise list)
        const promises = [
            { id: 'smith', text: "Promised to build a custom frame for Smith. He paid me $220 up front for it.", expected: 220 },
            { id: 'cc',    text: "What you owe on the bike-repair credit card.",                                  expected: 750 },
        ];

        const fmt = (n) => '$' + Number(n).toLocaleString('en-US');

        // ============================================================
        // App
        // ============================================================
        const App = () => {
            // Navigation
            const [phase, setPhase] = useState('welcome');

            // UI overlays
            const [showGlossary, setShowGlossary] = useState(false);
            const [devMode, setDevMode] = useState(false);
            const [headerClickCount, setHeaderClickCount] = useState(0);

            // Sheet 1 state — categorize
            const [s1DraggedId, setS1DraggedId] = useState(null);
            const [s1Placements, setS1Placements] = useState({});       // { itemId: categoryId } for items dropped correctly
            const [s1Rejected, setS1Rejected] = useState({});           // { itemId: rejectType } for attempted not-on-form
            const [s1Nudge, setS1Nudge] = useState(null);               // { type: 'miscat'|reject, itemId, message }
            const [s1Sorting, setS1Sorting] = useState(false);
            const [s1Done, setS1Done] = useState(false);
            const [s1FlashFeedback, setS1FlashFeedback] = useState(null); // 'correct' | 'wrong' for the drop-zone border flash

            // Sheet 2 state — value
            const [s2Values, setS2Values] = useState({});               // { itemId: '250' }
            const [s2Valuing, setS2Valuing] = useState(false);
            const [s2Done, setS2Done] = useState(false);
            const [s2EstimatesShown, setS2EstimatesShown] = useState(false); // legacy global flag (unused after per-category change)
            const [openReceipt, setOpenReceipt] = useState(null);        // { type: 'receipt'|'creditCard', data } when popup is open

            // Per-category autocomplete state — fires when all documented boxes in a category are correctly filled
            const [s2CategoryEstimates, setS2CategoryEstimates] = useState({}); // { equipment: true, fixtures: true, supplies: true } once revealed
            const [s2CategoryAnimating, setS2CategoryAnimating] = useState({}); // { equipment: true } while the autocomplete animation plays

            // Locked category totals (target value displayed once the rest is autocompleted)
            const CATEGORY_TARGETS = { equipment: 685, fixtures: 1265, supplies: 200 };

            const openDocFor = (item) => {
                if (item.sourced === 'receipt') {
                    const r = receipts.find(rr =>
                        Array.isArray(rr.forItem) ? rr.forItem.includes(item.id) : rr.forItem === item.id
                    );
                    if (r) setOpenReceipt({ type: 'receipt', data: r, item });
                } else if (item.sourced === 'credit-card') {
                    setOpenReceipt({ type: 'creditCard', data: creditCard, item });
                }
            };

            // Anna phase — extras + promises
            const [extraValues, setExtraValues] = useState({});         // { 'cash': '50' }
            const [promiseValues, setPromiseValues] = useState({});     // { 'smith': '220' }
            const [liabilitiesNamed, setLiabilitiesNamed] = useState(false);

            // Anna phase — spreadsheet beat (after values, before rename)
            const [spreadsheetOpened, setSpreadsheetOpened] = useState(false);
            const [activeTab, setActiveTab] = useState('things');
            const [expandedCats, setExpandedCats] = useState({
                equipment: false, supplies: false, fixtures: false,
            });

            // ============================================================
            // Constants
            // ============================================================
            const phaseOrder = [
                'welcome',
                'sheet1-categorize',
                'sheet2-value',
                'maria-readback',
                'anna-arrives',
                'complete',
            ];

            // ============================================================
            // Derived state
            // ============================================================
            const progress = Math.round(
                (phaseOrder.indexOf(phase) / (phaseOrder.length - 1)) * 100
            );

            // Sheet 1 derived
            const placeable = items.filter(i => i.category !== null);
            const notOnForm = items.filter(i => i.category === null);
            const correctPlacements = placeable.filter(i => s1Placements[i.id] === i.category);
            const placedInEquip    = correctPlacements.some(i => i.category === 'equipment');
            const placedInSupplies = correctPlacements.some(i => i.category === 'supplies');
            const placedInFixtures = correctPlacements.some(i => i.category === 'fixtures');
            const s1TriggerMet =
                correctPlacements.length >= 4 &&
                placedInEquip && placedInSupplies && placedInFixtures;
            const s1Visible = visibleIds.map(id => items.find(i => i.id === id)).filter(Boolean);
            const s1HiddenCount = items.length - s1Visible.length;
            const s1SidebarRemaining = s1Visible.filter(i => !s1Placements[i.id] && !s1Rejected[i.id]);

            // Sheet 2 derived
            const documentedItems = placeable.filter(i => i.sourced === 'receipt' || i.sourced === 'credit-card');
            const isS2Correct = (id) => {
                const item = items.find(i => i.id === id);
                return item && item.cost != null && Number(s2Values[id]) === item.cost;
            };
            const isS2Wrong = (id) => {
                const v = Number(s2Values[id]);
                return v > 0 && !isS2Correct(id);
            };
            const documentedCorrect = documentedItems.filter(i => isS2Correct(i.id));
            const correctFromReceipt    = documentedCorrect.some(i => i.sourced === 'receipt');
            const correctFromCreditCard = documentedCorrect.some(i => i.sourced === 'credit-card');
            const s2TriggerMet =
                documentedCorrect.length >= 3 &&
                correctFromReceipt && correctFromCreditCard;

            // Per-category: are all documented (non-estimate) boxes correctly filled?
            const categoryDocsAllCorrect = (catId) => {
                const docs = placeable.filter(i => i.category === catId && i.sourced !== 'estimate');
                return docs.length > 0 && docs.every(i => isS2Correct(i.id));
            };
            // Estimate row amount = locked category total − sum of documented item expected costs
            const estimateRowFor = (catId) => {
                const itemsInCat = placeable.filter(i => i.category === catId && i.sourced === 'estimate');
                const docExpectedSum = placeable
                    .filter(i => i.category === catId && i.sourced !== 'estimate')
                    .reduce((s, i) => s + (i.cost || 0), 0);
                return {
                    count: itemsInCat.length,
                    amount: (CATEGORY_TARGETS[catId] || 0) - docExpectedSum,
                };
            };
            const subtotalForCat = (catId) => {
                const docs = placeable

                    </div>
                );

                const renderPromisesBody = () => (
                    <div className="p-1">
                        {promises.map(p => (
                            <div key={p.id}
                                 className="flex justify-between items-start py-2 px-3 gap-3"
                                 style={{ borderBottom: `1px solid ${colors.earthLight}` }}>
                                <span className="text-xs italic flex-1" style={{ color: colors.earthDark }}>
                                    {p.text}
                                </span>
                                <span className="mono text-sm font-bold flex-shrink-0" style={{ color: colors.earthDark }}>
                                    {fmt(Number(promiseValues[p.id]) || 0)}
                                </span>
                            </div>
                        ))}
                        <div className="flex justify-between items-center py-2 px-3"
                             style={{
                                 borderTop: `2px solid ${colors.earthDark}`,
                                 backgroundColor: colors.sand,
                             }}>
                            <span className="font-bold text-sm" style={{ color: colors.primary }}>
                                TOTAL
                            </span>
                            <span className="mono text-sm font-bold" style={{ color: colors.primary }}>
                                {fmt(totalLiabilities)}
                            </span>
                        </div>
                    </div>
                );

                const renderWorkbook = () => (
                    <div className="rounded-lg overflow-hidden mb-4"
                         style={{
                             border: `2px solid #0e6b3a`,
                             backgroundColor: 'white',
                             boxShadow: '0 6px 18px rgba(0,0,0,0.12)',
                         }}>
                        {/* Excel-style title bar (green) */}
                        <div className="px-4 py-2 flex items-center justify-between"
                             style={{
                                 background: 'linear-gradient(180deg, #138a4b 0%, #107C41 100%)',
                                 borderBottom: `1px solid #0e6b3a`,
                                 color: 'white',
                             }}>
                            <span className="text-sm font-semibold tracking-tight flex items-center gap-2">
                                <span style={{ fontSize: '15px' }}>▦</span>
                                <span className="mono">repair-lists.xlsx</span>
                                <span className="text-xs font-normal opacity-75">— Excel</span>
                            </span>
                            <span className="text-xs mono opacity-75">
                                {tabConfig.find(t => t.id === activeTab).label} sheet
                            </span>
                        </div>

                        {/* Active sheet area */}
                        <div style={{ minHeight: '180px', backgroundColor: 'white' }}>
                            {activeTab === 'things' ? renderThingsBody() : renderPromisesBody()}
                        </div>

                        {/* Tab strip — bottom of the workbook */}
                        <div className="flex"
                             style={{
                                 backgroundColor: '#e8e8e8',
                                 borderTop: `1px solid #c8c8c8`,
                             }}>
                            {tabConfig.map(t => {
                                const isActive = activeTab === t.id;
                                return (
                                    <button
                                        key={t.id}
                                        onClick={() => { playContinueClick(); setActiveTab(t.id); }}
                                        className="px-4 py-2 text-sm font-medium border-0 cursor-pointer"
                                        style={{
                                            backgroundColor: isActive ? 'white' : 'transparent',
                                            color: isActive ? t.color : colors.earth,
                                            borderTop: isActive ? `2px solid ${t.color}` : '2px solid transparent',
                                            borderRight: `1px solid #c8c8c8`,
                                            borderBottom: isActive ? '1px solid white' : 'none',
                                            marginBottom: isActive ? '-1px' : '0',
                                            position: 'relative',
                                        }}>
                                        {t.label}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                );

                return (
                <div className="p-4 max-w-2xl mx-auto">
                    <Header />

                    <NarrativeBlock>
                        A few minutes later the doorbell jingles again. Anna walks in &mdash; your friend who
                        used to work at City Cycle, twelve years before her kid. She still does her own brake
                        jobs and stops by most weeks.
                    </NarrativeBlock>

                    <AnnaBox>&ldquo;Was that Maria pulling out? Insurance done?&rdquo;</AnnaBox>
                    <YouBox>&ldquo;Yeah, just finished.&rdquo;</YouBox>
                    <AnnaBox>&ldquo;About time.&rdquo;</AnnaBox>

                    <NarrativeBlock>
                        She glances at the completed form, then at the {liabilitiesNamed ? <strong>Liabilities</strong> : <span>Promises</span>} list pinned next to it.
                    </NarrativeBlock>

                    <AnnaBox>
                        &ldquo;The promises aren&rsquo;t on her form at all, but they&rsquo;re still on the
                        wall. The credit card bill&rsquo;s right there. Let&rsquo;s get numbers on what&rsquo;s
                        missing.&rdquo;
                    </AnnaBox>

                    {!spreadsheetOpened && (
                        <>

                    {/* Still on the workbench: credit card statement (summary card) */}
                    <div className="rounded-lg p-3 mb-3"
                         style={{ backgroundColor: '#f0ece0', border: `1px solid ${colors.earthLight}` }}>
                        <p className="text-xs font-bold mb-2 tracking-wide" style={{ color: colors.earth }}>
                            📋 STILL ON THE WORKBENCH
                        </p>
                        <div className="rounded p-2 inline-block"
                             style={{ backgroundColor: 'white', border: `1px solid ${colors.primary}` }}>
                            <p className="text-xs uppercase tracking-wide font-bold mb-1" style={{ color: colors.primary }}>
                                Credit card statement
                            </p>
                            <p className="text-xs mono" style={{ color: colors.earth }}>
                                {creditCard.issuer} {creditCard.last4} &middot; {creditCard.period}
                            </p>
                            <p className="text-xs mt-1" style={{ color: colors.earthDark }}>
                                Charges {fmt(creditCard.chargesTotal)} &middot; Payments {fmt(creditCard.paymentsTotal)}
                            </p>
                            <p className="text-sm font-bold mono text-right mt-1" style={{ color: colors.error }}>
                                Balance: {fmt(creditCard.newBalance)}
                            </p>
                        </div>
                    </div>

                    {/* Bike-repair card balance — Anna's focus (Smith's $220 is already on the list from 1.1) */}
                    {(() => {
                        const cc = promises.find(p => p.id === 'cc');
                        return (
                            <div className="rounded-lg overflow-hidden mb-4"
                                 style={{ border: `2px solid ${colors.earthDark}`, backgroundColor: 'white' }}>
                                <div className="px-4 py-2 border-b-2"
                                     style={{ borderColor: colors.earthDark, backgroundColor: '#fafaf7' }}>
                                    <p className="text-sm font-bold tracking-tight" style={{ color: colors.earthDark }}>
                                        BIKE-REPAIR CREDIT CARD &mdash; WHAT YOU OWE
                                    </p>
                                    <p className="text-xs italic" style={{ color: colors.earth }}>look at the statement, find the balance</p>
                                </div>
                                <div className="p-3">
                                    <div className="flex items-start justify-between gap-3 py-2 px-2 rounded"
                                         style={{ backgroundColor: '#fafaf7' }}>
                                        <span className="text-sm italic flex-1" style={{ color: colors.earthDark }}>{cc.text}</span>
                                        <div className="flex items-center gap-1 flex-shrink-0">
                                            <span className="text-sm mono" style={{ color: colors.earth }}>$</span>
                                            <input
                                                type="text"
                                                inputMode="numeric"
                                                value={promiseValues[cc.id] || ''}
                                                onChange={(e) => handlePromiseChange(cc.id, e.target.value)}
                                                onKeyDown={(e) => { if (e.key === 'Enter') e.target.blur(); }}
                                                placeholder="0"
                                                className="w-20 px-2 py-1 rounded mono text-sm text-right"
                                                style={{
                                                    border: '2px solid ' + (isPromiseCorrect(cc.id) ? colors.success : isPromiseWrong(cc.id) ? colors.error : colors.earthLight),
                                                    backgroundColor: 'white',
                                                    color: colors.earthDark,
                                                    fontSize: '16px',
                                                }}
                                            />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {allPromisesValued && allExtrasValued && (
                        <>
                            <AnnaBox>
                                &ldquo;Seven-fifty on the card. Plus the two-twenty Smith paid up front from
                                before. That&rsquo;s the picture.&rdquo;
                            </AnnaBox>

                            <NarrativeBlock>
                                You look at the form, the promises pinned on the wall. If this is going to keep
                                going week to week, paper isn&rsquo;t the right place for it.
                                <br /><br />
                                You picture it in Excel. <strong>One workbook, two tabs.</strong> One tab
                                for the <strong>Assets</strong> &mdash; that&rsquo;s the word Maria used on her form,
                                and her three categories organized everything better than your original list did.
                                The second tab for the <strong>Promises</strong> &mdash; a simple list there, just
                                the two of them.
                            </NarrativeBlock>

                            <button onClick={() => { playContinueClick(); setSpreadsheetOpened(true); }}
                                    className="w-full py-3 rounded-lg font-bold text-white border-0 cursor-pointer mb-4"
                                    style={{ backgroundColor: colors.primary }}>
                                Open the laptop →
                            </button>
                        </>
                    )}
                        </>
                    )}

                    {spreadsheetOpened && renderWorkbook()}

                    {spreadsheetOpened && !liabilitiesNamed && (
                        <>
                            <AnnaBox>
                                &ldquo;Nice. Assets &mdash; Maria&rsquo;s word &mdash; on one tab. Promises on the
                                other. One small thing: the accountants have a word for that second tab. They call
                                those <strong>liabilities</strong>. Same idea &mdash; promises to pay or do, where
                                the paying comes later. You can keep calling it Promises if you want; but if you
                                want this workbook to talk to people the way accountants talk, rename it.&rdquo;
                            </AnnaBox>
                            <button onClick={() => { playContinueClick(); setLiabilitiesNamed(true); }}
                                    className="w-full py-3 rounded-lg font-bold border-2 cursor-pointer mb-4"
                                    style={{ backgroundColor: 'white', borderColor: colors.primary, color: colors.primary }}>
                                Rename the Promises tab →
                            </button>
                        </>
                    )}

                    {spreadsheetOpened && liabilitiesNamed && (
                        <>
                            <InsightPanel>
                                Your Promises tab is now your <strong>Liabilities</strong> tab. Same list &mdash;
                                accountants&rsquo; word. The Assets tab stays as it is.
                            </InsightPanel>
                            <AnnaBox>
                                &ldquo;One more thing before you turn the page. That Supplies total &mdash;
                                $200 on the shelves now &mdash; but you paid $500 for the lot of parts on
                                the credit card. The $300 difference is what went into customer jobs over
                                the past few months. Real cost. Next time we&rsquo;ll look at what those
                                jobs brought in. See if you came out ahead.&rdquo;
                            </AnnaBox>
                            <ContinueButton onClick={() => setPhase('complete')}>Finish up</ContinueButton>
                        </>
                    )}
                </div>
                );
            };

            const renderComplete = () => {
                const onFormItems = placeable
                    .filter(i => i.sourced !== 'estimate')
                    .map(i => ({ name: i.name, amount: Number(s2Values[i.id]) || 0, label: i.sourced === 'receipt' ? 'receipt' : 'credit card' }));
                const estByCat = categoryDefs.map(c => {
                    const r = estimateRowFor(c.id);
                    return { name: `+ ${r.count} more ${c.label.toLowerCase()} items`, amount: r.amount, label: 'estimate' };
                });
                const cashExtras = extras.map(i => ({ name: i.name, amount: Number(extraValues[i.id]) || 0, label: 'cash' }));
                const allAssets = [...onFormItems, ...estByCat, ...cashExtras];
                const allLiabilities = promises.map(p => ({ text: p.text, amount: Number(promiseValues[p.id]) || 0 }));

                return (
                    <div className="p-4 max-w-2xl mx-auto">
                        <Header />

                        <div className="text-center mb-6">
                            <div className="inline-flex items-center justify-center w-20 h-20 rounded-full mb-4"
                                 style={{ backgroundColor: colors.accent }}>
                                <span className="text-4xl">🏆</span>
                            </div>
                            <h2 className="text-2xl font-bold" style={{ color: colors.primary }}>
                                Tutorial Complete!
                            </h2>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
                            <div className="rounded-lg p-3"
                                 style={{ backgroundColor: 'white', border: `1px solid ${colors.earthLight}` }}>
                                <p className="text-xs font-bold tracking-wide mb-2" style={{ color: colors.primary }}>📌 ASSETS</p>
                                <p className="text-xs italic mb-2" style={{ color: colors.earth }}>(was: Things)</p>
                                <ul className="space-y-1 text-xs" style={{ color: colors.earthDark }}>
                                    {allAssets.map((a, i) => (
                                        <li key={i} className="flex justify-between gap-2">
                                            <span className="truncate">{a.name}</span>
                                            <span className="mono flex-shrink-0">{fmt(a.amount)}</span>
                                        </li>
                                    ))}
                                    <li className="flex justify-between gap-2 pt-1 mt-1 font-bold border-t"
                                        style={{ borderColor: colors.earthLight }}>
                                        <span>Total</span>
                                        <span className="mono">{fmt(totalAssets)}</span>
                                    </li>
                                </ul>
                            </div>
                            <div className="rounded-lg p-3"
                                 style={{ backgroundColor: 'white', border: `1px solid ${colors.earthLight}` }}>
                                <p className="text-xs font-bold tracking-wide mb-2" style={{ color: colors.primary }}>📌 LIABILITIES</p>
                                <p className="text-xs italic mb-2" style={{ color: colors.earth }}>(was: Promises)</p>
                                <ul className="space-y-1 text-xs" style={{ color: colors.earthDark }}>
                                    {allLiabilities.map((l, i) => (
                                        <li key={i} className="flex justify-between gap-2">
                                            <span className="italic flex-1">{l.text}</span>
                                            <span className="mono flex-shrink-0">{fmt(l.amount)}</span>
                                        </li>
                                    ))}
                                    <li className="flex justify-between gap-2 pt-1 mt-1 font-bold border-t"
                                        style={{ borderColor: colors.earthLight }}>
                                        <span>Total</span>
                                        <span className="mono">{fmt(totalLiabilities)}</span>
                                    </li>
                                </ul>
                            </div>
                        </div>

                        <div className="rounded-lg p-4 mb-4 border-2"
                             style={{ backgroundColor: 'white', borderColor: colors.success }}>
                            <h3 className="font-bold mb-3" style={{ color: colors.primary }}>What You Discovered</h3>
                            <ul className="space-y-2 text-sm" style={{ color: colors.earthDark }}>
                                <li className="flex gap-2"><span style={{ color: colors.success }}>✓</span>
                                    Not everything related to your repair work is an Asset on Maria&rsquo;s form. The
                                    space is rented; cash isn&rsquo;t insurable through a property policy.</li>
                                <li className="flex gap-2"><span style={{ color: colors.success }}>✓</span>
                                    Once you showed how a few items fit, Maria filled in the categories and put estimates
                                    on the rest. <em>Same move as last time</em> &mdash; twice today.</li>
                                <li className="flex gap-2"><span style={{ color: colors.success }}>✓</span>
                                    Your two lists have names now &mdash; <strong>Assets</strong> and
                                    <strong> Liabilities</strong> &mdash; with dollar amounts on every line.</li>
                            </ul>
                        </div>

                        <KeyInsightBox>
                            <p className="font-semibold mb-2">The deeper point</p>
                            <p>
                                Two new names today: <strong>Assets</strong> and <strong>Liabilities</strong>. Your lists
                                from 1.1 are more formal now &mdash; names on them, numbers on every line. But the bigger
                                picture they form together &mdash; the one your line first marked off &mdash; is still
                                being built. It&rsquo;ll have a name by the end of the module.
                            </p>
                        </KeyInsightBox>

                        <div className="rounded-lg p-4 mb-4" style={{ backgroundColor: colors.clayLight }}>
                            <h3 className="font-bold mb-2" style={{ color: colors.primary }}>Coming Next</h3>
                            <p className="text-sm mb-2" style={{ color: colors.earthDark }}>
                                Anna&rsquo;s back next week. She wants to look at last month&rsquo;s bank statement &mdash;
                                to see how the repair work has been going.
                            </p>
                            <p className="font-bold" style={{ color: colors.primary }}>
                                Next: Tutorial 1.3 &mdash; Anna and the Bank Statement
                            </p>
                        </div>

                        <a href="1.3-anna-and-the-bank-statement.html"
                           className="block w-full py-3 rounded-lg font-bold text-white text-center no-underline mb-3"
                           style={{ backgroundColor: colors.primary }}>
                            Next Tutorial →
                        </a>
                        <button onClick={handleRestart}
                                className="w-full py-3 rounded-lg font-bold cursor-pointer"
                                style={{ border: `2px solid ${colors.primary}`, color: colors.primary, backgroundColor: 'transparent' }}>
                            ↺ Restart
                        </button>
                    </div>
                );
            };

            // ============================================================
            // Phase router
            // ============================================================
            const renderPhase = () => {
                if (phase === 'welcome')            return renderWelcome();
                if (phase === 'sheet1-categorize')  return renderSheet1();
                if (phase === 'sheet2-value')       return renderSheet2();
                if (phase === 'maria-readback')     return renderMariaReadback();
                if (phase === 'anna-arrives')       return renderAnnaArrives();
                if (phase === 'complete')           return renderComplete();
                return null;
            };

            return (
                <div className="min-h-screen" style={{ backgroundColor: colors.sand }}>
                    {renderPhase()}
                    {showGlossary && <GlossaryModal />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
