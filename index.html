<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounting Pre-Work — Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        const { useState } = React;

        const colors = {
            primary: '#00356b',
            sand: '#f5f1e8',
            earth: '#8b7355',
            earthLight: '#d4c4a8',
            earthDark: '#5c4d3d',
            accent: '#c9a227',
            clay: '#c4a574',
            clayLight: '#e8dcc8',
            clayDark: '#a08050',
            success: '#22c55e',
            successBg: '#f0fdf4',
            warning: '#f59e0b',
            warningBg: '#fffbeb',
            error: '#dc2626',
            errorBg: '#fef2f2',
        };

        // Roadmap data — modules with optional expandable activities
        const roadmap = [
            {
                id: 'welcome',
                module: 'Welcome',
                title: 'Course orientation',
                desc: 'You are here',
                active: true,
                activities: null,
            },
            {
                id: 'm1',
                module: 'Module 1 · The Journey',
                title: 'How you got your shop in order',
                desc: 'Flashback: the first months of running the shop, where the habits that let you read a business were built',
                activities: [
                    { num: '1.1', title: 'Getting Organized', href: 'module-1/1.1-getting-organized.html', tag: null },
                    { num: '1.2', title: 'Insurance and Anna', href: 'module-1/1.2-assets-and-liabilities.html', tag: null },
                    { num: '1.3', title: 'Anna and the Bank Statement', href: 'module-1/1.3-anna-and-the-bank-statement.html', tag: null },
                    { num: '1.4', title: 'Keeping the Reasons', href: 'module-1/1.4-keeping-reasons.html', tag: null },
                    { num: '1.5', title: 'Naming What You Built', href: 'module-1/1.5-naming-what-you-built.html', tag: null },
                ],
            },
            {
                id: 'm2',
                module: 'Module 2 · The Six Options',
                title: 'Six options. One decision.',
                desc: 'Apply the architecture from Module 1 to three for-profits and three nonprofits — then make the call.',
                activities: [
                    { num: '2.1', title: 'The Three Businesses', href: 'module-2/2.1-three-businesses.html', tag: null },
                    { num: '2.2', title: 'The Three Nonprofits', href: 'module-2/2.2-three-nonprofits.html', tag: null },
                    { num: '2.3', title: 'The Decision', href: 'module-2/2.3-decision.html', tag: null },
                ],
            },
            {
                id: 'm3',
                module: 'Module 3 · The Full Set of Statements',
                title: 'How the four statements connect',
                desc: 'Meet the Income Statement, Statement of Changes in Equities, and Cash Flow Statement. See the architecture in action — once top-down from the year\'s aggregates, once bottom-up entry by entry — then practice on your own.',
                activities: [
                    { num: '3.1', title: 'Meet the Statements', href: 'module-3/3.1-meet-the-statements.html', tag: null },
                    { num: '3.2', title: 'The Architecture in Action', href: 'module-3/3.2-architecture-in-action.html', tag: null },
                    { num: '3.3', title: 'Practice — end-to-end', href: null, tag: 'coming' },
                ],
            },
            {
                id: 'm4',
                module: 'Module 4 · Real Statements',
                title: 'Reading CVS Health and Yale University',
                desc: 'Same architecture, two customizations — one for-profit, one nonprofit',
                activities: [
                    { num: '4.1', title: 'Reading CVS Health', href: 'module-4/cvs-bs-split-mockup.html', tag: 'mockup' },
                    { num: '4.2', title: 'Reading Yale University', href: 'module-4/yale-bs-split-mockup.html', tag: 'mockup' },
                ],
            },
            {
                id: 'bonus',
                module: 'Bonus · Optional add-on',
                title: 'The Analyst’s Toolkit',
                desc: 'For going beneath the surface — where management made choices, where the records leave room for interpretation',
                activities: null,
                optional: true,
            },
        ];

        // Rick's intro transcript — 7 beats from the original site/index.html
        const transcriptBeats = [
            { label: 'Beats 1 & 2 — Scale problem and complexity',
              text: '"Imagine you are running a small business. Three employees, a handful of customers, maybe a dozen transactions in a week. You could probably keep track of most of that in your head — or a notebook. Now imagine ten thousand employees. Operations in forty states and a few different countries. Millions of transactions a year. Suppliers deciding whether to extend credit. Lenders deciding whether to lend. Shareholders deciding where to put their capital. Regulators checking for compliance. Each of them drawing on the same underlying records to answer very different questions. You can’t run that from a notebook. And the systems built to handle that complexity — to capture it, organize it, report it in a form people can actually use — those systems are genuinely remarkable. They’ve been evolving for literally thousands of years, absorbing new demands, new technology, new types of organizations. What we use today isn’t something a committee designed from scratch. It’s the accumulated solution to a very long series of real problems."' },
            { label: 'Self-introduction',
              text: '"My name is Rick Antle. I’m the William S. Beinecke Professor of Accounting at the Yale School of Management. I’ve spent my career studying how accounting systems work — what they reveal, what they conceal, and why. First encounters with accounting can be disorienting — whether you’ve worked through rules and procedures, or been dropped into a set of financial statements with no map to navigate them. What’s often missing is a real understanding of the architecture — where it came from, what problems it was built to solve, and why it looks the way it does. This prework is my attempt to fix that."' },
            { label: 'Beat 3 — Common-structure tease',
              text: '"Here’s what might surprise you. The accounting system that CVS Health uses — one of the largest companies in the United States — runs on the same underlying architecture as the books of a small neighborhood nonprofit. And the books of a city government. The customizations are real. CVS reports under US GAAP; the nonprofit follows a different set of rules; the city follows yet another. But underneath, the same identity. The same evidence test for what goes on the books. The same insistence that every change in the entity’s position be traced through the statements, not declared. The customizations live on top of a shared skeleton. Once you can see the skeleton, a lot of the apparent variety in the accounting world stops being variety."' },
            { label: 'Beat 4 — How we’ll work together',
              text: '"Here is how we are going to do this. You are going to build the architecture yourself, from problems. I am not handing you a set of rules to memorize. I am putting you in front of small, concrete situations — a handful of items to sort, six transactions, three businesses, three nonprofits, a $25k decision — and asking you to make sense of what just happened. The architecture is going to emerge from the doing. When the formal labels arrive — assets, liabilities, equities, the accounting identity — they will land on something you have already constructed. They will name what you already see. That is a different kind of knowing than memorizing definitions and hoping to apply them later. It tends to stick."' },
            { label: 'Beat 5 — Fresh-mind ask',
              text: '"If you’ve studied accounting before — a course, some work experience, anything at all — you’ve already assembled a mental model of how this works. And I’m going to ask you to set it aside for now. Not because it’s wrong. But because there’s a real difference between applying a framework you already have and building one from scratch — because you needed it to solve a problem in front of you. This prework is designed to give you that second experience. And you can’t have it if you’re pattern-matching to something you already know. So when you hit a problem and something in the back of your head says ‘I know where this is going’ — stay in the problem anyway. Let the architecture emerge. See if it looks the same from this angle. Give it a chance. I think you’ll find it’s worth it."' },
            { label: 'Beat 6 — The two destinations',
              text: '"Here is where we are headed. By the end of this prework, you are going to open the actual financial statements of two real organizations and read them. Not skim — read. First CVS Health, a for-profit corporation under US GAAP. Then Yale University, a nonprofit operating under a different set of conventions on top of the same underlying architecture. The architecture you will have built by then will let you navigate both. You will see where management made choices. You will see where the records are quiet about things that matter. You will see the path the statements take from one balance sheet to the next. Two examples, same skeleton, different customizations. That is the destination. Module 1 is the first step."' },
            { label: 'Beat 7 — Closing invitation',
              text: '"So. Module 1 starts with the morning you decided to get organized. From there we will record more, decompose more, name more. By the end of Module 1, you will have the $25k in your hand and a way to think about what to do with it. Let’s get going."' },
        ];

        const App = () => {
            const [transcriptOpen, setTranscriptOpen] = useState(false);
            const [expandedModules, setExpandedModules] = useState({});

            const toggleModule = (id) => {
                setExpandedModules({ ...expandedModules, [id]: !expandedModules[id] });
            };

            const TagPill = ({ kind }) => {
                if (!kind) return null;
                const styles = {
                    coming:    { bg: '#f0e9d8', border: '#e0d3a8', color: '#8a6a1f', label: 'In progress' },
                    mockup:    { bg: '#e6efff', border: '#b8cce6', color: '#1e4d8a', label: 'Mockup' },
                    redesign:  { bg: '#fffaf3', border: '#f0dcc0', color: colors.accent, label: 'Redesign' },
                };
                const s = styles[kind];
                if (!s) return null;
                return (
                    <span className="text-xs font-semibold uppercase tracking-wide px-2 py-0.5 rounded-full"
                          style={{ backgroundColor: s.bg, border: `1px solid ${s.border}`, color: s.color }}>
                        {s.label}
                    </span>
                );
            };

            return (
                <div className="min-h-screen" style={{ backgroundColor: colors.sand }}>
                    <div className="p-4 max-w-3xl mx-auto">

                        {/* Top header strip — matches the tutorials */}
                        <div className="rounded-lg p-4 mb-4" style={{ backgroundColor: colors.primary }}>
                            <div className="flex justify-between items-center">
                                <div>
                                    <h1 className="text-lg font-bold text-white">Accounting Pre-Work</h1>
                                    <p className="text-sm mt-1" style={{ color: colors.earthLight }}>
                                        Welcome &middot; Yale School of Management
                                    </p>
                                </div>
                                <div className="text-right">
                                    <p className="text-xs" style={{ color: 'rgba(255,255,255,0.7)' }}>Rick Antle</p>
                                    <p className="text-xs" style={{ color: 'rgba(255,255,255,0.5)' }}>William S. Beinecke Professor of Accounting</p>
                                </div>
                            </div>
                        </div>

                        {/* Mockup banner */}
                        <div className="mb-4 p-3 rounded-lg" style={{ backgroundColor: '#fef9e7', border: `2px solid ${colors.accent}` }}>
                            <p className="text-sm" style={{ color: colors.earthDark }}>
                                <strong>Mockup of the redesigned welcome page,</strong> built to match the tutorials’ visual
                                language (Inter font, sand background, Yale blue + gold accents). Activity links navigate
                                to the live mockups and the current activity files.
                            </p>
                        </div>

                        {/* $25k hook — styled as a KeyInsightBox-shape */}
                        <div className="rounded-lg border-2 mb-4 text-center py-8 px-6"
                             style={{ backgroundColor: '#fef9e7', borderColor: colors.accent }}>
                            <p className="font-bold leading-none mb-3"
                               style={{ color: colors.accent, fontSize: '64px', letterSpacing: '-1.5px' }}>$25k</p>
                            <p className="italic text-base" style={{ color: colors.earthDark }}>
                                The amount you've decided to invest or contribute. Six options on the table. A real decision.
                            </p>
                        </div>

                        {/* Welcome prose — NarrativeBlock style */}
                        <div className="p-5 rounded-lg mb-4 italic"
                             style={{ backgroundColor: 'white', borderLeft: `4px solid ${colors.accent}`, color: '#374151' }}>
                            <p className="mb-3 leading-relaxed">
                                A few years of running a successful bike repair shop have put you in a position to
                                deliberately put $25k to work &mdash; to invest in something you believe in, or to
                                contribute to a cause. You and Anna &mdash; a friend back then, your partner now &mdash;
                                built the shop up together, learning the financial side as you went.
                            </p>
                            <p className="mb-3 leading-relaxed">
                                You’ve decided to put the $25k somewhere useful: maybe invest in another business,
                                maybe donate to a nonprofit. You’ve narrowed the decision to six options. Three
                                for-profits, three nonprofits. You’ll meet them later.
                            </p>
                            <p className="mb-3 leading-relaxed">
                                Before you started the shop, you’d have made a decision like this on gut &mdash;
                                a feeling about a business, a soft spot for a cause. Now you wouldn’t. You want
                                to see the numbers first.
                            </p>
                            <p className="leading-relaxed">
                                That habit came from running your own shop &mdash; getting it organized in the early days,
                                figuring out what was happening and why, transaction by transaction. Before turning to the
                                six options, let’s go back to that journey. To when the shop was six months old, the
                                tools were scattered, and you were keeping it all in your head.
                            </p>
                        </div>

                        {/* Rick intro placeholder + transcript */}
                        <div className="rounded-lg border-2 mb-4 p-4"
                             style={{ borderColor: colors.earthLight, backgroundColor: 'white' }}>
                            <p className="text-xs font-bold uppercase tracking-wide mb-3" style={{ color: colors.earth }}>
                                Welcome from Rick &middot; about 2 minutes
                            </p>
                            {/* Video placeholder */}
                            <div className="rounded-lg mx-auto mb-3 flex flex-col items-center justify-center"
                                 style={{ backgroundColor: '#111', maxWidth: '480px', padding: '48px 24px' }}>
                                <div className="rounded-full flex items-center justify-center mb-3 cursor-pointer hover:opacity-90"
                                     style={{
                                         width: '60px', height: '60px',
                                         backgroundColor: 'rgba(255,255,255,0.12)',
                                         border: '2px solid rgba(255,255,255,0.4)',
                                     }}>
                                    <div style={{
                                        width: 0, height: 0,
                                        borderTop: '11px solid transparent',
                                        borderBottom: '11px solid transparent',
                                        borderLeft: '18px solid rgba(255,255,255,0.7)',
                                        marginLeft: '4px',
                                    }}></div>
                                </div>
                                <p className="text-xs" style={{ color: 'rgba(255,255,255,0.6)' }}>Video placeholder</p>
                            </div>
                            <button
                                onClick={() => setTranscriptOpen(!transcriptOpen)}
                                className="text-sm border-0 bg-transparent cursor-pointer mx-auto block px-2 py-1"
                                style={{ color: colors.earth }}
                            >
                                <span className="inline-block mr-1" style={{ transform: transcriptOpen ? 'rotate(90deg)' : 'rotate(0deg)', transition: 'transform 0.2s' }}>▶</span>
                                {transcriptOpen ? 'Hide transcript' : 'Read transcript'}
                            </button>

                            {transcriptOpen && (
                                <div className="mt-3 p-4 rounded-lg max-h-96 overflow-y-auto"
                                     style={{ backgroundColor: '#fafaf7', border: `1px solid ${colors.earthLight}` }}>
                                    {transcriptBeats.map((beat, i) => (
                                        <div key={i} className="mb-4 last:mb-0">
                                            <p className="text-xs font-bold uppercase tracking-wide mb-2"
                                               style={{ color: colors.primary }}>{beat.label}</p>
                                            <p className="text-sm leading-relaxed" style={{ color: colors.earthDark, fontFamily: 'Georgia, serif' }}>
                                                {beat.text}
                                            </p>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Roadmap */}
                        <div className="mb-4">
                            <h2 className="text-lg font-bold mb-3" style={{ color: colors.primary }}>Your Roadmap</h2>
                            <p className="text-sm mb-4 leading-relaxed" style={{ color: colors.earthDark }}>
                                Module 1 is the journey itself — the flashback in which you build a way of reading a
                                business by running your own. Module 2 picks back up in the present and applies what you
                                built to the six options. The final module reads the actual financial statements of CVS
                                Health and Yale University.
                            </p>

                            <div className="space-y-3">
                                {roadmap.map(item => (
                                    <div key={item.id}
                                         className="rounded-lg border-2"
                                         style={{
                                             backgroundColor: 'white',
                                             borderColor: item.active ? colors.accent : (item.optional ? '#e0e0e0' : colors.earthLight),
                                             borderStyle: item.optional ? 'dashed' : 'solid',
                                         }}>
                                        <div className="p-4 flex items-start gap-3">
                                            {/* Dot */}
                                            <div className="flex-shrink-0 mt-1">
                                                <div className="rounded-full"
                                                     style={{
                                                         width: item.active ? '14px' : '10px',
                                                         height: item.active ? '14px' : '10px',
                                                         backgroundColor: item.active ? colors.accent : (item.optional ? 'white' : colors.earth),
                                                         border: item.optional ? `2px solid ${colors.earth}` : 'none',
                                                     }}></div>
                                            </div>
                                            <div className="flex-grow">
                                                <p className="text-xs font-bold uppercase tracking-wide"
                                                   style={{ color: item.active ? colors.accent : (item.optional ? '#999' : colors.earth) }}>
                                                    {item.module}
                                                </p>
                                                <p className="text-base font-medium mt-0.5" style={{ color: colors.earthDark }}>
                                                    {item.title}
                                                </p>
                                                <p className="text-sm mt-1 italic" style={{ color: colors.earth }}>
                                                    {item.desc}
                                                </p>
                                            </div>
                                            {item.activities && (
                                                <button
                                                    onClick={() => toggleModule(item.id)}
                                                    className="flex-shrink-0 text-xs font-bold uppercase tracking-wide border rounded px-2 py-1 cursor-pointer"
                                                    style={{
                                                        color: colors.earth,
                                                        borderColor: colors.earthLight,
                                                        backgroundColor: 'transparent',
                                                    }}
                                                >
                                                    {expandedModules[item.id] ? 'Hide' : 'Activities'}
                                                    <span className="inline-block ml-1"
                                                          style={{ transform: expandedModules[item.id] ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform 0.2s' }}>
                                                        ▾
                                                    </span>
                                                </button>
                                            )}
                                        </div>
                                        {item.activities && expandedModules[item.id] && (
                                            <div className="border-t pl-12 pr-4 py-2"
                                                 style={{ borderColor: colors.earthLight, backgroundColor: '#fafaf7' }}>
                                                {item.activities.map(a => {
                                                    const isClickable = a.href !== null && a.tag !== 'coming';
                                                    const content = (
                                                        <div className="flex items-center gap-3 py-2">
                                                            <div className="flex-shrink-0 rounded-full"
                                                                 style={{
                                                                     width: '7px', height: '7px',
                                                                     backgroundColor: isClickable ? colors.earth : 'white',
                                                                     border: isClickable ? 'none' : `1px solid ${colors.earthLight}`,
                                                                 }}></div>
                                                            <span className="text-sm flex-grow"
                                                                  style={{ color: isClickable ? colors.earthDark : colors.earth }}>
                                                                <span className="font-medium">{a.num}</span>
                                                                <span className="mx-2">&middot;</span>
                                                                {a.title}
                                                            </span>
                                                            <TagPill kind={a.tag} />
                                                        </div>
                                                    );
                                                    return isClickable ? (
                                                        <a key={a.num} href={a.href} className="block no-underline hover:bg-white px-2 -mx-2 rounded">
                                                            {content}
                                                        </a>
                                                    ) : (
                                                        <div key={a.num} className="px-2 -mx-2">{content}</div>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Transition + Begin button */}
                        <p className="italic mb-4 mt-6 pt-4 border-t leading-relaxed text-sm"
                           style={{ color: colors.earth, borderColor: colors.earthLight }}>
                            When you’re ready, the journey starts with a sort — ten things in your shop, six months in.
                        </p>

                        <a href="module-1/1.1-getting-organized.html"
                           className="block w-full py-3 rounded-lg font-bold text-white text-center no-underline"
                           style={{ backgroundColor: colors.primary }}>
                            Begin Module 1 &rarr; Activity 1.1: Getting Organized
                        </a>

                        <div className="mt-6 p-4 rounded-lg" style={{ backgroundColor: 'white', border: `1px solid ${colors.earthLight}` }}>
                            <p className="text-sm font-bold mb-2" style={{ color: colors.primary }}>Notes on this mockup</p>
                            <ul className="text-sm space-y-1 list-disc list-inside" style={{ color: colors.earthDark }}>
                                <li>Visual language matches the tutorials: Inter, sand background, Yale Blue + gold accents.</li>
                                <li>Rick’s intro video placeholder + 7-beat transcript are preserved from the original index.html.</li>
                                <li>Module 1 activity list reflects the redesign sequence. Tags: <strong>Redesign</strong> = current v1 plus mockups underway. <strong>Mockup</strong> = mockup only, no v1. <strong>In progress</strong> = not built.</li>
                                <li>Module 2 collapses what used to live in the prework-intro submodule (Three Businesses, Three Nonprofits, Decision).</li>
                                <li>The original Module 2 (“Using the Identity” — Where the Line Falls, third bucket change, operating piece, cash story) needs a home. Suggest folding into a later module or breaking out separately.</li>
                            </ul>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
