<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three Businesses, One Decision — Accounting Prework</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .mono {
            font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
        }
        .fade-in {
            animation: fadeIn 0.35s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
    /**
     * Three Businesses, One Decision
     * CMU METALS Accounting Prework — Intro: Invest or Donate (Part 1, For-Profit)
     *
     * @version 1.0
     * @date 2026-04-17
     * @description Discovery-based introduction to the structure of for-profit
     *              financial statements: the accounting identity, disaggregation
     *              of Equities into Contributed Capital and Retained Earnings,
     *              the income statement as the explanatory statement for Retained
     *              Earnings, and the evidence test that governs what gets
     *              recognized on the records.
     */

    const { useState } = React;

    // ---------------- Colors ----------------
    const colors = {
        primary: '#00356b',
        sand: '#f5f1e8',
        earth: '#8b7355',
        earthLight: '#d4c4a8',
        earthDark: '#5c4d3d',
        accent: '#c9a227',
        clay: '#c4a574',
        clayLight: '#e8dcc8',
        clayDark: '#a08050',
        success: '#22c55e',
        successBg: '#f0fdf4',
        warning: '#f59e0b',
        warningBg: '#fffbeb',
        error: '#dc2626',
        errorBg: '#fef2f2',
        profit: '#16a34a',
        loss: '#dc2626'
    };

    // ---------------- Sounds ----------------
    const createAudioContext = () => new (window.AudioContext || window.webkitAudioContext)();

    const playSuccessTone = () => {
        try {
            const ctx = createAudioContext();
            const notes = [523.25, 659.25, 783.99];
            const startTime = ctx.currentTime;
            notes.forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.value = freq; osc.type = 'sine';
                const noteStart = startTime + (i * 0.1);
                const noteEnd = noteStart + 0.15;
                gain.gain.setValueAtTime(0, noteStart);
                gain.gain.linearRampToValueAtTime(0.3, noteStart + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, noteEnd);
                osc.start(noteStart); osc.stop(noteEnd + 0.1);
            });
            setTimeout(() => ctx.close(), 600);
        } catch (e) { /* silent */ }
    };

    const playSoftNope = () => {
        try {
            const ctx = createAudioContext();
            const notes = [400, 300];
            const startTime = ctx.currentTime;
            notes.forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.value = freq; osc.type = 'sine';
                const noteStart = startTime + (i * 0.12);
                const noteEnd = noteStart + 0.12;
                gain.gain.setValueAtTime(0, noteStart);
                gain.gain.linearRampToValueAtTime(0.2, noteStart + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, noteEnd);
                osc.start(noteStart); osc.stop(noteEnd + 0.05);
            });
            setTimeout(() => ctx.close(), 400);
        } catch (e) { /* silent */ }
    };

    const playBuzzer = () => {
        try {
            const ctx = createAudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = 150; osc.type = 'sawtooth';
            const startTime = ctx.currentTime;
            gain.gain.setValueAtTime(0.25, startTime);
            gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.3);
            osc.start(startTime); osc.stop(startTime + 0.35);
            setTimeout(() => ctx.close(), 400);
        } catch (e) { /* silent */ }
    };

    const playContinueClick = () => {
        try {
            const ctx = createAudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = 600; osc.type = 'sine';
            const startTime = ctx.currentTime;
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(0.15, startTime + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.08);
            osc.start(startTime); osc.stop(startTime + 0.1);
            setTimeout(() => ctx.close(), 150);
        } catch (e) { /* silent */ }
    };

    // ---------------- Glossary ----------------
    const glossaryTerms = [
        { term: 'Accounting identity', definition: 'The definitional relationship that Assets minus Liabilities equals Equities (for a for-profit) or Net Assets (for a nonprofit). It holds at every point in time, for every entity, by construction.' },
        { term: 'Equities', definition: 'The definitional residual on the right side of a for-profit balance sheet — the difference between recorded assets and recorded liabilities. Shown in subparts so that the structure can carry more information.' },
        { term: 'Contributed Capital', definition: 'The part of Equities that came from outside sources putting money or other assets into the business.' },
        { term: 'Retained Earnings', definition: 'The part of Equities that reflects amounts the business generated through its activities and kept in the business.' },
        { term: 'Net Income', definition: 'The bottom line of the income statement — revenues and gains minus expenses and losses for a period. Flows into Retained Earnings.' },
        { term: 'Transaction', definition: 'An event in which something of value changes hands between parties.' },
        { term: 'Arm\u2019s-length transaction', definition: 'A transaction between independent parties, each acting in their own interest. Such transactions are one strong source of evidence about an item\u2019s existence and its financial effects, though not the only source.' },
        { term: 'Recognition', definition: 'The process of admitting an item onto the accounting records — reporting it on the balance sheet or income statement. The convention requires sufficient evidence that an item exists and that its effects are at least in part financial — that they bear on future cash flows.' }
    ];

    // ---------------- Presentational components (module scope) ----------------
    // IMPORTANT: these live at module scope, not inside Tutorial. If they were
    // defined inside Tutorial, their function identity would change on every
    // render, causing React to unmount/remount their subtrees — which made text
    // inputs lose focus after each keystroke.

    const NarrativeBlock = ({ children }) => (
        <div
            className="p-4 rounded-lg border-l-4 mb-4"
            style={{ backgroundColor: colors.sand, borderColor: colors.accent }}
        >
            <div style={{ color: colors.earthDark }}>{children}</div>
        </div>
    );

    const InsightPanel = ({ title, children }) => (
        <div
            className="p-4 rounded-lg border-2 mb-4 fade-in"
            style={{ backgroundColor: colors.successBg, borderColor: colors.success }}
        >
            <div className="flex items-start gap-2">
                <span style={{ color: colors.success }} aria-hidden="true">✓</span>
                <div>
                    {title && <p className="font-bold mb-2" style={{ color: colors.success }}>{title}</p>}
                    <div style={{ color: '#166534' }}>{children}</div>
                </div>
            </div>
        </div>
    );

    const KeyInsightBox = ({ children }) => (
        <div
            className="p-4 rounded-lg border-2 mb-4"
            style={{ backgroundColor: '#fef9e7', borderColor: colors.accent }}
        >
            <div className="flex items-start gap-3">
                <span className="flex-shrink-0" aria-hidden="true">💡</span>
                <div style={{ color: colors.earthDark }}>{children}</div>
            </div>
        </div>
    );

    const WarningPanel = ({ title, children }) => (
        <div
            className="p-4 rounded-lg border-2 mb-4"
            style={{ backgroundColor: colors.warningBg, borderColor: colors.warning }}
        >
            <div className="flex items-start gap-2">
                <span aria-hidden="true">⚠</span>
                <div>
                    {title && <p className="font-bold mb-2" style={{ color: '#92400e' }}>{title}</p>}
                    <div style={{ color: '#92400e' }}>{children}</div>
                </div>
            </div>
        </div>
    );

    const ContinueButton = ({ onClick, disabled, children = 'Continue' }) => (
        <button
            onClick={onClick}
            disabled={disabled}
            className="w-full py-3 rounded-lg font-bold text-white flex items-center justify-center gap-2 disabled:opacity-50"
            style={{ backgroundColor: colors.primary }}
        >
            {children} <span aria-hidden="true">→</span>
        </button>
    );

    const StatementCard = ({ title, subtitle, rows, footer }) => (
        <div
            className="rounded-lg border-2 p-4 bg-white flex flex-col"
            style={{ borderColor: colors.earthLight }}
        >
            <div className="mb-2">
                <p className="font-bold" style={{ color: colors.primary }}>{title}</p>
                {subtitle && <p className="text-xs" style={{ color: colors.earth }}>{subtitle}</p>}
            </div>
            <div className="space-y-1 text-sm mono" style={{ color: colors.earthDark }}>
                {rows.map((r, i) => (
                    <div
                        key={i}
                        className={`flex justify-between ${r.isTotal ? 'border-t pt-1 font-bold' : ''} ${r.isSubheader ? 'font-semibold pt-2' : ''}`}
                        style={r.isTotal ? { borderColor: colors.earthLight, color: colors.primary } : {}}
                    >
                        <span style={{ paddingLeft: r.indent ? 12 : 0 }}>{r.label}</span>
                        <span>{r.value}</span>
                    </div>
                ))}
            </div>
            {footer && <div className="mt-3 text-xs italic" style={{ color: colors.earth }}>{footer}</div>}
        </div>
    );

    const ThreeCardGrid = ({ cards }) => (
        <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
            {cards}
        </div>
    );

    const PickAndRationale = ({
        pick, setPick, rationale, setRationale, submitted, setSubmitted,
        onAdvance, prompt
    }) => {
        const canSubmit = pick && rationale.trim().length >= 8;

        const handleSubmit = () => {
            if (!canSubmit || submitted) return;
            playSuccessTone();
            setSubmitted(true);
        };

        return (
            <div className="bg-white rounded-lg p-4 mb-4 shadow-sm">
                <p className="mb-3 text-sm" style={{ color: colors.earthDark }}>{prompt}</p>
                <div className="grid grid-cols-3 gap-2 mb-3">
                    {['A', 'B', 'C'].map(opt => {
                        const selected = pick === opt;
                        return (
                            <button
                                key={opt}
                                onClick={() => !submitted && setPick(opt)}
                                disabled={submitted}
                                className="p-3 rounded-lg border-2 text-center font-bold transition-all"
                                style={{
                                    borderColor: selected ? colors.primary : colors.earthLight,
                                    backgroundColor: selected ? colors.sand : 'white',
                                    color: selected ? colors.primary : colors.earthDark
                                }}
                            >
                                Biz {opt}
                            </button>
                        );
                    })}
                </div>
                <label className="block text-xs mb-1" style={{ color: colors.earth }}>
                    One sentence about why.
                </label>
                <textarea
                    value={rationale}
                    onChange={(e) => setRationale(e.target.value)}
                    onKeyDown={(e) => {
                        if (e.key === 'Enter' && !e.shiftKey && !submitted && canSubmit) {
                            e.preventDefault(); handleSubmit();
                        }
                    }}
                    disabled={submitted}
                    placeholder="Write a short reason..."
                    rows={2}
                    className="w-full p-3 border rounded text-sm resize-none mb-3"
                    style={{ borderColor: colors.earthLight }}
                />
                {!submitted ? (
                    <button
                        onClick={handleSubmit}
                        disabled={!canSubmit}
                        className="w-full py-2 rounded font-bold text-white disabled:opacity-50"
                        style={{ backgroundColor: colors.primary }}
                    >
                        Record my thinking
                    </button>
                ) : (
                    <div>
                        <InsightPanel title="Captured.">
                            <p className="text-sm">Your thinking is captured. You can revise it at the next reveal.</p>
                        </InsightPanel>
                        <ContinueButton onClick={onAdvance}>Continue</ContinueButton>
                    </div>
                )}
            </div>
        );
    };

    const TwoChoiceWithExplanation = ({
        question,
        correctAnswer,
        hints,
        revealCopy,
        successCopy,
        choice, setChoice,
        explanation, setExplanation,
        attempts, setAttempts,
        submitted, setSubmitted,
        onAdvance
    }) => {
        const canCheck = choice && explanation.trim().length >= 8;

        const handleSubmit = () => {
            if (submitted) return;
            if (!canCheck) return;
            if (choice === correctAnswer) {
                playSuccessTone();
                setSubmitted(true);
                return;
            }
            const nextAttempts = attempts + 1;
            setAttempts(nextAttempts);
            if (nextAttempts >= 3) {
                playBuzzer();
                setSubmitted(true);
            } else {
                playSoftNope();
            }
        };

        const wasCorrect = submitted && choice === correctAnswer;
        const wasRevealed = submitted && choice !== correctAnswer;

        return (
            <div className="bg-white rounded-lg p-4 mb-4 shadow-sm">
                <p className="mb-3 text-sm" style={{ color: colors.earthDark }}>
                    <strong>Question:</strong> {question}
                </p>
                <div className="grid grid-cols-2 gap-3 mb-3">
                    {[
                        { v: 'yes', label: 'Yes' },
                        { v: 'no', label: 'No' }
                    ].map(opt => {
                        const selected = choice === opt.v;
                        const showAsCorrect = submitted && opt.v === correctAnswer;
                        return (
                            <button
                                key={opt.v}
                                onClick={() => !submitted && setChoice(opt.v)}
                                disabled={submitted}
                                className="p-3 rounded-lg border-2 text-center font-bold transition-all"
                                style={{
                                    borderColor: showAsCorrect
                                        ? colors.success
                                        : selected ? colors.primary : colors.earthLight,
                                    backgroundColor: showAsCorrect
                                        ? colors.successBg
                                        : selected ? colors.sand : 'white',
                                    color: colors.earthDark
                                }}
                            >
                                {opt.label}
                            </button>
                        );
                    })}
                </div>
                {choice && !submitted && (
                    <div className="mb-3">
                        <label className="block text-xs mb-1" style={{ color: colors.earth }}>
                            Say briefly why.
                        </label>
                        <textarea
                            value={explanation}
                            onChange={(e) => setExplanation(e.target.value)}
                            onKeyDown={(e) => {
                                if (e.key === 'Enter' && !e.shiftKey && canCheck) {
                                    e.preventDefault(); handleSubmit();
                                }
                            }}
                            disabled={submitted}
                            placeholder="Your reasoning..."
                            rows={2}
                            className="w-full p-3 border rounded text-sm resize-none"
                            style={{ borderColor: colors.earthLight }}
                        />
                    </div>
                )}
                {!submitted && choice && (
                    <button
                        onClick={handleSubmit}
                        disabled={!canCheck}
                        className="w-full py-2 rounded font-bold text-white disabled:opacity-50"
                        style={{ backgroundColor: colors.primary }}
                    >
                        Check
                    </button>
                )}
                {attempts > 0 && attempts < 3 && !submitted && (
                    <div className="mt-3 p-3 rounded-lg" style={{ backgroundColor: colors.warningBg }}>
                        <p className="text-sm" style={{ color: '#92400e' }}>
                            <strong>Hint {attempts}/2:</strong> {hints[attempts - 1]}
                        </p>
                    </div>
                )}
                {wasCorrect && (
                    <InsightPanel title="Yes — that's it.">
                        {successCopy}
                    </InsightPanel>
                )}
                {wasRevealed && (
                    <WarningPanel title="Here's what the exercise was pointing to:">
                        {revealCopy}
                    </WarningPanel>
                )}
                {submitted && (
                    <div className="mt-3">
                        <ContinueButton onClick={onAdvance}>Continue</ContinueButton>
                    </div>
                )}
            </div>
        );
    };

    // ---------------- Main component ----------------
    const Tutorial = () => {
        // Phase control
        const [phase, setPhase] = useState('welcome');

        // UI state
        const [showGlossary, setShowGlossary] = useState(false);
        const [showSimplificationsNote, setShowSimplificationsNote] = useState(false);
        const [devMode, setDevMode] = useState(false);
        const [headerClickCount, setHeaderClickCount] = useState(0);

        // Per-phase: picks + rationales (no evaluation)
        const [totalsPick, setTotalsPick] = useState('');
        const [totalsRationale, setTotalsRationale] = useState('');
        const [totalsSubmitted, setTotalsSubmitted] = useState(false);

        const [assetsPick, setAssetsPick] = useState('');
        const [assetsRationale, setAssetsRationale] = useState('');
        const [assetsSubmitted, setAssetsSubmitted] = useState(false);

        const [equitiesPick, setEquitiesPick] = useState('');
        const [equitiesRationale, setEquitiesRationale] = useState('');
        const [equitiesSubmitted, setEquitiesSubmitted] = useState(false);

        // Evaluated questions (three-strike)
        const [incomeChoice, setIncomeChoice] = useState('');
        const [incomeExplanation, setIncomeExplanation] = useState('');
        const [incomeAttempts, setIncomeAttempts] = useState(0);
        const [incomeSubmitted, setIncomeSubmitted] = useState(false);

        const [recognitionChoice, setRecognitionChoice] = useState('');
        const [recognitionExplanation, setRecognitionExplanation] = useState('');
        const [recognitionAttempts, setRecognitionAttempts] = useState(0);
        const [recognitionSubmitted, setRecognitionSubmitted] = useState(false);

        // Consolidation reflection
        const [consolidationReflection, setConsolidationReflection] = useState('');
        const [consolidationSubmitted, setConsolidationSubmitted] = useState(false);

        const phaseOrder = [
            'welcome', 'totals', 'asset-breakdown', 'equities-breakdown',
            'income-statements', 'recognition-rule', 'convention-applied',
            'consolidation', 'complete'
        ];
        const currentPhaseIndex = Math.max(0, phaseOrder.indexOf(phase));
        const progress = Math.round((currentPhaseIndex / (phaseOrder.length - 1)) * 100);

        const handleRestart = () => {
            playContinueClick();
            setPhase('welcome');
            setTotalsPick(''); setTotalsRationale(''); setTotalsSubmitted(false);
            setAssetsPick(''); setAssetsRationale(''); setAssetsSubmitted(false);
            setEquitiesPick(''); setEquitiesRationale(''); setEquitiesSubmitted(false);
            setIncomeChoice(''); setIncomeExplanation(''); setIncomeAttempts(0); setIncomeSubmitted(false);
            setRecognitionChoice(''); setRecognitionExplanation(''); setRecognitionAttempts(0); setRecognitionSubmitted(false);
            setConsolidationReflection(''); setConsolidationSubmitted(false);
            setShowSimplificationsNote(false);
        };

        const handleHeaderClick = () => {
            const newCount = headerClickCount + 1;
            setHeaderClickCount(newCount);
            if (newCount >= 3) {
                setDevMode(!devMode);
                setHeaderClickCount(0);
            }
        };

        const goTo = (p) => { playContinueClick(); setPhase(p); window.scrollTo(0, 0); };

        // -------- Common UI --------
        const HeaderWithControls = () => (
            <div className="rounded-lg p-4 mb-4" style={{ backgroundColor: colors.primary }}>
                <div className="flex justify-between items-start">
                    <div onClick={handleHeaderClick} style={{ cursor: 'pointer' }}>
                        <div className="flex items-center gap-2">
                            <span className="text-white" aria-hidden="true">📖</span>
                            <h1 className="text-lg font-bold text-white">Three Businesses, One Decision</h1>
                        </div>
                        <p className="text-sm mt-1" style={{ color: colors.earthLight }}>
                            Accounting Prework • ~20 min
                        </p>
                    </div>
                    <div className="flex items-center gap-2">
                        <a
                            href="../index.html"
                            aria-label="Return to Main"
                            title="Return to Main"
                            className="p-2 rounded-lg hover:bg-white/10 no-underline inline-flex items-center justify-center"
                        >
                            <span className="text-white" aria-hidden="true">🏠</span>
                        </a>
                        <button
                            onClick={() => setShowGlossary(true)}
                            aria-label="Open glossary"
                            title="Glossary"
                            className="p-2 rounded-lg hover:bg-white/10"
                        >
                            <span className="text-white" aria-hidden="true">📖</span>
                        </button>
                        <button
                            onClick={handleRestart}
                            aria-label="Restart tutorial"
                            title="Restart tutorial"
                            className="p-2 rounded-lg hover:bg-white/10"
                        >
                            <span className="text-white text-lg" aria-hidden="true">↺</span>
                        </button>
                    </div>
                </div>
                <div className="mt-4">
                    <div className="flex justify-between text-xs text-white/70 mb-1">
                        <span>Progress</span>
                        <span>{progress}%</span>
                    </div>
                    <div
                        className="h-2 rounded-full"
                        role="progressbar"
                        aria-valuenow={progress}
                        aria-valuemin={0}
                        aria-valuemax={100}
                        style={{ backgroundColor: 'rgba(255,255,255,0.2)' }}
                    >
                        <div
                            className="h-full rounded-full transition-all duration-500"
                            style={{ width: `${progress}%`, backgroundColor: colors.accent }}
                        />
                    </div>
                </div>
                {devMode && (
                    <div className="mt-3 pt-3 border-t border-white/20">
                        <p className="text-xs text-white/70 mb-2">Dev Mode: skip to phase</p>
                        <div className="flex flex-wrap gap-1">
                            {phaseOrder.map(p => (
                                <button
                                    key={p}
                                    onClick={() => setPhase(p)}
                                    className={`px-2 py-1 rounded text-xs ${phase === p ? 'bg-white text-blue-900' : 'bg-white/20 text-white'}`}
                                >
                                    {p}
                                </button>
                            ))}
                        </div>
                    </div>
                )}
            </div>
        );

        // -------- Glossary modal --------
        const GlossaryModal = () => (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                <div className="bg-white rounded-xl max-w-md w-full max-h-[80vh] overflow-y-auto">
                    <div className="p-4 border-b sticky top-0 bg-white flex justify-between items-center">
                        <h3 className="font-bold" style={{ color: colors.primary }}>Glossary</h3>
                        <button
                            onClick={() => setShowGlossary(false)}
                            className="text-gray-500 hover:text-gray-700 text-xl"
                            aria-label="Close glossary"
                        >
                            ✕
                        </button>
                    </div>
                    <div className="p-4 space-y-3 text-sm">
                        {glossaryTerms.map((item, i) => (
                            <div key={i}>
                                <p className="font-medium" style={{ color: colors.primary }}>{item.term}</p>
                                <p className="text-gray-600 text-xs">{item.definition}</p>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        // =================================================================
        // PHASE RENDERERS
        // =================================================================

        // -------- Welcome --------
        const renderWelcome = () => (
            <div>
                <NarrativeBlock>
                    <p className="mb-2">
                        In Module 1 you built the recordkeeping system from the inside out — identify
                        the entity, list its Assets and Liabilities, and the residual falls out as Equities
                        (or Net Assets, for an organization no one owns). A − L = E by construction.
                        Time to apply it.
                    </p>
                    <p className="mb-2">
                        You have <strong>$25k</strong>. You can invest it in one of three for-profit
                        businesses, or donate it to a nonprofit. This first part of the exercise
                        looks at the three for-profits. The donation option comes up in the next part.
                    </p>
                    <p>
                        Each business started from nothing exactly one year ago. You will see their
                        records, step by step, and work out how the pieces fit together.
                    </p>
                </NarrativeBlock>

                <div
                    className="rounded-lg p-4 mb-4 border-2"
                    style={{ backgroundColor: 'white', borderColor: colors.primary }}
                >
                    <p className="font-bold mb-3" style={{ color: colors.primary }}>What you'll discover</p>
                    <ul className="space-y-2 text-sm" style={{ color: colors.earthDark }}>
                        <li className="flex gap-2">
                            <span style={{ color: colors.accent }} aria-hidden="true">•</span>
                            That the balance sheet is constructed around a single identity.
                        </li>
                        <li className="flex gap-2">

                    <div
                        className="inline-flex items-center justify-center w-20 h-20 rounded-full mb-4"
                        style={{ backgroundColor: colors.accent }}
                    >
                        <span className="text-3xl" aria-hidden="true">🏆</span>
                    </div>
                    <h2 className="text-2xl font-bold" style={{ color: colors.primary }}>
                        Tutorial Complete
                    </h2>
                </div>

                <div
                    className="rounded-lg p-4 mb-4 border-2"
                    style={{ backgroundColor: 'white', borderColor: colors.success }}
                >
                    <h3 className="font-bold mb-3" style={{ color: colors.primary }}>What you discovered</h3>
                    <ol className="space-y-2 text-sm" style={{ color: colors.earthDark }}>
                        <li className="flex gap-2">
                            <span style={{ color: colors.success }} aria-hidden="true">✓</span>
                            <span>The <strong>accounting identity</strong>: Assets − Liabilities = Equities, always, by construction.</span>
                        </li>
                        <li className="flex gap-2">
                            <span style={{ color: colors.success }} aria-hidden="true">✓</span>
                            <span>Why Equities is shown in subparts — so the structure can carry information about where the residual came from.</span>
                        </li>
                        <li className="flex gap-2">
                            <span style={{ color: colors.success }} aria-hidden="true">✓</span>
                            <span>How the <strong>income statement</strong> explains what happened behind Retained Earnings.</span>
                        </li>
                        <li className="flex gap-2">
                            <span style={{ color: colors.success }} aria-hidden="true">✓</span>
                            <span>The evidence test that governs what enters the records — that the item exists and that its effects are at least in part financial.</span>
                        </li>
                    </ol>
                </div>

                <KeyInsightBox>
                    <p className="font-semibold mb-2">The deeper point</p>
                    <p className="text-sm">
                        Financial statements are not a single report. They are a connected set. The
                        balance sheet presents an identity at a point in time. The income statement
                        explains how a part of that identity — Retained Earnings — changed during
                        the period. The structure is built to carry information that no single
                        statement could carry alone.
                    </p>
                </KeyInsightBox>

                <div
                    className="rounded-lg p-4 mb-4"
                    style={{ backgroundColor: colors.clayLight }}
                >
                    <h3 className="font-bold mb-2" style={{ color: colors.primary }}>Coming next</h3>
                    <p className="text-sm" style={{ color: colors.earthDark }}>
                        The same structural pieces appear for a nonprofit — an identity, a residual
                        with subparts, explanatory statements. But the names differ, the rules
                        differ, and a new dimension appears: donor intent. Your $25k could still go
                        there instead.
                    </p>
                    <p className="font-bold mt-2 text-sm" style={{ color: colors.primary }}>
                        Next: the nonprofit side of the decision
                    </p>
                </div>

                <button
                    onClick={() => { playContinueClick(); window.location.href = '2.2-three-nonprofits.html'; }}
                    className="w-full py-3 rounded-lg font-bold text-white flex items-center justify-center gap-2 mb-3"
                    style={{ backgroundColor: colors.primary }}
                >
                    Next Tutorial <span aria-hidden="true">→</span>
                </button>
                <button
                    onClick={handleRestart}
                    className="w-full py-3 rounded-lg font-bold border-2 flex items-center justify-center gap-2 hover:bg-gray-50"
                    style={{ borderColor: colors.primary, color: colors.primary }}
                >
                    <span aria-hidden="true">↺</span> Restart Tutorial
                </button>
            </div>
        );

        // -------- Dispatch --------
        let content = null;
        if (phase === 'welcome') content = renderWelcome();
        else if (phase === 'totals') content = renderTotals();
        else if (phase === 'asset-breakdown') content = renderAssetBreakdown();
        else if (phase === 'equities-breakdown') content = renderEquitiesBreakdown();
        else if (phase === 'income-statements') content = renderIncomeStatements();
        else if (phase === 'recognition-rule') content = renderRecognitionRule();
        else if (phase === 'convention-applied') content = renderConventionApplied();
        else if (phase === 'consolidation') content = renderConsolidation();
        else if (phase === 'complete') content = renderComplete();

        return (
            <div className="min-h-screen" style={{ backgroundColor: colors.sand }}>
                <div className="p-4 max-w-3xl mx-auto">
                    <HeaderWithControls />
                    <div key={phase} className="fade-in">{content}</div>
                </div>
                {showGlossary && <GlossaryModal />}
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Tutorial />);
    </script>
</body>
</html>
